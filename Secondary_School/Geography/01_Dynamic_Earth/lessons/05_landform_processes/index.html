<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05 塑造香港地貌的營力 | 動態地球</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/earth.css">
</head>
<body>
  <nav class="lesson-nav">
    <a href="../../index.html" class="lesson-nav__back">← 動態地球</a>
    <span class="lesson-nav__title">05 · 地貌營力</span>
    <span style="width:4rem"></span>
  </nav>
  <div class="layout layout--force">
    <div class="viz-panel" id="force-root"></div>
    <aside class="side-panel side-panel--wide" id="lesson-panel"></aside>
  </div>
  <div class="lesson-pager" id="lesson-pager" style="max-width:56rem;margin:0 auto;padding:1rem 1.25rem 2rem"></div>

  <script src="../../shared/lesson-content.js"></script>
  <script src="../../shared/lesson-exercises.js"></script>
  <script src="../../shared/lesson-ui.js"></script>
  <script src="../../shared/force-explorer.js"></script>
  <script>
    const CASE_SYNC = {
      internal: 'hex_volcano',
      external: 'spheroidal',
      human: 'harbour_fill',
      volcano: 'hex_volcano',
      coast: 'coastal',
      reclaim: 'harbour_fill',
    };

    const explorer = ForceExplorer.createForceExplorer(document.getElementById('force-root'), {
      defaultCase: 'hex_volcano',
      onSelect(c) {
        document.querySelectorAll('[data-force-sync]').forEach((btn) => {
          btn.classList.toggle('is-active', btn.dataset.forceSync === c.category);
        });
      },
    });

    LessonUI.initLesson('landform_processes', {
      title: '塑造香港地貌的營力',
      lead: '左：香港實景相片（Wikimedia Commons）逐步對應地貌機制；可展開剖面示意。右：DSE 筆記、分類練習、論述題、測驗。',
      pager: {
        prev: '../04_hk_geology/index.html',
        prevLabel: '香港地質',
        next: '../06_tectonic_hazards/index.html',
        nextLabel: '構造災害',
      },
    });

    const overview = document.querySelector('.lesson-pane');

    const jumpCard = LessonUI.el('div', 'card');
    jumpCard.innerHTML = `
      <h3>快速跳轉營力類型</h3>
      <p class="muted" style="margin-bottom:0.5rem">同步左側個案選單</p>
      <div class="case-sync-bar">
        <button type="button" class="btn is-active" data-force-sync="internal">🌋 內營力</button>
        <button type="button" class="btn" data-force-sync="external">🌊 外營力</button>
        <button type="button" class="btn" data-force-sync="human">🏗 人為營力</button>
      </div>`;
    overview.appendChild(jumpCard);

    const compareCard = LessonUI.el('div', 'card');
    compareCard.innerHTML = `
      <h3>三大營力一覽（HKDSE）</h3>
      <table class="data-table">
        <tr><th>類型</th><th>能量來源</th><th>香港例子</th></tr>
        <tr><td><strong style="color:#f97316">內營力</strong></td><td>地球內部</td><td>西貢六角岩柱、花崗岩抬升</td></tr>
        <tr><td><strong style="color:#38bdf8">外營力</strong></td><td>太陽能、重力</td><td>球狀風化、海蝕柱、山泥傾瀉</td></tr>
        <tr><td><strong style="color:#fbbf24">人為營力</strong></td><td>人類活動</td><td>維港填海、削坡發展</td></tr>
      </table>
      <p class="note" style="margin-top:0.5rem">DSE 比較題：內營力<strong>抬升</strong> vs 外營力<strong>削低</strong> — 須各舉本港例子。</p>`;
    overview.appendChild(compareCard);

    const presetCard = LessonUI.el('div', 'card');
    presetCard.innerHTML = `
      <h3>香港情景預設</h3>
      <div class="case-sync-bar">
        <button type="button" class="btn" data-case-jump="hex_volcano">西貢火山岩</button>
        <button type="button" class="btn" data-case-jump="spheroidal">球狀風化</button>
        <button type="button" class="btn" data-case-jump="coastal">海岸侵蝕</button>
        <button type="button" class="btn" data-case-jump="harbour_fill">維港填海</button>
      </div>`;
    overview.appendChild(presetCard);

    document.querySelectorAll('[data-force-sync]').forEach((btn) => {
      btn.onclick = () => {
        explorer.select(CASE_SYNC[btn.dataset.forceSync]);
        document.querySelectorAll('[data-force-sync]').forEach((b) => {
          b.classList.toggle('is-active', b === btn);
        });
      };
    });

    document.querySelectorAll('[data-case-jump]').forEach((btn) => {
      btn.onclick = () => explorer.select(btn.dataset.caseJump);
    });
  </script>
</body>
</html>
