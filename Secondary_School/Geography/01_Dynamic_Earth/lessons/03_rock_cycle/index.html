<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 岩石循環 | 動態地球</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/earth.css">
  <style>
    .layout--wide { grid-template-columns: 1fr; }
    @media (min-width: 1100px) { .layout--wide { grid-template-columns: 1fr 26rem; } }
  </style>
</head>
<body>
  <nav class="lesson-nav">
    <a href="../../index.html" class="lesson-nav__back">← 動態地球</a>
    <span class="lesson-nav__title">03 · 岩石循環</span>
    <span style="width:4rem"></span>
  </nav>
  <div class="layout layout--wide">
    <div class="viz-panel" id="cycle-root"></div>
    <aside class="side-panel side-panel--wide" id="lesson-panel"></aside>
  </div>
  <div class="lesson-pager" id="lesson-pager" style="max-width:56rem;margin:0 auto;padding:1rem 1.25rem 2rem"></div>

  <script src="../../shared/lesson-content.js"></script>
  <script src="../../shared/lesson-exercises.js"></script>
  <script src="../../shared/lesson-ui.js"></script>
  <script src="../../shared/rock-cycle-explorer.js"></script>
  <script>
    const explorer = RockCycleExplorer.createRockCycleExplorer(
      document.getElementById('cycle-root'),
      {
        defaultRock: 'igneous',
        onSelect(rock) {
          document.querySelectorAll('[data-rock-sync]').forEach((b) => {
            b.classList.toggle('is-active', b.dataset.rockSync === rock.id);
          });
        },
      }
    );

    LessonUI.initLesson('rock_cycle', {
      title: '岩石循環',
      lead: '左側：播放循環動畫，逐步顯示岩漿→火成岩→沉積岩→變質岩→岩漿。右側：筆記、練習、8 題測驗。',
      pager: {
        prev: '../02_plate_tectonics/index.html',
        prevLabel: '板塊構造',
        next: '../04_hk_geology/index.html',
        nextLabel: '香港地質',
      },
    });

    const overview = document.querySelectorAll('.lesson-pane')[0];
    const jumpCard = LessonUI.el('div', 'card');
    jumpCard.innerHTML = `
      <h3>快速跳轉岩類</h3>
      <p class="muted" style="margin-bottom:0.5rem">按鈕會同步左側循環圖</p>
      <div class="case-sync-bar">
        <button type="button" class="btn is-active" data-rock-sync="igneous">火成岩</button>
        <button type="button" class="btn" data-rock-sync="sedimentary">沉積岩</button>
        <button type="button" class="btn" data-rock-sync="metamorphic">變質岩</button>
        <button type="button" class="btn" data-rock-sync="magma">岩漿</button>
      </div>`;
    overview.appendChild(jumpCard);

    document.querySelectorAll('[data-rock-sync]').forEach((btn) => {
      btn.onclick = () => {
        explorer.selectRock(btn.dataset.rockSync);
        document.querySelectorAll('[data-rock-sync]').forEach((b) => {
          b.classList.toggle('is-active', b.dataset.rockSync === btn.dataset.rockSync);
        });
      };
    });

    const forcesCard = LessonUI.el('div', 'card');
    forcesCard.innerHTML = `
      <h3>三大作用一覽</h3>
      <table class="data-table">
        <tr><td>🌋 火山作用</td><td>岩漿 → 火成岩；重熔、俯衝熔融</td></tr>
        <tr><td>🏖 沉積作用</td><td>風化碎屑 → 沉積岩</td></tr>
        <tr><td>💎 變質作用</td><td>高溫高壓重結晶 → 變質岩（不熔融）</td></tr>
        <tr><td>🌧 外營力</td><td>風化、侵蝕、搬運（連接各岩類與沉積）</td></tr>
      </table>`;
    overview.appendChild(forcesCard);
  </script>
</body>
</html>
