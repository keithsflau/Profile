<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天氣與氣候 | HKDSE Geography</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --void:#060912; --aurora:#4ade80; --ice:#38bdf8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--void); color:#e2e8f0; min-height:100vh; }
    .hero {
      min-height:45vh; display:flex; flex-direction:column; justify-content:flex-end;
      padding:5rem 1.5rem 3rem;
      background:
        radial-gradient(ellipse 60% 50% at 70% 30%, rgba(56,189,248,0.15), transparent),
        radial-gradient(ellipse 50% 40% at 20% 70%, rgba(99,102,241,0.12), transparent),
        linear-gradient(180deg,#080c18,#060912);
    }
    .back { color:rgba(255,255,255,0.45); font-size:0.75rem; text-decoration:none; margin-bottom:1.5rem; }
    .back:hover { color:var(--ice); }
    h1 { font-size:clamp(1.75rem,5vw,2.5rem); font-weight:700; margin-bottom:0.5rem; }
    .sub { color:rgba(255,255,255,0.5); font-size:0.9rem; max-width:32rem; line-height:1.6; }
    main { max-width:42rem; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .card {
      background:rgba(12,18,35,0.8); border:1px solid rgba(125,211,252,0.12);
      border-radius:1rem; padding:1.5rem; margin-bottom:1.25rem;
    }
    .card h2 { font-size:1rem; color:var(--ice); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
    .signal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0.75rem; }
    .signal-btn {
      padding:1rem 0.75rem; border-radius:0.75rem; border:1px solid rgba(255,255,255,0.1);
      background:rgba(0,0,0,0.3); color:#e2e8f0; cursor:pointer; text-align:center;
      font-size:0.8rem; transition:all 0.25s;
    }
    .signal-btn:hover { border-color:var(--ice); }
    .signal-btn.selected { border-color:var(--aurora); background:rgba(74,222,128,0.1); }
    .signal-btn .num { font-size:1.5rem; font-weight:700; display:block; margin-bottom:0.25rem; }
    .scenario {
      padding:1rem; border-radius:0.75rem; background:rgba(56,189,248,0.08);
      border:1px solid rgba(56,189,248,0.2); font-size:0.9rem; line-height:1.6; margin-bottom:1rem;
    }
    button.check {
      width:100%; padding:0.85rem; border:none; border-radius:999px;
      background:linear-gradient(135deg,#38bdf8,#6366f1); color:#fff;
      font-weight:700; font-size:0.8rem; cursor:pointer; margin-top:0.5rem;
    }
    .feedback { margin-top:1rem; padding:1rem; border-radius:0.75rem; font-size:0.9rem; display:none; line-height:1.6; }
    .feedback.show { display:block; }
    .feedback.ok { background:rgba(74,222,128,0.12); border:1px solid rgba(74,222,128,0.3); }
    .feedback.err { background:rgba(248,113,113,0.12); border:1px solid rgba(248,113,113,0.3); }
  </style>
</head>
<body>
  <header class="hero">
    <a href="../index.html" class="back">← 地理科</a>
    <p style="font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(56,189,248,0.6);margin-bottom:0.5rem">Unit 2 · C2</p>
    <h1>天氣與氣候</h1>
    <p class="sub">熱帶氣旋、季風與香港天氣警告系統。根據情景選擇正確的熱帶氣旋警告信號。</p>
  </header>
  <main>
    <div class="card">
      <h2>情景：熱帶氣旋逼近</h2>
      <p class="scenario" id="scenario">
        熱帶氣旋中心距香港約 300 km，持續增強，預料未來 12 小時內風力達烈風程度（平均風速 63–87 km/h）。香港普遍吹強風。應發出哪個信號？
      </p>
      <div class="signal-grid" id="signals">
        <button type="button" class="signal-btn" data-v="1"><span class="num">1</span>戒備</button>
        <button type="button" class="signal-btn" data-v="3"><span class="num">3</span>強風</button>
        <button type="button" class="signal-btn" data-v="8"><span class="num">8</span>烈風</button>
        <button type="button" class="signal-btn" data-v="10"><span class="num">10</span>暴風</button>
      </div>
      <button type="button" class="check" id="check">提交答案</button>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="card">
      <h2>DSE 重點</h2>
      <p style="font-size:0.85rem;line-height:1.7;color:rgba(255,255,255,0.6)">
        香港位於副熱帶，夏季受西南季風影響多雨；冬季季風由內陸吹來較乾燥。
        熱帶氣旋信號根據<strong style="color:#fbbf24">風力</strong>而非距離發出。
        八號信號表示烈風或暴風，市面活動大幅暫停。
      </p>
    </div>
    <p style="text-align:center;margin-top:2rem"><a href="../aurora-atlas/index.html" style="color:rgba(125,211,252,0.6);font-size:0.8rem;text-decoration:none">← 返回極光地圖</a></p>
  </main>
  <script>
    const ANSWER = '8';
    let picked = null;
    document.querySelectorAll('.signal-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.signal-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        picked = btn.dataset.v;
      };
    });
    document.getElementById('check').onclick = () => {
      const fb = document.getElementById('feedback');
      if (!picked) { fb.className = 'feedback show err'; fb.textContent = '請先選擇一個信號。'; return; }
      const ok = picked === ANSWER;
      fb.className = 'feedback show ' + (ok ? 'ok' : 'err');
      fb.textContent = ok
        ? '✓ 正確！預料烈風（63–87 km/h）應發出八號烈風或暴風信號。三號為強風；十號為颶風級。'
        : '信號 ' + picked + ' 不正確。留意題目描述的風速範圍對應哪一級信號。';
    };
  </script>
</body>
</html>
