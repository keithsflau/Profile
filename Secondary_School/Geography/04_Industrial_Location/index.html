<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工業區位 | HKDSE Geography</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --void:#060912; --gold:#fbbf24; --ice:#38bdf8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--void); color:#e2e8f0; min-height:100vh; }
    .hero {
      min-height:45vh; display:flex; flex-direction:column; justify-content:flex-end;
      padding:5rem 1.5rem 3rem;
      background:
        radial-gradient(ellipse 60% 50% at 60% 40%, rgba(251,191,36,0.1), transparent),
        radial-gradient(ellipse 50% 40% at 20% 60%, rgba(244,63,94,0.08), transparent),
        linear-gradient(180deg,#0c0818,#060912);
    }
    .back { color:rgba(255,255,255,0.45); font-size:0.75rem; text-decoration:none; margin-bottom:1.5rem; }
    h1 { font-size:clamp(1.75rem,5vw,2.5rem); font-weight:700; margin-bottom:0.5rem; }
    .sub { color:rgba(255,255,255,0.5); font-size:0.9rem; max-width:32rem; line-height:1.6; }
    main { max-width:42rem; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .card {
      background:rgba(12,18,35,0.8); border:1px solid rgba(251,191,36,0.12);
      border-radius:1rem; padding:1.5rem; margin-bottom:1.25rem;
    }
    .card h2 { font-size:1rem; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
    .industry-pick { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1.25rem; }
    @media(max-width:400px){ .industry-pick { grid-template-columns:1fr; } }
    .ind-btn {
      padding:1rem; border-radius:0.75rem; border:1px solid rgba(255,255,255,0.1);
      background:rgba(0,0,0,0.3); color:#e2e8f0; cursor:pointer; font-size:0.85rem;
      transition:all 0.25s; text-align:left;
    }
    .ind-btn:hover { border-color:var(--gold); }
    .ind-btn.active { border-color:var(--gold); background:rgba(251,191,36,0.08); }
    .factor { margin-bottom:1rem; }
    .factor label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.35rem; }
    .factor output { color:var(--gold); }
    input[type=range] { width:100%; accent-color:#fbbf24; }
    .score-box {
      text-align:center; padding:1.25rem; border-radius:0.75rem;
      background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.08);
    }
    .score-box .score { font-size:2.5rem; font-weight:700; color:var(--gold); }
    .score-box .verdict { font-size:0.9rem; color:rgba(255,255,255,0.6); margin-top:0.5rem; line-height:1.5; }
    .hk-note { font-size:0.85rem; line-height:1.7; color:rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <header class="hero">
    <a href="../index.html" class="back">← 地理科</a>
    <p style="font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(251,191,36,0.6);margin-bottom:0.5rem">Unit 4 · C4</p>
    <h1>工業區位</h1>
    <p class="sub">為不同產業調整區位因素權重，評估在珠三角設廠的適合度。</p>
  </header>
  <main>
    <div class="card">
      <h2>區位決策模擬</h2>
      <p style="font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:1rem">選擇產業類型，再調整各因素重要性（1–10）：</p>
      <div class="industry-pick" id="industries">
        <button type="button" class="ind-btn active" data-type="tech">高科技製造<br><small style="opacity:0.6">晶片、研發</small></button>
        <button type="button" class="ind-btn" data-type="textile">勞動密集<br><small style="opacity:0.6">紡織、組裝</small></button>
        <button type="button" class="ind-btn" data-type="logistics">物流樞紐<br><small style="opacity:0.6">倉儲、轉運</small></button>
        <button type="button" class="ind-btn" data-type="finance">金融服務<br><small style="opacity:0.6">總部、融資</small></button>
      </div>
      <div id="factors"></div>
      <div class="score-box" style="margin-top:1.25rem">
        <div>珠三角設點適合度</div>
        <div class="score" id="score">—</div>
        <div class="verdict" id="verdict">選擇產業並調整因素</div>
      </div>
    </div>
    <div class="card">
      <h2>香港視角</h2>
      <p class="hk-note">
        1980–90 年代製造業北移珠三角，香港轉向<strong style="color:#fbbf24">金融、貿易與專業服務</strong>。
        「前店後廠」模式利用香港法治、融資與內地土地、勞力優勢。
        DSE 常考：區位因素轉變、工業分散與全球化影響。
      </p>
    </div>
    <p style="text-align:center;margin-top:2rem"><a href="../aurora-atlas/index.html" style="color:rgba(125,211,252,0.6);font-size:0.8rem;text-decoration:none">← 返回極光地圖</a></p>
  </main>
  <script>
    const FACTORS = ['勞力成本', '土地租金', '交通運輸', '市場接近', '政府政策', '技術人才'];
    const REGION_SCORES = { tech:[6,7,8,7,8,5], textile:[9,9,7,8,7,4], logistics:[5,6,9,8,7,5], finance:[3,2,9,9,8,9] };
    const WEIGHTS_DEFAULT = { tech:[8,5,7,6,8,9], textile:[9,9,6,7,6,3], logistics:[5,6,10,8,7,5], finance:[4,3,9,9,8,10] };

    let industry = 'tech';
    const weights = {};

    function renderFactors() {
      const box = document.getElementById('factors');
      box.innerHTML = '';
      FACTORS.forEach((name, i) => {
        const w = weights[industry][i];
        const div = document.createElement('div');
        div.className = 'factor';
        div.innerHTML = `<label>${name} <output>${w}</output></label><input type="range" min="1" max="10" value="${w}" data-i="${i}">`;
        box.appendChild(div);
      });
      box.querySelectorAll('input').forEach(inp => {
        inp.oninput = () => {
          weights[industry][+inp.dataset.i] = +inp.value;
          inp.previousElementSibling.querySelector('output').textContent = inp.value;
          calc();
        };
      });
      calc();
    }

    function calc() {
      const rs = REGION_SCORES[industry];
      const ws = weights[industry];
      let sumW = 0, sum = 0;
      ws.forEach((w, i) => { sumW += w; sum += w * rs[i]; });
      const score = Math.round(sum / sumW * 10);
      document.getElementById('score').textContent = score + '%';
      const v = document.getElementById('verdict');
      if (score >= 75) v.textContent = '非常適合 — 珠三角在此產業具明顯區位優勢。';
      else if (score >= 55) v.textContent = '中等適合 — 部分因素有利，可考慮與香港形成分工。';
      else v.textContent = '較不適合 — 此產業更重視香港或海外其他區位優勢。';
    }

    Object.keys(WEIGHTS_DEFAULT).forEach(k => { weights[k] = [...WEIGHTS_DEFAULT[k]]; });

    document.querySelectorAll('.ind-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        industry = btn.dataset.type;
        renderFactors();
      };
    });
    renderFactors();
  </script>
</body>
</html>
