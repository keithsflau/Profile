<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06 Linear Programming Basic | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [x, setX] = useState(2);
        const [y, setY] = useState(1);
        const feasible = x >= 0 && y >= 0 && x + y <= 4 && 2 * x + y <= 5;
        const z = 3 * x + 2 * y;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Linear Programming (intro)</h1>
            <p className="text-slate-600 mb-4">示題：在 x,y ≥ 0、x + y ≤ 4、2x + y ≤ 5 下，考慮目標函數 Z = 3x + 2y。拖動 x,y 看可行與 Z 值（可行域頂點才會有極值，此處僅作概念）。</p>
            <div className="space-y-4 mb-6">
              <label className="block">x = {x} <input type="range" min="0" max="3" step="0.1" className="w-full" value={x} onChange={(e) => setX(Number(e.target.value))} /></label>
              <label className="block">y = {y} <input type="range" min="0" max="4" step="0.1" className="w-full" value={y} onChange={(e) => setY(Number(e.target.value))} /></label>
            </div>
            <div className={`rounded-xl p-6 ${feasible ? "bg-green-100 border-2 border-green-600" : "bg-red-100 border-2 border-red-500"}`}>
              <p className="font-bold">{feasible ? "點在可行域內" : "點違反約束（不可行）"}</p>
              <p className="text-xl mt-2">Z = 3x + 2y = <strong>{z.toFixed(2)}</strong></p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
