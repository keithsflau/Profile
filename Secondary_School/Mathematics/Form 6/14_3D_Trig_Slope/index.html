<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14 Gradient & Slope | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [dx, setDx] = useState(3);
        const [dy, setDy] = useState(4);
        const [dz, setDz] = useState(0);
        const horiz = Math.sqrt(dx * dx + dy * dy);
        const angleFromXY = Math.atan2(dz, horiz) * (180 / Math.PI);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Slope / Inclination (3D segment)</h1>
            <p className="text-slate-600 mb-4">方向向量 (dx, dy,dz)。與水平面 (xy) 的仰角 α 滿足 tan α = |dz| / √(dx²+dy²)。</p>
            <div className="grid md:grid-cols-3 gap-4 mb-6">
              <label>dx <input className="border rounded w-full p-2" type="number" value={dx} onChange={(e) => setDx(+e.target.value)} /></label>
              <label>dy <input className="border rounded w-full p-2" type="number" value={dy} onChange={(e) => setDy(+e.target.value)} /></label>
              <label>dz <input className="border rounded w-full p-2" type="number" value={dz} onChange={(e) => setDz(+e.target.value)} /></label>
            </div>
            <div className="bg-slate-900 text-amber-200 rounded-xl p-6 text-center text-xl">仰角 α ≈ {angleFromXY.toFixed(2)}°</div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
