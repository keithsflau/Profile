<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05 GS Infinity | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [a, setA] = useState(4);
        const [r, setR] = useState(0.5);
        const converges = Math.abs(r) < 1 && r !== 0;
        const Sinf = converges ? a / (1 - r) : NaN;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Infinite Geometric Series</h1>
            <p className="text-slate-600 mb-4">當 |r| &lt; 1 時，S∞ = a + ar + ar² + … = a / (1 − r)。若 |r| ≥ 1，級數一般<strong>不</strong>收斂（部分和無限增大或振盪）。</p>
            <div className="grid md:grid-cols-2 gap-4 mb-6">
              <label className="flex flex-col text-sm">a <input type="number" step="0.1" className="border rounded p-2" value={a} onChange={(e) => setA(Number(e.target.value))} /></label>
              <label className="flex flex-col text-sm">r <input type="number" step="0.05" className="border rounded p-2" value={r} onChange={(e) => setR(Number(e.target.value))} /></label>
            </div>
            <div className={`rounded-2xl p-8 text-center ${converges ? "bg-teal-900 text-white" : "bg-amber-100 text-amber-900"}`}>
              {converges ? (
                <>
                  <p className="text-teal-200 text-sm">S∞</p>
                  <p className="text-4xl font-bold">{Sinf.toFixed(6)}</p>
                </>
              ) : (
                <p className="font-bold">|r| ≥ 1：此設定下級數不收斂，無有限和 S∞。</p>
              )}
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
