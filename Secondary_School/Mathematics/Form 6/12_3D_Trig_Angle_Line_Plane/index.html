<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Line–Plane Angle | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [lx, setLx] = useState(1);
        const [ly, setLy] = useState(1);
        const [lz, setLz] = useState(1);
        const [nx, setNx] = useState(0);
        const [ny, setNy] = useState(0);
        const [nz, setNz] = useState(1);
        const dot = lx * nx + ly * ny + lz * nz;
        const magL = Math.sqrt(lx * lx + ly * ly + lz * lz);
        const magN = Math.sqrt(nx * nx + ny * ny + nz * nz);
        const sinTheta = Math.abs(dot) / (magL * magN);
        const thetaDeg = Math.asin(Math.min(1, sinTheta)) * (180 / Math.PI);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Angle Between Line & Plane</h1>
            <p className="text-slate-600 mb-4">設直線方向向量 <strong>l</strong>，平面法向量 <strong>n</strong>。線與平面夾角 θ 滿足 sin θ = |l·n| / (|l||n|)。</p>
            <div className="grid md:grid-cols-2 gap-4 text-sm mb-4">
              <div className="space-y-2">
                <p className="font-bold">l</p>
                <input className="border rounded p-1 w-full" type="number" value={lx} onChange={(e) => setLx(+e.target.value)} />
                <input className="border rounded p-1 w-full" type="number" value={ly} onChange={(e) => setLy(+e.target.value)} />
                <input className="border rounded p-1 w-full" type="number" value={lz} onChange={(e) => setLz(+e.target.value)} />
              </div>
              <div className="space-y-2">
                <p className="font-bold">n</p>
                <input className="border rounded p-1 w-full" type="number" value={nx} onChange={(e) => setNx(+e.target.value)} />
                <input className="border rounded p-1 w-full" type="number" value={ny} onChange={(e) => setNy(+e.target.value)} />
                <input className="border rounded p-1 w-full" type="number" value={nz} onChange={(e) => setNz(+e.target.value)} />
              </div>
            </div>
            <div className="bg-slate-900 text-cyan-200 rounded-xl p-6 text-center">
              <p>θ ≈ {thetaDeg.toFixed(2)}°</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
