<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 GS Summation | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [a, setA] = useState(3);
        const [r, setR] = useState(2);
        const [n, setN] = useState(4);
        let Sn;
        if (Math.abs(r - 1) < 1e-9) Sn = n * a;
        else Sn = a * (1 - Math.pow(r, n)) / (1 - r);
        const err = !isFinite(Sn) ? "（數值溢出）" : "";
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Finite Geometric Sum</h1>
            <p className="text-slate-600 mb-4">S(n) = a + ar + … + ar^(n−1) = a(1 − r^n) / (1 − r)，r ≠ 1。若 r = 1，則 S(n) = na。</p>
            <div className="grid md:grid-cols-3 gap-4 mb-6">
              <label className="flex flex-col text-sm">a <input type="number" step="0.1" className="border rounded p-2" value={a} onChange={(e) => setA(Number(e.target.value))} /></label>
              <label className="flex flex-col text-sm">r <input type="number" step="0.1" className="border rounded p-2" value={r} onChange={(e) => setR(Number(e.target.value))} /></label>
              <label className="flex flex-col text-sm">n <input type="number" min="1" className="border rounded p-2" value={n} onChange={(e) => setN(Math.max(1, Number(e.target.value)))} /></label>
            </div>
            <div className="rounded-2xl bg-violet-900 text-white p-8 text-center">
              <p className="text-violet-200 text-sm">S({n})</p>
              <p className="text-3xl font-bold">{err || Sn.toFixed(4)}</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
