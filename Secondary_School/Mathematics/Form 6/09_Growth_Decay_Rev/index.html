<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09 Growth & Decay | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [N0, setN0] = useState(1000);
        const [k, setK] = useState(0.03);
        const [t, setT] = useState(10);
        const growth = N0 * Math.exp(k * t);
        const decay = N0 * Math.exp(-Math.abs(k) * t);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Exponential Growth / Decay</h1>
            <p className="text-slate-600 mb-4">連續模型：N(t) = N₀e^(kt)。k &gt; 0 增長；k &lt; 0 衰減。下式示範同一 |k| 的增長與衰減對照。</p>
            <div className="grid md:grid-cols-3 gap-4 mb-6 text-sm">
              <label>N₀ <input type="number" className="border rounded p-2 w-full" value={N0} onChange={(e) => setN0(Number(e.target.value))} /></label>
              <label>|k| <input type="number" step="0.01" className="border rounded p-2 w-full" value={k} onChange={(e) => setK(Number(e.target.value))} /></label>
              <label>t <input type="number" className="border rounded p-2 w-full" value={t} onChange={(e) => setT(Number(e.target.value))} /></label>
            </div>
            <div className="grid md:grid-cols-2 gap-4">
              <div className="bg-green-900 text-white rounded-xl p-6">
                <p className="text-xs text-green-200">Growth N₀e^(kt)</p>
                <p className="text-2xl font-bold">{growth.toFixed(4)}</p>
              </div>
              <div className="bg-rose-900 text-white rounded-xl p-6">
                <p className="text-xs text-rose-200">Decay N₀e^(−kt)</p>
                <p className="text-2xl font-bold">{decay.toFixed(4)}</p>
              </div>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
