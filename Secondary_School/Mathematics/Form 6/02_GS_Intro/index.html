<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 GS Intro | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; }</style>
</head>
<body class="min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [a, setA] = useState(2);
        const [r, setR] = useState(1.5);
        const [n, setN] = useState(5);
        const tn = a * Math.pow(r, n - 1);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Geometric Sequences (GS)</h1>
            <p className="text-slate-600 mb-6">首項 <span className="font-mono">a</span>、公比 <span className="font-mono">r ≠ 0</span>。無窮級數收斂需 <span className="font-mono">|r| &lt; 1</span>（另見「GS Infinity」）。</p>
            <div className="bg-white rounded-2xl shadow border p-6 mb-6 font-mono text-sm">
              <p><strong>通項：</strong> T(n) = a · r^(n−1)</p>
            </div>
            <div className="bg-indigo-950 text-white rounded-2xl p-6 space-y-4">
              <h2 className="font-bold text-indigo-200">第 n 項</h2>
              <label className="block text-sm">a <input type="number" step="0.1" className="ml-2 text-slate-900 rounded px-2 w-28" value={a} onChange={(e) => setA(Number(e.target.value))} /></label>
              <label className="block text-sm">r <input type="number" step="0.1" className="ml-2 text-slate-900 rounded px-2 w-28" value={r} onChange={(e) => setR(Number(e.target.value))} /></label>
              <label className="block text-sm">n <input type="number" min="1" className="ml-2 text-slate-900 rounded px-2 w-28" value={n} onChange={(e) => setN(Math.max(1, Number(e.target.value)))} /></label>
              <p className="border-t border-indigo-800 pt-3">T({n}) = <span className="text-amber-300 font-bold text-xl">{tn.toFixed(4)}</span></p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his understanding. Jeremiah 10:12</p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">@ 2025 Education Engineering Portfolio | Prepared by SF Lau</p>
    </footer>
</body>
</html>
