<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08 Compound Interest | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [P, setP] = useState(10000);
        const [r, setR] = useState(0.04);
        const [n, setN] = useState(5);
        const [k, setK] = useState(1);
        const A = P * Math.pow(1 + r / k, k * n);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Compound Interest</h1>
            <p className="text-slate-600 mb-4">A = P(1 + r/k)^(kn)，P 本金、r 年利率（小數）、k 每年複利次數、n 年數。</p>
            <div className="grid md:grid-cols-2 gap-4 mb-6 text-sm">
              <label>P <input type="number" className="border rounded p-2 w-full" value={P} onChange={(e) => setP(Number(e.target.value))} /></label>
              <label>r (annual) <input type="number" step="0.005" className="border rounded p-2 w-full" value={r} onChange={(e) => setR(Number(e.target.value))} /></label>
              <label>n (years) <input type="number" min="1" className="border rounded p-2 w-full" value={n} onChange={(e) => setN(Number(e.target.value))} /></label>
              <label>k (compounds/year) <input type="number" min="1" className="border rounded p-2 w-full" value={k} onChange={(e) => setK(Math.max(1, Number(e.target.value)))} /></label>
            </div>
            <div className="rounded-2xl bg-slate-900 text-emerald-300 p-8 text-center text-2xl font-bold">
              A = {A.toFixed(2)}
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
