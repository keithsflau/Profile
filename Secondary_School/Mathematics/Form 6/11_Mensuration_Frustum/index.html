<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 Frustum | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [R, setR] = useState(6);
        const [r, setRsmall] = useState(3);
        const [h, setH] = useState(8);
        const V = (Math.PI * h / 3) * (R * R + R * r + r * r);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Cone Frustum Volume</h1>
            <p className="text-slate-600 mb-4">圓台體積 V = (πh/3)(R² + Rr + r²)，R、r 為上下底半徑，h 為高。</p>
            <div className="grid md:grid-cols-3 gap-4 mb-6">
              <label>R <input type="number" min="0.1" className="border rounded w-full p-2" value={R} onChange={(e) => setR(Number(e.target.value))} /></label>
              <label>r <input type="number" min="0.1" className="border rounded w-full p-2" value={r} onChange={(e) => setRsmall(Number(e.target.value))} /></label>
              <label>h <input type="number" min="0.1" className="border rounded w-full p-2" value={h} onChange={(e) => setH(Number(e.target.value))} /></label>
            </div>
            <div className="rounded-2xl bg-orange-900 text-white p-8 text-center text-2xl font-bold">
              V ≈ {V.toFixed(3)}
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
