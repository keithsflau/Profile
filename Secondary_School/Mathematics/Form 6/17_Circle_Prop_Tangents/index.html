<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>17 Tangents | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [r, setR] = useState(5);
        const [d, setD] = useState(13);
        const valid = d > r;
        const L = valid ? Math.sqrt(d * d - r * r) : 0;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Tangent Length (external point)</h1>
            <p className="text-slate-600 mb-4">由距圓心 d 的外點作切線，切線長 L = √(d² − r²)，需 d &gt; r。</p>
            <div className="grid md:grid-cols-2 gap-4 mb-6">
              <label>r <input type="number" className="border rounded p-2 w-full" value={r} onChange={(e) => setR(+e.target.value)} /></label>
              <label>d <input type="number" className="border rounded p-2 w-full" value={d} onChange={(e) => setD(+e.target.value)} /></label>
            </div>
            <div className={`rounded-xl p-8 text-center text-2xl font-bold ${valid ? "bg-emerald-900 text-white" : "bg-red-200 text-red-900"}`}>
              {valid ? `L = ${L.toFixed(4)}` : "d ≤ r：無法由此點向圓作實切線（示範）"}
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
