<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Mensuration | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [r, setR] = useState(5);
        const [h, setH] = useState(12);
        const Vsphere = (4 / 3) * Math.PI * Math.pow(r, 3);
        const Acyl = 2 * Math.PI * r * r + 2 * Math.PI * r * h;
        const Vcyl = Math.PI * r * r * h;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Mensuration (sphere & cylinder)</h1>
            <p className="text-slate-600 mb-4">球體體積 V = 4/3 πr³。圓柱：V = πr²h，全面積 = 2πr² + 2πrh。</p>
            <label className="block mb-2">半徑 r <input type="range" min="1" max="15" value={r} onChange={(e) => setR(Number(e.target.value))} className="w-full" /> {r}</label>
            <label className="block mb-6">柱高 h <input type="range" min="1" max="20" value={h} onChange={(e) => setH(Number(e.target.value))} className="w-full" /> {h}</label>
            <div className="space-y-3 bg-white rounded-xl border p-6 font-mono text-sm">
              <p>球體體積 ≈ {Vsphere.toFixed(2)}</p>
              <p>圓柱體積 ≈ {Vcyl.toFixed(2)}</p>
              <p>圓柱全面積 ≈ {Acyl.toFixed(2)}</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
