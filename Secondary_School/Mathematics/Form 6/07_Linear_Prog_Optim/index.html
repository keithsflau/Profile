<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 LP Optimization | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useMemo } = React;
      const App = () => {
        const vertices = useMemo(() => [
          { x: 0, y: 0 }, { x: 0, y: 4 }, { x: 2.5, y: 0 }, { x: 1, y: 3 }
        ], []);
        const inRegion = (x, y) => x >= 0 && y >= 0 && x + y <= 4 && 2 * x + y <= 5;
        const corners = vertices.filter((p) => inRegion(p.x, p.y));
        let best = { x: 0, y: 0, z: 0 };
        corners.forEach((p) => {
          const z = 3 * p.x + 2 * p.y;
          if (z > best.z) best = { ...p, z };
        });
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">LP: Corner Point Principle</h1>
            <p className="text-slate-600 mb-4">在線性約束與線性目標函數下，<strong>最優解（若存在）必出現在可行域的頂點</strong>。示範：Z = 3x + 2y，約束同上頁。</p>
            <ul className="bg-white rounded-xl border p-4 space-y-2 mb-4">
              {corners.map((p) => (
                <li key={`${p.x},${p.y}`} className="font-mono">頂點 ({p.x}, {p.y}) → Z = {(3 * p.x + 2 * p.y).toFixed(2)}</li>
              ))}
            </ul>
            <div className="bg-slate-900 text-amber-300 rounded-xl p-6 text-center text-xl font-bold">
              最大 Z ≈ {best.z.toFixed(2)} at ({best.x}, {best.y})
            </div>
            <p className="text-xs text-slate-500 mt-4">註：完整題目需列出所有頂點；此處示範部分頂點。</p>
            <a href="../index.html" className="text-blue-600 hover:underline mt-6 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
