<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 Locus | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [t, setT] = useState(0);
        const cx = 4, cy = 3, r = 5;
        const x = cx + r * Math.cos(t);
        const y = cy + r * Math.sin(t);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Locus: Circle</h1>
            <p className="text-slate-600 mb-4">參數式 (x,y) = (h + r cos t, k + r sin t) 描述圓心 (h,k)、半徑 r 的軌跡。</p>
            <label className="block mb-6">t (rad) <input type="range" min="0" max={2 * Math.PI} step="0.05" value={t} onChange={(e) => setT(+e.target.value)} className="w-full" /> {t.toFixed(2)}</label>
            <div className="bg-slate-900 text-green-300 rounded-xl p-6 font-mono">
              <p>圓心 ({cx}, {cy}), r = {r}</p>
              <p>P = ({x.toFixed(3)}, {y.toFixed(3)})</p>
              <p className="text-xs text-slate-400 mt-2">驗證：(x−h)²+(y−k)² = {((x-cx)**2+(y-cy)**2).toFixed(3)} ≈ r²</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
