<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 AS Intro | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [a1, setA1] = useState(3);
        const [d, setD] = useState(4);
        const [n, setN] = useState(6);
        const tn = a1 + (n - 1) * d;
        const Sn = (n / 2) * (2 * a1 + (n - 1) * d);
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl md:text-4xl font-bold mb-2">Arithmetic Sequences (AS)</h1>
            <p className="text-slate-600 mb-6">中六複習：首項 <span className="font-mono">a</span>、公差 <span className="font-mono">d</span>、第 <span className="font-mono">n</span> 項與前 <span className="font-mono">n</span> 項和。</p>
            <div className="bg-white rounded-2xl shadow border border-slate-200 p-6 mb-6 space-y-3 font-mono text-sm md:text-base">
              <p><strong>通項：</strong> T(n) = a + (n − 1)d</p>
              <p><strong>求和：</strong> S(n) = n/2 · [2a + (n − 1)d] = n/2 · (a + T(n))</p>
            </div>
            <div className="bg-slate-900 text-white rounded-2xl p-6 space-y-4">
              <h2 className="font-bold text-cyan-300">即時計算</h2>
              <label className="block text-sm">首項 a <input type="number" className="ml-2 text-slate-900 rounded px-2 py-1 w-24" value={a1} onChange={(e) => setA1(Number(e.target.value))} /></label>
              <label className="block text-sm">公差 d <input type="number" className="ml-2 text-slate-900 rounded px-2 py-1 w-24" value={d} onChange={(e) => setD(Number(e.target.value))} /></label>
              <label className="block text-sm">項數 n <input type="number" min="1" className="ml-2 text-slate-900 rounded px-2 py-1 w-24" value={n} onChange={(e) => setN(Math.max(1, Number(e.target.value)))} /></label>
              <p className="border-t border-slate-700 pt-3">第 {n} 項 T({n}) = <span className="text-amber-300 font-bold">{tn}</span></p>
              <p>前 {n} 項和 S({n}) = <span className="text-emerald-300 font-bold">{Sn}</span></p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his understanding. Jeremiah 10:12</p>
        <p class="text-xs mb-1 mt-2">「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12</p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">@ 2025 Education Engineering Portfolio | Prepared by SF Lau</p>
    </footer>
</body>
</html>
