<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Circle Angles | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [atCenter, setAtCenter] = useState(70);
        const atCirc = atCenter / 2;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Angle at Centre vs Circumference</h1>
            <p className="text-slate-600 mb-4">同弧所對的<strong>圓周角</strong> = 1/2 × <strong>圓心角</strong>。</p>
            <label className="block mb-6">圓心角 (°) <input type="range" min="0" max="180" value={atCenter} onChange={(e) => setAtCenter(+e.target.value)} className="w-full" /> {atCenter}°</label>
            <div className="bg-purple-900 text-white rounded-xl p-8 text-center">
              <p className="text-sm text-purple-200">圓周角</p>
              <p className="text-4xl font-bold">{atCirc.toFixed(1)}°</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
