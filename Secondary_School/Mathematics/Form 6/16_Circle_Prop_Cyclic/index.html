<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 Cyclic Quadrilateral | Form 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: system-ui, sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const App = () => {
        const [A, setA] = useState(80);
        const opp = 180 - A;
        return (
          <div className="max-w-3xl mx-auto p-6 md:p-10">
            <h1 className="text-3xl font-bold mb-2">Cyclic Quadrilateral</h1>
            <p className="text-slate-600 mb-4">圓內接四邊形對角互補：∠A + ∠C = 180°，∠B + ∠D = 180°。</p>
            <label className="block mb-6">∠A (°) <input type="range" min="1" max="179" value={A} onChange={(e) => setA(+e.target.value)} className="w-full" /> {A}°</label>
            <div className="bg-fuchsia-900 text-white rounded-xl p-8 text-center">
              <p className="text-sm">對角 ∠C（示範）</p>
              <p className="text-4xl font-bold">{opp}°</p>
            </div>
            <a href="../index.html" className="text-blue-600 hover:underline mt-8 inline-block">← Back to Form 6 dashboard</a>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <footer class="text-center py-4 text-slate-500 text-xs border-t mt-8">Jeremiah 10:12 · SF Lau</footer>
</body>
</html>
