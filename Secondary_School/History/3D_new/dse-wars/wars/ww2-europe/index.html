<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>War Map</title>
<style>
  :root{--f0:#8b4513;--f1:#1e5a8a;--ink:#eee6d2;--ink-dim:#b3a98c;--paper:#06080c;
    --panel:rgba(12,15,21,.74);--panel-edge:rgba(210,190,140,.26);--accent:#d8c08a;
    --mono:"Consolas","SFMono-Regular",ui-monospace,monospace;
    --cjk:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--cjk)}
  #scene{position:fixed;inset:0;z-index:0}
  #lower-scrim{position:fixed;left:0;right:0;bottom:0;height:44%;z-index:1;pointer-events:none;
    background:linear-gradient(to top,rgba(4,7,12,.84) 0%,rgba(4,7,12,.5) 36%,rgba(4,7,12,0) 100%)}
  #labels{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .lbl{transform:translate(-50%,-50%);text-align:center;text-shadow:0 1px 4px #000;white-space:nowrap;user-select:none;transition:opacity .45s}
  .lbl .zh{font-family:var(--cjk);font-weight:700;letter-spacing:1px}
  .lbl .en{font-family:var(--mono);letter-spacing:.5px;opacity:.72;font-size:.62em}
  .lbl.region .zh{font-size:19px;color:#f2ead2}
  .lbl.town .zh,.lbl.bay .zh{font-size:12px;color:#bfd4e8}
  .lbl.fort .zh{font-size:12px;color:#f0b48a}
  .lbl.linelbl .zh{font-size:12px;font-weight:700}
  .unit{transform:translate(-50%,-115%);min-width:90px;pointer-events:none;text-align:center}
  .unit .name{font-family:var(--cjk);font-weight:700;font-size:12px;text-shadow:0 1px 3px #000}
  .panel{background:var(--panel);border:1px solid var(--panel-edge);border-radius:10px;backdrop-filter:blur(7px);box-shadow:0 8px 30px rgba(0,0,0,.55)}
  #hud-tl{position:fixed;z-index:5;top:16px;left:18px;display:flex;flex-direction:column;gap:9px;max-width:min(330px,82vw);pointer-events:none}
  #title{padding:9px 15px 10px;pointer-events:auto}
  #title h1{font-size:21px;letter-spacing:3px;color:#f4ecd6}
  #title .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:2px;color:var(--ink-dim);margin-top:4px}
  #hub-link{font-family:var(--mono);font-size:9.5px;color:var(--accent);text-decoration:none;margin-top:4px;display:inline-block}
  #notes-btn,#lang-btn{margin-top:7px;font-family:var(--mono);font-size:9.5px;color:var(--accent);
    background:rgba(216,192,138,.08);border:1px solid var(--panel-edge);border-radius:6px;padding:3px 8px;cursor:pointer}
  #lang-btn{margin-left:6px}
  #disclaimer{font-size:9.5px;line-height:1.32;color:rgba(228,234,242,.92);text-shadow:0 1px 2px #000;pointer-events:none}
  #key{position:fixed;z-index:5;top:16px;right:18px;padding:8px 12px;font-size:11px}
  #key .row{display:flex;align-items:center;gap:7px;margin:2px 0}
  #key .sw{width:11px;height:11px;border-radius:3px;box-shadow:0 0 6px currentColor}
  #key .ln{width:16px;height:0;border-top:3px solid currentColor}
  #key .front{color:#ffb24a} #key .loc{color:#6fa0d8}
  #key .sep-factions,#key .sep{height:1px;background:var(--panel-edge);margin:6px 0}
  #caption{position:fixed;z-index:5;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);
    width:min(760px,92vw);text-align:center;opacity:0;transition:opacity .7s,transform .7s;pointer-events:none}
  #caption.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #caption .date{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--accent)}
  #caption .ttl{font-family:var(--cjk);font-weight:700;font-size:30px;color:#f6efda;text-shadow:0 2px 16px #000}
  #caption .ttl .en{display:block;font-family:var(--mono);font-weight:400;font-size:12px;color:var(--ink-dim);margin-top:3px}
  #caption .narr{font-size:14.5px;line-height:1.6;color:#f0e7d2;max-width:680px;margin:6px auto 0;text-shadow:0 1px 3px #000}
  #caption .narr .ne{display:block;font-family:var(--mono);font-size:11.5px;font-style:italic;color:#ded4b8;margin-top:3px}
  #caption .meta{display:flex;justify-content:center;gap:14px;margin-top:9px;flex-wrap:wrap}
  #caption .cmd{font-family:var(--mono);font-size:11px;color:#f0e4c4;border:1px solid var(--panel-edge);border-radius:20px;padding:3px 11px}
  #caption .str{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  #caption .str .bar{width:90px;height:5px;border-radius:3px;background:rgba(255,255,255,.12);overflow:hidden}
  #caption .str .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--f0),var(--f1))}
  #controls{position:fixed;z-index:6;left:50%;bottom:32px;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;width:min(760px,92vw);transition:opacity .5s}
  #controls.hide{opacity:0}
  #play{width:42px;height:42px;border-radius:50%;border:1px solid var(--panel-edge);background:var(--panel);color:var(--accent);font-size:16px;cursor:pointer}
  #prog{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.12);position:relative;cursor:pointer}
  #prog>i{display:block;height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--f1),var(--accent),var(--f0));transition:width .4s linear}
  #prog .beats{position:absolute;inset:0}
  #prog .beats b{position:absolute;top:-3px;width:2px;height:11px;background:rgba(255,255,255,.34);transform:translateX(-50%);cursor:pointer}
  #scene-label{font-family:var(--mono);font-size:10px;color:var(--ink-dim);min-width:42px;text-align:right}
  #resume{position:fixed;z-index:7;left:50%;top:24px;transform:translateX(-50%);display:none;
    font-size:13px;background:var(--panel);border:1px solid var(--accent);border-radius:22px;padding:8px 18px;cursor:pointer}
  #resume.show{display:block}
  #notes{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9;width:min(620px,92vw);max-height:78vh;display:none;flex-direction:column;overflow:hidden}
  #notes.open{display:flex}
  #notes .nhd{display:flex;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--panel-edge);font-family:var(--mono);font-size:11px;color:var(--accent)}
  #notes .nbody{padding:14px 17px;overflow:auto;font-size:12.5px;line-height:1.65;color:var(--ink-dim)}
  #hint{font-family:var(--mono);font-size:10px;color:var(--ink-dim);background:var(--panel);border:1px solid var(--panel-edge);border-radius:8px;padding:6px 10px;max-width:200px}
  #hint.hide{opacity:0}
  #boot{position:fixed;inset:0;z-index:50;background:radial-gradient(ellipse at center,#131922,#04060a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .8s}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .bt{font-size:30px;letter-spacing:7px;color:#f4ecd6}
  #boot .bs{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--accent)}
  #boot .bar{width:240px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
  #boot .bar>i{display:block;height:100%;width:30%;background:var(--accent);animation:load 1.1s ease-in-out infinite}
  @keyframes load{0%{margin-left:-30%}100%{margin-left:100%}}
  #boot .msg{font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  #err{position:fixed;inset:0;z-index:60;background:#1a0d0d;color:#ffd9d2;font-family:var(--mono);font-size:13px;padding:40px;display:none;white-space:pre-wrap}
</style>
</head>
<body>
  <div id="scene"></div>
  <div id="lower-scrim"></div>
  <div id="labels"></div>
  <div id="hud-tl">
    <div id="title" class="panel">
      <h1>載入中…</h1>
      <div class="sub"></div>
      <a id="hub-link" href="../../">← 返回目錄 · All wars</a>
      <button id="notes-btn">ⓘ 史料說明 · Notes</button>
      <button id="lang-btn">中／EN</button>
    </div>
    <div id="disclaimer">衛星地形 · 戰線示意 · 教學用途<br>Satellite terrain · illustrative fronts · educational</div>
    <div id="hint" class="panel"><b>自動導覽</b><br>拖曳可暫停</div>
  </div>
  <div id="key" class="panel">
    <div class="sep-factions"></div>
    <div class="sep"></div>
    <div class="row front"><span class="ln"></span><span>戰線 Front</span></div>
    <div class="row loc"><span class="ln"></span><span>界線 Boundary</span></div>
  </div>
  <div id="caption">
    <div class="date" id="cap-date"></div>
    <div class="ttl" id="cap-title"></div>
    <div class="narr" id="cap-narr"></div>
    <div class="meta" id="cap-meta"></div>
  </div>
  <div id="controls">
    <button id="play">⏸</button>
    <div id="prog"><i></i><div class="beats" id="prog-beats"></div></div>
    <div id="scene-label"></div>
  </div>
  <div id="resume">▶ 繼續導覽 · Resume</div>
  <div id="notes" class="panel">
    <div class="nhd"><span>史料說明 · NOTES</span><button id="notes-close">✕</button></div>
    <div id="notes-body" class="nbody"></div>
  </div>
  <div id="boot">
    <div class="bt">載入中</div>
    <div class="bs"></div>
    <div class="bar"><i></i></div>
    <div class="msg" id="boot-msg">載入真實地形中…</div>
  </div>
  <pre id="err"></pre>
  <script src="../../lib/three.min.js"></script>
  <script src="../../lib/OrbitControls.js"></script>
  <script src="../../lib/CSS2DRenderer.js"></script>
  <script src="data.js"></script>
  <script src="../../shared/app.js"></script>
</body>
</html>
