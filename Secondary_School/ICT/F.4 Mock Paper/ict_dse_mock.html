function render() {
    const app = el('app');
    app.innerHTML = '';
    
    if (currentView === 'home') app.innerHTML = getHomeHTML();
    else if (currentView === 'mc') app.innerHTML = getMcHTML();
    else if (currentView === 'lq') app.innerHTML = getLqHTML();
    else if (currentView === 'result') app.innerHTML = getResultHTML();
    
    window.scrollTo(0, 0);
}

                    </button>
                    <button ${currentMcIndex === 39 ? 'disabled' : ''} onclick="jumpToMc(${currentMcIndex + 1})" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition disabled:opacity-50 shadow-md">
                        下一題 <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- Right: Navigation Sidebar -->
            <div class="w-full md:w-64 flex-shrink-0">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-8">
                    <h4 class="font-bold text-slate-800 mb-4">答題進度</h4>
                    ${navGrid}
                    <div class="text-sm text-slate-500 text-center mb-4">已答: ${mcAnswers.filter(a => a !== null).length} / 40</div>
                    <button onclick="setView('home')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-lg transition">暫停作答</button>
                </div>
            </div>
        </div>
    `;
}

function getLqHTML() {
    const q = lqData[currentLqIndex];
    const draft = lqAnswers[currentLqIndex];

    return `
        <div class="fade-in max-w-4xl mx-auto">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
                <button onclick="setView('home')" class="text-slate-500 hover:text-slate-800 font-bold flex items-center gap-2">
                    <i class="fas fa-home"></i> 返回首頁
                </button>
                <div class="font-bold text-slate-800 bg-slate-100 px-4 py-1.5 rounded-lg">乙部 LQ <span class="text-emerald-600 ml-2">Q${currentLqIndex + 1} / 5</span></div>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-slate-200 mb-6">
                <div class="inline-block bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full mb-4">
                    ${q.topic}
                </div>
                <h3 class="text-lg md:text-xl font-medium text-slate-800 mb-8 whitespace-pre-wrap leading-relaxed">${q.q}</h3>
                
                <hr class="border-slate-100 my-8">
                
                <label class="block text-slate-700 font-bold mb-3 flex items-center gap-2">
                    <i class="fas fa-edit text-emerald-500"></i> 作答區 (草稿)
                </label>
                <textarea id="lq-input" onblur="saveLqDraft()" class="w-full p-5 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-emerald-50 focus:border-emerald-500 transition resize-y text-lg text-slate-700 bg-slate-50 leading-relaxed font-mono" rows="12" placeholder="在此輸入你的答案... (模擬考試環境，建議先寫出重點 Keyword)"></textarea>
            </div>

            <div class="flex justify-between gap-4">
                <button ${currentLqIndex === 0 ? 'disabled' : ''} onclick="jumpToLq(${currentLqIndex - 1})" class="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-4 rounded-xl transition disabled:opacity-50">
                    <i class="fas fa-arrow-left mr-2"></i> 上一題
                </button>
                <button ${currentLqIndex === 4 ? 'disabled' : ''} onclick="jumpToLq(${currentLqIndex + 1})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition disabled:opacity-50 shadow-md">
                    下一題 <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    `;
}

function getResultHTML() {
    // 計算 MC 成績
    mcScore = 0;
    mcAnswers.forEach((ans, idx) => {
        if (ans === mcData[idx].a) mcScore++;
    });
    const mcPercent = Math.round((mcScore / 40) * 100);

    // 生成 MC 答案對比表
    let mcReviewHTML = '<div class="space-y-6">';
    mcData.forEach((q, idx) => {
        const userAns = mcAnswers[idx];
        const isCorrect = userAns === q.a;
        
        let statusBadge = isCorrect 
            ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded text-sm font-bold"><i class="fas fa-check"></i> 正確</span>`
            : `<span class="bg-red-100 text-red-700 px-3 py-1 rounded text-sm font-bold"><i class="fas fa-times"></i> 錯誤</span>`;
        
        let missingWarning = userAns === null ? `<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded text-sm font-bold ml-2">未作答</span>` : '';

        mcReviewHTML += `
            <div class="p-6 rounded-xl border ${isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}">
                <div class="flex justify-between items-start mb-4">
                    <h4 class="font-bold text-slate-800 flex-grow pr-4">Q${idx + 1}. ${q.q}</h4>
                    <div class="flex-shrink-0">${statusBadge}${missingWarning}</div>
                </div>
                <div class="grid md:grid-cols-2 gap-4 text-sm mb-4">
                    <div class="p-3 bg-white rounded border border-slate-200">
                        <span class="font-bold text-slate-500 block mb-1">你的答案：</span>
                        <span class="${isCorrect ? 'text-green-600' : 'text-red-600'} font-medium">
                            ${userAns !== null ? String.fromCharCode(65 + userAns) + '. ' + q.o[userAns] : '--'}
                        </span>
                    </div>
                    <div class="p-3 bg-white rounded border border-slate-200">
                        <span class="font-bold text-slate-500 block mb-1">正確答案：</span>
                        <span class="text-green-600 font-medium">${String.fromCharCode(65 + q.a)}. ${q.o[q.a]}</span>
                    </div>
                </div>
                <div class="bg-white/60 p-4 rounded text-sm text-slate-700 border border-slate-200/60">
                    <span class="font-bold text-slate-800"><i class="fas fa-lightbulb text-yellow-500"></i> 解釋：</span> ${q.exp}
                </div>
            </div>
        `;
    });
    mcReviewHTML += '</div>';

    // 生成 LQ 答案對比
    let lqReviewHTML = '<div class="space-y-8">';
    lqData.forEach((q, idx) => {
        lqReviewHTML += `
            <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-start mb-4">
                    <h4 class="text-lg font-bold text-slate-800">Q${idx + 1}</h4>
                    <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded text-xs font-bold">${q.topic}</span>
                </div>
                <p class="text-slate-700 mb-6 whitespace-pre-wrap">${q.q}</p>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <div class="font-bold text-slate-500 mb-2 border-b pb-2"><i class="fas fa-user-edit"></i> 你的作答</div>
                        <div class="p-4 bg-slate-50 rounded-lg text-slate-700 whitespace-pre-wrap font-mono text-sm min-h-[150px] border border-slate-200">${lqAnswers[idx] || '<span class="italic text-slate-400">未填寫答案</span>'}</div>
                    </div>
                    <div>
                        <div class="font-bold text-emerald-600 mb-2 border-b border-emerald-100 pb-2"><i class="fas fa-check-double"></i> 官方 Marking Scheme</div>
                        <div class="p-4 bg-emerald-50 rounded-lg text-slate-800 whitespace-pre-wrap text-sm min-h-[150px] border border-emerald-200 leading-relaxed">${q.ans}</div>
                    </div>
                </div>
            </div>
        `;
    });
    lqReviewHTML += '</div>';

    return `
        <div class="fade-in max-w-5xl mx-auto space-y-8">
            <div class="bg-slate-800 text-white p-10 rounded-3xl shadow-xl text-center relative overflow-hidden">
                <h1 class="text-4xl font-bold mb-4 z-10 relative">考試報告</h1>
                <p class="text-slate-300 z-10 relative mb-8">請仔細核對以下答案及解釋，從錯誤中學習才是 Mock 卷的真正價值。</p>
                
                <div class="inline-block bg-white/10 backdrop-blur border border-white/20 p-6 rounded-2xl z-10 relative">
                    <div class="text-sm font-bold text-slate-300 mb-1 uppercase tracking-widest">甲部 MC 得分</div>
                    <div class="text-5xl font-black text-blue-400 mb-2">${mcScore} <span class="text-2xl text-slate-400">/ 40</span></div>
                    <div class="text-sm text-slate-300 font-medium">準確率: ${mcPercent}%</div>
                </div>
                
                <i class="fas fa-chart-line text-9xl absolute -right-4 -bottom-8 opacity-10"></i>
            </div>

            <!-- Tabs for Report -->
            <div class="flex border-b border-slate-200">
                <button onclick="toggleReportTab('mc-tab')" id="btn-mc-tab" class="px-8 py-4 font-bold text-blue-600 border-b-2 border-blue-600">甲部 MC 詳解</button>
                <button onclick="toggleReportTab('lq-tab')" id="btn-lq-tab" class="px-8 py-4 font-bold text-slate-500 hover:text-slate-800">乙部 LQ 核對</button>
            </div>

            <div id="mc-tab" class="report-tab block">
                ${mcReviewHTML}
            </div>

            <div id="lq-tab" class="report-tab hidden">
                <div class="bg-yellow-50 border border-yellow-200 p-4 rounded-xl mb-6 text-yellow-800 text-sm font-medium flex gap-3">
                    <i class="fas fa-info-circle text-xl"></i>
                    <p>乙部為結構式問題，系統無法自動批改。請對照右側的 Marking Scheme，自行評估自己是否命中了關鍵字 (Keywords) 及取得對應分數。</p>
                </div>
                ${lqReviewHTML}
            </div>

            <div class="text-center pt-8 border-t border-slate-200">
                <button onclick="location.reload()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-8 rounded-xl transition">
                    <i class="fas fa-redo"></i> 重新開始 Mock 卷
                </button>
            </div>
        </div>
    `;
}

// --- 控制邏輯 ---
function setView(view) {
    if (currentView === 'lq') saveLqDraft();
    currentView = view;
    render();
    if (view === 'lq') {
        // Restore draft content when entering LQ view
        setTimeout(() => {
            const input = el('lq-input');
            if(input) input.value = lqAnswers[currentLqIndex] || '';
        }, 0);
    }
}

function setMcAnswer(idx) {
    mcAnswers[currentMcIndex] = idx;
    render();
}

function jumpToMc(idx) {
    if (idx >= 0 && idx < 40) {
        currentMcIndex = idx;
        render();
    }
}

function saveLqDraft() {
    const input = el('lq-input');
    if (input) lqAnswers[currentLqIndex] = input.value;
}

function jumpToLq(idx) {
    saveLqDraft();
    if (idx >= 0 && idx < 5) {
        currentLqIndex = idx;
        render();
        setTimeout(() => {
            const input = el('lq-input');
            if(input) input.value = lqAnswers[currentLqIndex] || '';
        }, 0);
    }
}

function submitExam() {
    const mcMissing = mcAnswers.filter(a => a === null).length;
    let msg = "確定要交卷嗎？\n";
    if (mcMissing > 0) msg += `\n注意：甲部還有 ${mcMissing} 題未作答！`;
    
    // 使用原生 confirm (基於系統指令，避免使用 alert/confirm，這裡改為直接交卷。若需提示，應實作客製化 Modal)
    // 為了符合 Mandatory Rule: Do not use alert() and confirm() under any circumstances.
    // 我直接跳轉至結果頁面，或你可以自行添加 HTML Modal
    
    if (currentView === 'lq') saveLqDraft();
    setView('result');
}

// 用於報告頁面的標籤切換
window.toggleReportTab = function(tabId) {
    document.querySelectorAll('.report-tab').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('block'));
    
    document.getElementById(tabId).classList.remove('hidden');
    document.getElementById(tabId).classList.add('block');
    
    // Reset button styles
    document.getElementById('btn-mc-tab').className = "px-8 py-4 font-bold text-slate-500 hover:text-slate-800";
    document.getElementById('btn-lq-tab').className = "px-8 py-4 font-bold text-slate-500 hover:text-slate-800";
    
    // Active button style
    document.getElementById('btn-' + tabId).className = "px-8 py-4 font-bold text-blue-600 border-b-2 border-blue-600";
}

// 初始化
render();
</script>
</body>
</html>
