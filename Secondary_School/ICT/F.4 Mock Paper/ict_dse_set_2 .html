let currentView = 'dashboard';

function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';
    
    if (currentView === 'dashboard') {
        app.innerHTML = getDashboardHTML();
    } else if (currentView === 'mc') {
        app.innerHTML = getMcHTML();
    } else if (currentView === 'lq') {
        app.innerHTML = getLqHTML();
    }
}

function getMcHTML() {
    const q = mcData[currentMcIndex];
    const isAnswered = mcAnswers[currentMcIndex] !== undefined;
    const selectedOpt = mcAnswers[currentMcIndex];
    const isCorrect = selectedOpt === q.a;
    
    let mcScore = 0;
    for (let key in mcAnswers) {
        if (mcAnswers[key] === mcData[key].a) mcScore++;
    }

    let optionsHTML = '';
    q.o.forEach((opt, idx) => {
        let btnClass = "w-full text-left p-5 rounded-xl border-2 mb-3 option-btn font-medium text-lg text-gray-700 flex justify-between items-center ";
        let iconHTML = '';
        
        if (!isAnswered) {
            btnClass += "border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 hover:text-indigo-800 bg-white shadow-sm cursor-pointer";
        } else {
            if (idx === q.a) {
                btnClass += "border-green-500 bg-green-50 text-green-800 shadow-md";
                iconHTML = '<i class="fas fa-check-circle text-2xl text-green-500"></i>';
            } else if (selectedOpt === idx) {
                btnClass += "border-red-400 bg-red-50 text-red-800";
                iconHTML = '<i class="fas fa-times-circle text-2xl text-red-400"></i>';
            } else {
                btnClass += "border-gray-200 bg-gray-50 opacity-60";
            }
        }

        optionsHTML += `
            <button ${isAnswered ? 'disabled' : ''} onclick="answerMc(${idx})" class="${btnClass}">
                <span><span class="mr-3 font-bold opacity-70">${String.fromCharCode(65 + idx)}.</span> ${opt}</span>
                ${iconHTML}
            </button>
        `;
    });

    let explanationHTML = '';
    if (isAnswered) {
        explanationHTML = `
            <div class="mt-8 p-6 rounded-xl border-l-4 shadow-sm fade-in ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}">
                <div class="flex items-start gap-4">
                    <div class="mt-1">
                        <i class="fas fa-lightbulb text-2xl ${isCorrect ? 'text-green-500' : 'text-red-500'}"></i>
                    </div>
                    <div>
                        <h4 class="text-lg font-bold mb-2 ${isCorrect ? 'text-green-800' : 'text-red-800'}">
                            ${isCorrect ? '答對了！實力穩固！' : `答錯了！正確答案是 ${String.fromCharCode(65 + q.a)}`}
                        </h4>
                        <p class="text-gray-700 text-lg leading-relaxed">${q.exp}</p>
                    </div>
                </div>
            </div>
        `;
    }

    return `
        <div class="space-y-6 fade-in max-w-4xl mx-auto">
            <div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <button onclick="changeView('dashboard')" class="text-gray-500 hover:text-indigo-700 flex items-center gap-2 font-bold transition-colors">
                    <i class="fas fa-chevron-left"></i> 返回儀表板
                </button>
                <div class="font-bold text-gray-800 text-lg">MC 挑戰 <span class="text-indigo-600 ml-2">第 ${currentMcIndex + 1} / ${mcData.length} 題</span></div>
                <div class="text-sm font-bold bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full shadow-inner">
                    得分: ${mcScore}
                </div>
            </div>

            <div class="glass-panel p-8 md:p-10 rounded-2xl shadow-lg border border-gray-200">
                <h3 class="text-2xl font-bold text-gray-800 mb-8 leading-relaxed">
                    <span class="text-indigo-500 mr-2">Q${currentMcIndex + 1}.</span>${q.q}
                </h3>
                <div class="space-y-4">
                    ${optionsHTML}
                </div>
                ${explanationHTML}
            </div>

            <div class="flex justify-between items-center gap-4 mt-6">
                <button ${currentMcIndex === 0 ? 'disabled' : ''} onclick="prevMc()" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                    <i class="fas fa-arrow-left mr-2"></i> 上一題
                </button>
                <button ${currentMcIndex === mcData.length - 1 ? 'disabled' : ''} onclick="nextMc()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                    下一題 <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    `;
}

        answerArea = `
            <div class="mt-6 fade-in">
                <label class="block text-gray-700 font-bold mb-3 text-lg"><i class="fas fa-keyboard mr-2 text-emerald-500"></i>你的作答草稿：</label>
                <textarea id="lq-draft" class="w-full p-5 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-400 transition-all resize-y text-lg text-gray-700 bg-gray-50 placeholder-gray-400" rows="6" placeholder="在此輸入你的答案... (切記要中 Point！)">${draft}</textarea>
                <button onclick="revealLq()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2 text-lg">
                    <i class="fas fa-eye"></i> 核對 Marking Scheme
                </button>
            </div>
        `;
    } else {
        answerArea = `
            <div class="mt-6 space-y-6 fade-in">
                <div class="p-5 bg-gray-50 rounded-xl border border-gray-200">
                    <label class="block text-gray-500 font-bold mb-2"><i class="fas fa-user-edit mr-2"></i>你的作答：</label>
                    <div class="text-gray-700 whitespace-pre-wrap text-lg min-h-[4rem]">${draft || '<span class="italic text-gray-400">沒有填寫草稿</span>'}</div>
                </div>
                
                <div class="p-6 md:p-8 bg-emerald-50 rounded-2xl border-2 border-emerald-200 shadow-inner">
                    <label class="block text-emerald-800 font-bold mb-4 text-xl flex items-center"><i class="fas fa-check-double mr-3 text-2xl"></i>官方建議答案 / 評分標準：</label>
                    <div class="text-gray-800 whitespace-pre-wrap text-lg leading-relaxed">${q.ans}</div>
                </div>
            </div>
        `;
    }

    return `
        <div class="space-y-6 fade-in max-w-4xl mx-auto">
            <div class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <button onclick="changeView('dashboard')" class="text-gray-500 hover:text-emerald-700 flex items-center gap-2 font-bold transition-colors">
                    <i class="fas fa-chevron-left"></i> 返回儀表板
                </button>
                <div class="font-bold text-gray-800 text-lg">LQ 模擬 <span class="text-emerald-600 ml-2">第 ${currentLqIndex + 1} / ${lqData.length} 題</span></div>
                <div class="text-sm font-bold bg-emerald-100 text-emerald-800 px-4 py-2 rounded-full shadow-inner">
                    ${q.topic}
                </div>
            </div>

            <div class="glass-panel p-8 md:p-10 rounded-2xl shadow-lg border border-gray-200">
                <h3 class="text-2xl font-bold text-gray-800 mb-4 leading-relaxed">
                    <span class="text-emerald-500 mr-2">Q${currentLqIndex + 1}.</span>${q.q}
                </h3>
                <hr class="border-gray-200 my-6">
                ${answerArea}
            </div>

            <div class="flex justify-between items-center gap-4 mt-6">
                <button ${currentLqIndex === 0 ? 'disabled' : ''} onclick="prevLq()" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                    <i class="fas fa-arrow-left mr-2"></i> 上一題
                </button>
                <button ${currentLqIndex === lqData.length - 1 ? 'disabled' : ''} onclick="nextLq()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                    下一題 <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    `;
}

// --- 邏輯與事件處理 ---

function changeView(view) {
    if (currentView === 'lq' && !lqRevealed[currentLqIndex]) {
        const draftArea = document.getElementById('lq-draft');
        if (draftArea) lqDrafts[currentLqIndex] = draftArea.value;
    }
    currentView = view;
    render();
    window.scrollTo(0, 0);
}

function answerMc(idx) {
    if (mcAnswers[currentMcIndex] !== undefined) return;
    mcAnswers[currentMcIndex] = idx;
    render();
}

function nextMc() {
    if (currentMcIndex < mcData.length - 1) {
        currentMcIndex++;
        render();
        window.scrollTo(0, 0);
    }
}

function prevMc() {
    if (currentMcIndex > 0) {
        currentMcIndex--;
        render();
        window.scrollTo(0, 0);
    }
}

function revealLq() {
    const draftArea = document.getElementById('lq-draft');
    if (draftArea) {
        lqDrafts[currentLqIndex] = draftArea.value;
    }
    lqRevealed[currentLqIndex] = true;
    render();
}

function nextLq() {
    if (!lqRevealed[currentLqIndex]) {
        const draftArea = document.getElementById('lq-draft');
        if (draftArea) lqDrafts[currentLqIndex] = draftArea.value;
    }
    if (currentLqIndex < lqData.length - 1) {
        currentLqIndex++;
        render();
        window.scrollTo(0, 0);
    }
}

function prevLq() {
    if (!lqRevealed[currentLqIndex]) {
        const draftArea = document.getElementById('lq-draft');
        if (draftArea) lqDrafts[currentLqIndex] = draftArea.value;
    }
    if (currentLqIndex > 0) {
        currentLqIndex--;
        render();
        window.scrollTo(0, 0);
    }
}

// 初始化渲染
render();
</script>
</body>
</html>
