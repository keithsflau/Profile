<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Learning | Interactive Coding</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Skulpt (Python in Browser) -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc; /* Light Gray Background */
        color: #334155;
      }
      .font-mono {
        font-family: "JetBrains Mono", monospace;
      }
      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Code Editor Styles */
      .code-editor {
        caret-color: #fbbf24;
        outline: none;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col overflow-hidden">
    <!-- React Router DOM (Optional, added for router capabilities) -->
    <script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"></script>

    <div id="root">
      <div class="flex items-center justify-center h-screen text-slate-500">
        Loading Python Lab... (If this takes too long, check your internet
        connection)
      </div>
    </div>

    <script>
      // Dependency Check
      window.onload = function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          document.getElementById("root").innerHTML =
            '<div class="text-red-500 p-10 font-bold">Error: React or ReactDOM failed to load. Please check your internet connection or the CDN links.</div>';
        }
      };
    </script>
    <script src="data.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // Data loaded from data.js

      // --- Main Application Component ---
      function App() {
        const [activeModuleId, setActiveModuleId] = useState("1.1");
        const [activeSubtopicId, setActiveSubtopicId] = useState("intro");
        const [userCode, setUserCode] = useState("");
        const [output, setOutput] = useState("");
        const [isRunning, setIsRunning] = useState(false);
        const [showAnswer, setShowAnswer] = useState(false);

        const currentModule = curriculum.find((m) => m.id === activeModuleId);
        const currentSubtopic = currentModule?.subtopics.find(
          (s) => s.id === activeSubtopicId,
        );

        useEffect(() => {
          lucide.createIcons();
        }, []);

        useEffect(() => {
          if (currentSubtopic) {
            setUserCode(currentSubtopic.initialCode);
            setOutput("");
            setShowAnswer(false);
          }
        }, [currentSubtopic]);

        const runPython = async () => {
          setIsRunning(true);
          setOutput("");

          function builtin(x) {
            if (
              Sk.builtinFiles === undefined ||
              Sk.builtinFiles["files"][x] === undefined
            )
              throw "File not found: '" + x + "'";
            return Sk.builtinFiles["files"][x];
          }

          function outputFunc(text) {
            setOutput((prev) => prev + text);
          }

          Sk.configure({
            output: outputFunc,
            read: builtin,
            __future__: Sk.python3,
            inputfun: function (prompt) {
              return window.prompt(prompt || "Input:");
            },
            inputfunTakesPrompt: true,
          });

          try {
            await Sk.misceval.asyncToPromise(function () {
              return Sk.importMainWithBody("<stdin>", false, userCode, true);
            });
          } catch (e) {
            setOutput((prev) => prev + "\\nError: " + e.toString());
          } finally {
            setIsRunning(false);
          }
        };

        return (
          <div className="flex h-screen w-full bg-[#f8fafc]">
            {/* 1. Left Sidebar (Navigation) */}
            <div className="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0">
              {/* Site Header */}
              <div className="bg-[#4f46e5] p-5">
                {" "}
                {/* Using Indigo/Blue similar to screenshot */}
                <div className="flex items-center gap-2 text-white">
                  <i data-lucide="box" className="w-6 h-6"></i>
                  <div>
                    <h1 className="font-bold text-lg leading-tight">
                      Python Learning
                    </h1>
                    <p className="text-xs text-indigo-200">
                      Interactive Coding
                    </p>
                  </div>
                </div>
              </div>

              {/* Nav List */}
              <div className="flex-1 overflow-y-auto py-2">
                {curriculum.map((mod) => (
                  <div key={mod.id} className="mb-1">
                    <div className="px-4 py-2 font-bold text-slate-700 text-sm flex justify-between items-center group cursor-pointer hover:bg-slate-50">
                      {mod.title}
                      <i
                        data-lucide="chevron-down"
                        className="w-4 h-4 text-slate-400"
                      ></i>
                    </div>
                    <div className="pl-0">
                      {mod.subtopics.map((sub) => (
                        <button
                          key={sub.id}
                          onClick={() => {
                            setActiveModuleId(mod.id);
                            setActiveSubtopicId(sub.id);
                          }}
                          className={`w-full text-left px-8 py-2 text-sm border-l-4 transition-colors ${activeSubtopicId === sub.id ? "border-blue-500 bg-blue-50 text-blue-700 font-medium" : "border-transparent text-slate-500 hover:bg-slate-50"}`}
                        >
                          {sub.title}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 2. Main Content (Center) */}
            <div className="flex-1 flex flex-col min-w-0 bg-[#f8fafc] overflow-y-auto">
              <div className="p-6 max-w-5xl mx-auto w-full h-full flex flex-col">
                {/* Header Row */}
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <h2 className="text-2xl font-bold text-slate-800">
                      {currentSubtopic?.title}
                    </h2>
                    <p className="text-slate-500 text-sm">
                      {currentModule?.title}
                    </p>
                  </div>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setUserCode(currentSubtopic?.initialCode)}
                      className="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg shadow-sm hover:bg-slate-50 text-sm font-medium flex items-center gap-2"
                    >
                      <i data-lucide="rotate-ccw" className="w-4 h-4"></i> Reset
                    </button>
                    <button
                      onClick={() => setShowAnswer(!showAnswer)}
                      className="px-4 py-2 bg-amber-500 text-white rounded-lg shadow-sm hover:bg-amber-600 text-sm font-medium flex items-center gap-2"
                    >
                      <i data-lucide="lightbulb" className="w-4 h-4"></i>{" "}
                      {showAnswer ? "Hide Answer" : "Show Answer"}
                    </button>
                    <button
                      onClick={runPython}
                      className="px-4 py-2 bg-green-500 text-white rounded-lg shadow-sm hover:bg-green-600 text-sm font-medium flex items-center gap-2"
                      disabled={isRunning}
                    >
                      {isRunning ? (
                        <i
                          data-lucide="loader-2"
                          className="animate-spin w-4 h-4"
                        ></i>
                      ) : (
                        <i
                          data-lucide="play"
                          className="w-4 h-4 fill-current"
                        ></i>
                      )}
                      Run Code
                    </button>
                  </div>
                </div>

                {/* Instruction Box */}
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-6 flex gap-4">
                  <div className="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0 text-blue-600">
                    <i data-lucide="book" className="w-5 h-5"></i>
                  </div>
                  <div className="flex-1">
                    <h3 className="font-bold text-slate-800 mb-1">
                      Instructions
                    </h3>
                    <div className="text-slate-600 text-sm leading-relaxed whitespace-pre-line mb-3">
                      {currentSubtopic?.content}
                    </div>

                    {/* Task Box */}
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 flex items-start gap-3">
                      <i
                        data-lucide="target"
                        className="w-5 h-5 text-yellow-600 mt-0.5"
                      ></i>
                      <div>
                        <span className="font-bold text-yellow-800 text-sm">
                          Task:{" "}
                        </span>
                        <span className="text-yellow-800 text-sm">
                          {currentSubtopic?.task}
                        </span>
                      </div>
                    </div>

                    {/* Answer Display */}
                    {showAnswer && (
                      <div className="mt-4 bg-slate-100 p-3 rounded-lg border border-slate-200 font-mono text-sm text-slate-700">
                        <h4 className="font-bold text-xs text-slate-500 uppercase mb-2">
                          Solution
                        </h4>
                        {currentSubtopic?.answer}
                      </div>
                    )}
                  </div>
                </div>

                {/* Split View: Editor & Output */}
                <div className="flex-1 flex gap-4 min-h-[400px]">
                  {/* Editor */}
                  <div className="flex-1 flex flex-col rounded-xl overflow-hidden shadow-lg border border-slate-800">
                    <div className="bg-[#1e293b] px-4 py-2 flex items-center gap-2">
                      <div className="flex gap-1.5">
                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                        <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div className="w-3 h-3 rounded-full bg-green-500"></div>
                      </div>
                      <span className="ml-2 text-xs font-mono text-slate-400">
                        main.py
                      </span>
                    </div>
                    <textarea
                      value={userCode}
                      onChange={(e) => setUserCode(e.target.value)}
                      className="flex-1 bg-[#0f172a] text-[#fbbf24] p-4 font-mono text-sm leading-6 resize-none code-editor"
                      spellCheck="false"
                    ></textarea>
                  </div>

                  {/* Output */}
                  <div className="flex-1 flex flex-col rounded-xl overflow-hidden shadow-lg border border-slate-800">
                    <div className="bg-[#1e293b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
                      <i
                        data-lucide="terminal-square"
                        className="w-4 h-4 text-blue-400"
                      ></i>
                      <span className="text-xs font-semibold text-slate-300">
                        Output
                      </span>
                    </div>
                    <div className="flex-1 bg-[#0f172a] p-4 font-mono text-sm text-slate-300 whitespace-pre-wrap overflow-y-auto">
                      {output || (
                        <span className="text-slate-600">
                          Click "Run Code" to execute...
                        </span>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* 3. Right Sidebar (Keywords) */}
            <div className="w-72 bg-white border-l border-slate-200 flex flex-col flex-shrink-0">
              {/* Header for keywords - Purple */}
              <div className="bg-purple-600 p-4 text-white">
                <div className="flex items-center gap-2 mb-1">
                  <i data-lucide="zap" className="w-4 h-4 text-yellow-300"></i>
                  <h3 className="font-bold text-sm">Python Keywords</h3>
                </div>
                <p className="text-xs text-purple-200 opacity-90">
                  Used in current exercise
                </p>
              </div>

              {/* Used Keywords List */}
              <div className="p-4 flex flex-col gap-3 flex-1 overflow-y-auto">
                {currentSubtopic?.keywords?.map((k) => (
                  <div
                    key={k}
                    className="bg-purple-50 border border-purple-100 rounded-lg p-3 shadow-sm"
                  >
                    <code className="text-purple-700 font-bold bg-purple-100 px-1.5 py-0.5 rounded text-sm block w-max mb-1">
                      {k}
                    </code>
                    {keywordInfo[k] && (
                      <>
                        <p className="text-xs text-slate-600 mb-2 leading-snug">
                          {keywordInfo[k].desc}
                        </p>
                        <div className="bg-slate-900 text-yellow-300 text-[10px] font-mono p-2 rounded">
                          {keywordInfo[k].syntax}
                        </div>
                      </>
                    )}
                  </div>
                ))}
              </div>

              {/* All Keywords Grid at Bottom */}
              <div className="border-t border-slate-200 bg-slate-50 p-4">
                <h4 className="text-xs font-bold text-slate-400 uppercase mb-3">
                  All Keywords
                </h4>
                <div className="flex flex-wrap gap-1.5">
                  {Object.keys(keywordInfo).map((k) => (
                    <span
                      key={k}
                      className={`text-[10px] px-1.5 py-0.5 rounded border ${currentSubtopic?.keywords?.includes(k) ? "bg-purple-100 text-purple-700 border-purple-200 font-bold" : "bg-white text-slate-500 border-slate-200"}`}
                    >
                      {k}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
