<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>詩歌播放器 | AI 歌曲</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary: #6366f1;
        --primary-light: #818cf8;
        --accent: #10b981;
        --bg-card: #ffffff;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border: #e2e8f0;
      }
      body {
        font-family: "Noto Sans TC", sans-serif;
        background: linear-gradient(
          180deg,
          #f0f9ff 0%,
          #e0f2fe 50%,
          #f0fdf4 100%
        );
        color: var(--text-primary);
        min-height: 100vh;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        min-height: 100vh;
      }
      .card {
        background: var(--bg-card);
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .header {
        grid-column: 1 / -1;
        padding: 20px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .logo {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .header h1 {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .header p {
        color: var(--text-secondary);
      }
      .upload-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }
      #file-input {
        display: none;
      }
      .playlist-section {
        padding: 20px;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 130px);
      }
      .playlist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
      }
      .playlist-header h2 {
        font-size: 1.2rem;
        font-weight: 600;
      }
      .song-count {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
      }
      .playlist {
        flex: 1;
        overflow-y: auto;
      }
      .song-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 6px;
        border: 2px solid transparent;
      }
      .song-item:hover {
        background: #f1f5f9;
        border-color: var(--primary-light);
      }
      .song-item.active {
        background: linear-gradient(135deg, #ede9fe, #e0e7ff);
        border-color: var(--primary);
      }
      .song-item.active .song-index {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
      }
      .song-index {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 600;
        flex-shrink: 0;
      }
      .song-info {
        flex: 1;
        overflow: hidden;
      }
      .song-title {
        font-size: 0.9rem;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .song-theme {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-top: 2px;
      }
      .song-delete {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        opacity: 0;
        transition: all 0.2s ease;
      }
      .song-item:hover .song-delete {
        opacity: 1;
      }
      .song-delete:hover {
        background: #fee2e2;
        color: #ef4444;
      }
      .player-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }
      .video-container {
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        position: relative;
      }
      #video-player {
        width: 100%;
        display: block;
        max-height: 400px;
      }
      .video-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        min-height: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1e1b4b, #312e81);
        color: white;
      }
      .video-placeholder-icon {
        font-size: 4rem;
        margin-bottom: 15px;
      }
      .video-placeholder p {
        font-size: 1.1rem;
        opacity: 0.8;
      }
      /* Lyrics Section */
      .lyrics-section {
        background: linear-gradient(135deg, #fefce8, #fef9c3);
        border-radius: 16px;
        padding: 20px;
        max-height: 300px;
        overflow-y: auto;
        display: none;
      }
      .lyrics-section.active {
        display: block;
      }
      .lyrics-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #fde047;
      }
      .lyrics-header h3 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #854d0e;
      }
      .lyrics-toggle {
        padding: 6px 14px;
        background: #fde047;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #854d0e;
        cursor: pointer;
      }
      .lyrics-content {
        font-size: 1rem;
        line-height: 1.8;
        color: #713f12;
        white-space: pre-wrap;
      }
      .lyrics-content .section-tag {
        font-weight: 700;
        color: #a16207;
        margin-top: 12px;
        display: block;
      }
      .now-playing {
        text-align: center;
        padding: 20px;
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        border-radius: 16px;
      }
      .now-playing-label {
        font-size: 0.85rem;
        color: #92400e;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }
      .now-playing-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #78350f;
      }
      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e2e8f0;
        border-radius: 5px;
        cursor: pointer;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 5px;
        transition: width 0.1s linear;
      }
      .time-display {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: 10px;
      }
      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 15px;
      }
      .control-btn {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: none;
        background: #f1f5f9;
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        font-size: 1.3rem;
      }
      .control-btn:hover {
        background: #e2e8f0;
        transform: scale(1.1);
      }
      .control-btn.active {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
      }
      .control-btn.play-btn {
        width: 72px;
        height: 72px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        font-size: 1.8rem;
        box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);

      .volume-section {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 18px;
        background: #f8fafc;
        border-radius: 14px;
      }
      .volume-icon {
        font-size: 1.4rem;
        cursor: pointer;
      }
      .volume-slider {
        flex: 1;
        height: 8px;
        appearance: none;
        -webkit-appearance: none;
        background: #e2e8f0;
        border-radius: 4px;
        outline: none;
      }
      .volume-slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 50%;
        cursor: pointer;
      }
      .volume-value {
        font-size: 1rem;
        font-weight: 600;
        min-width: 50px;
        text-align: right;
      }
      .drop-zone {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(99, 102, 241, 0.95);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: white;
      }
      .drop-zone.active {
        display: flex;
      }
      .drop-zone-icon {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: bounce 1s infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
        .header {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
        .playlist-section {
          max-height: 300px;
        }
      }
    </style>
  </head>

      // State
      let songs = [...defaultSongs];
      let uploadedSongs = [];
      let currentIndex = -1;
      let isPlaying = false;
      let isShuffle = false;
      let repeatMode = 0;
      let shuffleOrder = [];
      let lyricsVisible = true;

      // DOM
      const player = document.getElementById("video-player");
      const videoPlaceholder = document.getElementById("video-placeholder");
      const playlistEl = document.getElementById("playlist");
      const playBtn = document.getElementById("play-btn");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const shuffleBtn = document.getElementById("shuffle-btn");
      const repeatBtn = document.getElementById("repeat-btn");
      const progressBar = document.getElementById("progress-bar");
      const progressFill = document.getElementById("progress-fill");
      const currentTimeEl = document.getElementById("current-time");
      const durationEl = document.getElementById("duration");
      const nowPlayingTitle = document.getElementById("now-playing-title");
      const volumeSlider = document.getElementById("volume-slider");
      const volumeValue = document.getElementById("volume-value");
      const muteBtn = document.getElementById("mute-btn");
      const uploadBtn = document.getElementById("upload-btn");
      const fileInput = document.getElementById("file-input");
      const dropZone = document.getElementById("drop-zone");
      const lyricsSection = document.getElementById("lyrics-section");
      const lyricsContent = document.getElementById("lyrics-content");
      const lyricsToggle = document.getElementById("lyrics-toggle");

      function getAllSongs() {
        return [...songs, ...uploadedSongs];
      }

      function renderPlaylist() {
        const allSongs = getAllSongs();
        playlistEl.innerHTML = "";
        if (allSongs.length === 0) {
          playlistEl.innerHTML =
            '<div style="text-align:center;padding:40px;color:#64748b;">📂 播放清單是空的</div>';
          document.getElementById("song-count").textContent = "0 首";
          return;
        }
        allSongs.forEach((song, index) => {
          const isUploaded = index >= songs.length;
          const item = document.createElement("div");
          item.className = `song-item ${
            index === currentIndex ? "active" : ""
          }`;
          item.innerHTML = `
            <div class="song-index">${index + 1}</div>
            <div class="song-info">
              <div class="song-title">${song.title}</div>
              <div class="song-theme">${song.theme}${
            isUploaded ? " 📤" : ""
          }</div>
            </div>
            ${
              isUploaded
                ? `<button class="song-delete" data-index="${index}">✕</button>`
                : ""
            }
          `;
          item.addEventListener("click", (e) => {
            if (!e.target.classList.contains("song-delete")) playSong(index);
          });
          playlistEl.appendChild(item);
        });
        document.querySelectorAll(".song-delete").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteUploadedSong(parseInt(btn.dataset.index, 10) - songs.length);
          });
        });
        document.getElementById(
          "song-count"
        ).textContent = `${allSongs.length} 首`;
      }

      function deleteUploadedSong(uploadIndex) {
        if (uploadIndex >= 0 && uploadIndex < uploadedSongs.length) {
          if (uploadedSongs[uploadIndex].blobUrl)
            URL.revokeObjectURL(uploadedSongs[uploadIndex].blobUrl);
          uploadedSongs.splice(uploadIndex, 1);
          const deletedGlobalIndex = songs.length + uploadIndex;
          if (currentIndex === deletedGlobalIndex) {
            currentIndex = -1;
            player.src = "";
            videoPlaceholder.style.display = "flex";
            nowPlayingTitle.textContent = "等待選擇歌曲...";
            isPlaying = false;
            updatePlayButton();
            lyricsSection.classList.remove("active");
          } else if (currentIndex > deletedGlobalIndex) currentIndex--;
          renderPlaylist();
        }
      }

      function displayLyrics(song) {
        if (song.lyrics && lyricsVisible) {
          lyricsSection.classList.add("active");
          const formattedLyrics = song.lyrics.replace(
            /\[(.*?)\]/g,
            '<span class="section-tag">[$1]</span>'
          );
          lyricsContent.innerHTML = formattedLyrics;
        } else {
          lyricsSection.classList.remove("active");
        }
      }

      function playSong(index) {
        const allSongs = getAllSongs();
        if (index < 0 || index >= allSongs.length) return;
        currentIndex = index;
        const song = allSongs[index];
        player.src = song.blobUrl || song.file;
        videoPlaceholder.style.display = "none";
        displayLyrics(song);
        player
          .play()
          .then(() => {
            isPlaying = true;
            updatePlayButton();
            renderPlaylist();
            nowPlayingTitle.textContent = song.title;
          })
          .catch((err) => {
            console.error("Playback error:", err);
            nowPlayingTitle.textContent = song.title + " (點擊播放)";
            renderPlaylist();
          });
      }

      function updatePlayButton() {
        playBtn.textContent = isPlaying ? "⏸️" : "▶️";
      }

      function togglePlay() {
        const allSongs = getAllSongs();
        if (allSongs.length === 0) return;
        if (currentIndex === -1) {
          playSong(0);
          return;
        }
        if (isPlaying) player.pause();
        else player.play();
        isPlaying = !isPlaying;
        updatePlayButton();
      }

      function prevSong() {
        const allSongs = getAllSongs();
        if (allSongs.length === 0) return;
        if (isShuffle) {
          const idx = shuffleOrder.indexOf(currentIndex);
          playSong(shuffleOrder[idx > 0 ? idx - 1 : shuffleOrder.length - 1]);
        } else
          playSong(currentIndex > 0 ? currentIndex - 1 : allSongs.length - 1);
      }

      function nextSong() {
        const allSongs = getAllSongs();
        if (allSongs.length === 0) return;
        if (repeatMode === 2) {
          playSong(currentIndex);
          return;
        }
        if (isShuffle) {
          const idx = shuffleOrder.indexOf(currentIndex);
          playSong(shuffleOrder[idx < shuffleOrder.length - 1 ? idx + 1 : 0]);
        } else {
          if (currentIndex < allSongs.length - 1) playSong(currentIndex + 1);
          else if (repeatMode === 1) playSong(0);
        }
      }

      function toggleShuffle() {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle("active", isShuffle);
        if (isShuffle) {
          const allSongs = getAllSongs();
          shuffleOrder = [...Array(allSongs.length).keys()];
          for (let i = shuffleOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffleOrder[i], shuffleOrder[j]] = [
              shuffleOrder[j],
              shuffleOrder[i],
            ];
          }
          if (currentIndex >= 0) {
            const pos = shuffleOrder.indexOf(currentIndex);
            shuffleOrder.splice(pos, 1);
            shuffleOrder.unshift(currentIndex);
          }
        }
      }

      function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        const icons = ["🔁", "🔂", "🔂"];
        repeatBtn.textContent = icons[repeatMode];
        repeatBtn.classList.toggle("active", repeatMode > 0);
      }

      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, "0")}`;
      }

      function updateProgress() {
        if (player.duration) {
          progressFill.style.width = `${
            (player.currentTime / player.duration) * 100
          }%`;
          currentTimeEl.textContent = formatTime(player.currentTime);
          durationEl.textContent = formatTime(player.duration);
        }
      }

      progressBar.addEventListener("click", (e) => {
        if (!player.duration) return;
        const rect = progressBar.getBoundingClientRect();
        player.currentTime =
          ((e.clientX - rect.left) / rect.width) * player.duration;
      });

      volumeSlider.addEventListener("input", () => {
        player.volume = volumeSlider.value / 100;
        volumeValue.textContent = `${volumeSlider.value}%`;
        muteBtn.textContent =
          volumeSlider.value == 0
            ? "🔇"
            : volumeSlider.value < 50
            ? "🔉"
            : "🔊";
      });

      let prevVolume = 80;
      muteBtn.addEventListener("click", () => {
        if (volumeSlider.value > 0) {
          prevVolume = volumeSlider.value;
          volumeSlider.value = 0;
        } else volumeSlider.value = prevVolume;
        player.volume = volumeSlider.value / 100;
        volumeValue.textContent = `${volumeSlider.value}%`;
        muteBtn.textContent = volumeSlider.value == 0 ? "🔇" : "🔊";
      });

      lyricsToggle.addEventListener("click", () => {
        lyricsVisible = !lyricsVisible;
        lyricsToggle.textContent = lyricsVisible ? "隱藏歌詞" : "顯示歌詞";
        if (currentIndex >= 0) displayLyrics(getAllSongs()[currentIndex]);
      });

      uploadBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (e) => {
        handleFiles(e.target.files);
        fileInput.value = "";
      });

      function handleFiles(files) {
        for (const file of files) {
          if (
            file.type.startsWith("video/") ||
            file.type.startsWith("audio/")
          ) {
            const blobUrl = URL.createObjectURL(file);
            const title = file.name.replace(/\.[^/.]+$/, "");
            uploadedSongs.push({
              file: file.name,
              title: title.length > 30 ? title.substring(0, 30) + "..." : title,
              theme: "自訂上傳",
              blobUrl: blobUrl,
              lyrics: "",
            });
          }
        }
        renderPlaylist();
      }

      document.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("active");
      });
      document.addEventListener("dragleave", (e) => {
        if (e.relatedTarget === null) dropZone.classList.remove("active");
      });
      document.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("active");
        handleFiles(e.dataTransfer.files);
      });

      playBtn.addEventListener("click", togglePlay);
      prevBtn.addEventListener("click", prevSong);
      nextBtn.addEventListener("click", nextSong);
      shuffleBtn.addEventListener("click", toggleShuffle);
      repeatBtn.addEventListener("click", toggleRepeat);
      player.addEventListener("timeupdate", updateProgress);
      player.addEventListener("ended", nextSong);
      player.addEventListener(
        "loadedmetadata",
        () => (durationEl.textContent = formatTime(player.duration))
      );
      player.addEventListener("play", () => {
        isPlaying = true;
        updatePlayButton();
      });
      player.addEventListener("pause", () => {
        isPlaying = false;
        updatePlayButton();
      });

      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT") return;
        switch (e.code) {
          case "Space":
            e.preventDefault();
            togglePlay();
            break;
          case "ArrowLeft":
            player.currentTime -= 5;
            break;
          case "ArrowRight":
            player.currentTime += 5;
            break;
          case "ArrowUp":
            e.preventDefault();
            volumeSlider.value = Math.min(
              100,
              parseInt(volumeSlider.value, 10) + 5
            );
            volumeSlider.dispatchEvent(new Event("input"));
            break;
          case "ArrowDown":
            e.preventDefault();
            volumeSlider.value = Math.max(0, parseInt(volumeSlider.value, 10) - 5);
            volumeSlider.dispatchEvent(new Event("input"));
            break;
        }
      });

      renderPlaylist();
      player.volume = 0.8;
    </script>
  </body>
</html>
