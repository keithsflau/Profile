<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聖經 2D 路線地圖 · Bible Study Posters</title>
  <meta name="description" content="26 張繁體中文聖經教育路線海報：舊約、新約、教會史查經地圖，適合投影與 A3 列印。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --parchment: #f4ead4;
      --parchment-deep: #e8d9b8;
      --ink: #2c2416;
      --ink-soft: #5c4f3a;
      --ink-muted: #8a7d66;
      --sea: #4a7c94;
      --sea-light: #d4e8f0;
      --accent: #8b5a2b;
      --accent-light: #c4924a;
      --olive: #5a6b3c;
      --card: rgba(255, 252, 245, 0.92);
      --edge: rgba(139, 90, 43, 0.22);
      --shadow: 0 10px 40px rgba(44, 36, 22, 0.12);
      --radius: 14px;
      --serif: "Noto Serif TC", "Songti TC", serif;
      --sans: "Source Sans 3", "Microsoft JhengHei", "PingFang TC", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%, rgba(74, 124, 148, 0.14), transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(90, 107, 60, 0.12), transparent 50%),
        linear-gradient(165deg, #faf6ec 0%, var(--parchment) 45%, var(--parchment-deep) 100%);
      line-height: 1.55;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 72px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--sea);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--olive);
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(1.75rem, 4vw, 2.35rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .lead {
      max-width: 720px;
      font-size: 15px;
      color: var(--ink-soft);
      margin-bottom: 18px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 999px;
      font-size: 13px;
      color: var(--ink-soft);
      box-shadow: 0 2px 8px rgba(44, 36, 22, 0.06);
    }

    .stat strong { color: var(--accent); font-weight: 600; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .search-wrap {
      flex: 1 1 220px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--ink-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--edge);
      border-radius: 10px;
      font: inherit;
      font-size: 14px;
      background: #fffdf8;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(196, 146, 74, 0.18);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 8px 14px;
      border: 1px solid var(--edge);
      border-radius: 999px;
      background: #fffdf8;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent-light);
      color: var(--accent);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--accent), #6d4520);
      border-color: transparent;
      color: #fff8ee;
    }

    .links-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .link-chip.primary {
      background: linear-gradient(135deg, var(--sea), #356278);
      color: #f0f8fc;
      box-shadow: 0 4px 14px rgba(74, 124, 148, 0.35);
    }

    .link-chip.secondary {
      background: var(--card);
      border: 1px solid var(--edge);
      color: var(--ink-soft);
    }

    .link-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(44, 36, 22, 0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(196, 146, 74, 0.45);
      box-shadow: 0 16px 48px rgba(44, 36, 22, 0.16);
    }

    .card.missing {
      opacity: 0.88;
    }

    .card.missing .thumb {
      background: repeating-linear-gradient(
        -45deg,
        #ebe3d0,
        #ebe3d0 8px,
        #e2d8c4 8px,
        #e2d8c4 16px
      );
      min-height: 158px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      font-size: 13px;
      font-weight: 500;
    }

    .thumb-btn {
      display: block;
      width: 100%;
      padding: 0;
      border: none;
      background: #e6dcc8;
      cursor: pointer;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      position: relative;
    }

    .thumb-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.35s;
    }

    .card:hover .thumb-btn img { transform: scale(1.03); }

    .thumb-btn::after {
      content: "點擊放大";
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(44, 36, 22, 0.72);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover .thumb-btn::after { opacity: 1; }

    .card-body {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--parchment-deep), #dcc9a0);
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    .card h2 {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
      flex: 1;
    }

    .badge {
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .badge.ok {
      background: rgba(90, 107, 60, 0.14);
      color: var(--olive);
    }

    .badge.pending {
      background: rgba(139, 90, 43, 0.12);
      color: var(--accent);
    }

    .subtitle {
      font-size: 12.5px;
      color: var(--ink-muted);
      margin-bottom: 10px;
      padding-left: 42px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
      padding-top: 10px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--sea-light);
      color: #3d6275;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(139, 90, 43, 0.12);
    }

    .card-actions a {
      font-size: 12px;
      font-weight: 500;
      color: var(--sea);
      text-decoration: none;
    }

    .card-actions a:hover { text-decoration: underline; color: var(--accent); }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: var(--ink-muted);
      font-size: 15px;
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--edge);
      font-size: 12.5px;
      color: var(--ink-muted);
      line-height: 1.7;
    }

    footer code {
      font-size: 11px;
      background: rgba(139, 90, 43, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(20, 16, 10, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .lightbox.open { display: flex; }

    .lightbox-header {
      width: min(1100px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: #f4ead4;
    }

    .lightbox-header h3 {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
    }

    .lightbox-header p {
      font-size: 13px;
      color: #c4b89a;
      margin-top: 2px;
    }

    .lightbox-controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .lb-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lb-btn:hover { background: rgba(255, 255, 255, 0.18); }

    .lightbox-img-wrap {
      width: min(1100px, 100%);
      max-height: calc(100vh - 120px);
      overflow: auto;
      border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .lightbox-img-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .subtitle { padding-left: 0; }
      .card-top { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="../">← 返回聖經研讀</a>

    <header>
      <div class="eyebrow">Bible Study · 2D Route Maps</div>
      <h1>聖經 2D 路線地圖</h1>
      <p class="lead">
        教育性查經海報風格，涵蓋舊約歷史、新約宣教與教會史。每張地圖含路線箭頭、圖例、時間軸與重點摘要，適合小組查經投影或 A3 列印。
      </p>
      <div class="stats">
        <span class="stat">已完成 <strong id="done-count">—</strong> / 26</span>
        <span class="stat">分類 <strong>7</strong> 個主題</span>
        <span class="stat">配套 <strong>26</strong> 個 Gemini Prompt</span>
      </div>
    </header>

    <div class="links-row">
      <a class="link-chip primary" href="../3D地圖/bible-maps/">🌍 互動 3D 地圖</a>
      <a class="link-chip secondary" href="prompts/">📄 Prompt 原始檔</a>
      <a class="link-chip secondary" href="gemini-prompts.md">📋 生成索引說明</a>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="search" type="search" placeholder="搜尋地圖名稱、經卷…" autocomplete="off" />
      </div>
      <div class="filters" id="filters" role="tablist" aria-label="地圖分類"></div>
    </div>

    <div class="grid" id="grid"></div>

    <footer>
      地圖為教學示意，非精確比例尺。圖片檔名格式：<code>01_亞伯拉罕生平.png</code>（與 prompt 同名）。<br>
      互動 3D 版本請見 <a href="../3D地圖/bible-maps/" style="color:var(--sea)">bible-maps</a>（本機執行 <code>node serve.js</code>，port 5052）。
    </footer>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="地圖預覽">
    <div class="lightbox-header">
      <div>
        <h3 id="lb-title"></h3>
        <p id="lb-sub"></p>
      </div>
      <div class="lightbox-controls">
        <button class="lb-btn" id="lb-prev" title="上一張" aria-label="上一張">‹</button>
        <button class="lb-btn" id="lb-next" title="下一張" aria-label="下一張">›</button>
        <button class="lb-btn" id="lb-close" title="關閉" aria-label="關閉">✕</button>
      </div>
    </div>
    <div class="lightbox-img-wrap">
      <img id="lb-img" alt="" />
    </div>
  </div>

  <script>
    const CATEGORIES = [
      { id: "all", label: "全部" },
      { id: "genesis", label: "創世與出埃及" },
      { id: "conquest", label: "約書亞與士師" },
      { id: "kingdom", label: "王國時期" },
      { id: "exile", label: "亡國與回歸" },
      { id: "nt", label: "新約" },
      { id: "church", label: "教會史" },
      { id: "topic", label: "專題" },
    ];

    const MAPS_RAW = [
      { n: 1, title: "亞伯拉罕生平路線圖", sub: "創世記第 11–25 章 · 約公元前 2000 年", cat: "genesis", prompt: "01_亞伯拉罕生平.txt" },
      { n: 2, title: "出埃及路線圖", sub: "出埃及記第 12–19 章 · 約公元前 1446 年", cat: "genesis", prompt: "02_出埃及路線.txt" },
      { n: 3, title: "曠野四十年遊行與進迦南路線圖", sub: "民數記 · 申命記 · 約書亞記 1–5 章", cat: "genesis", prompt: "03_曠野四十年.txt" },
      { n: 4, title: "約書亞記得地進程圖", sub: "約書亞記第 1–11 章 · 約公元前 1400 年", cat: "conquest", prompt: "04_約書亞得地.txt", star: true },
      { n: 5, title: "以色列分配產業地圖", sub: "約書亞記第 13–22 章 · 約公元前 1400 年", cat: "conquest", prompt: "05_十二支派分配.txt", star: true },
      { n: 6, title: "士師時代戰役地圖", sub: "士師記 · 約公元前 1400–1050 年", cat: "conquest", prompt: "06_士師時代.txt" },
      { n: 7, title: "大衛生平路線圖", sub: "撒母耳記上、下 · 約公元前 1010–970 年", cat: "kingdom", prompt: "07_大衛生平.txt" },
      { n: 8, title: "所羅門時代地圖", sub: "列王紀上 1–11 章 · 約公元前 970–931 年", cat: "kingdom", prompt: "08_所羅門時代.txt" },
      { n: 9, title: "國度分裂圖", sub: "列王紀上第 12 章 · 公元前 931 年", cat: "kingdom", prompt: "09_國度分裂.txt" },
      { n: 10, title: "先知事奉地點時序圖", sub: "舊約先知書 · 公元前 9–6 世紀", cat: "kingdom", prompt: "10_先知時序.txt" },
      { n: 11, title: "北國以色列亡國路線圖", sub: "列王紀下第 17 章 · 公元前 722 年", cat: "exile", prompt: "11_北國亡國.txt" },
      { n: 12, title: "南國猶大亡國路線圖", sub: "列王紀下第 25 章 · 公元前 586 年", cat: "exile", prompt: "12_南國亡國.txt" },
      { n: 13, title: "被擄與回歸路線圖", sub: "以斯拉記 · 尼希米記 · 公元前 539–445 年", cat: "exile", prompt: "13_被擄與回歸.txt" },
      { n: 14, title: "耶穌生平路線圖", sub: "四福音 · 公元 1 世紀", cat: "nt", prompt: "14_耶穌生平.txt" },
      { n: 15, title: "施洗約翰與耶穌受洗路線圖", sub: "太 3；可 1；路 3；約 1–2 章", cat: "nt", prompt: "15_施洗約翰.txt" },
      { n: 16, title: "保羅第一次宣教旅程路線圖", sub: "使徒行傳 13–14 章 · 公元 47–48 年", cat: "nt", prompt: "16_保羅第一次宣教.txt" },
      { n: 17, title: "保羅第二次宣教旅程路線圖", sub: "使徒行傳 15–18 章 · 公元 49–52 年", cat: "nt", prompt: "17_保羅第二次宣教.txt" },
      { n: 18, title: "保羅第三次宣教旅程路線圖", sub: "使徒行傳 18–21 章 · 公元 53–57 年", cat: "nt", prompt: "18_保羅第三次宣教.txt" },
      { n: 19, title: "保羅被囚與上羅馬路線圖", sub: "使徒行傳 21–28 章 · 公元 57–62 年", cat: "nt", prompt: "19_保羅上羅馬.txt" },
      { n: 20, title: "保羅傳福音總覽路線圖", sub: "使徒行傳 9–28 章 · 公元 33–67 年", cat: "nt", prompt: "20_保羅總覽.txt" },
      { n: 21, title: "福音傳遍歐洲路線圖", sub: "教會歷史 · 1–10 世紀", cat: "church", prompt: "21_福音傳歐洲.txt" },
      { n: 22, title: "十字軍東征路線圖", sub: "1095–1291 年", cat: "church", prompt: "22_十字軍東征.txt" },
      { n: 23, title: "東西教會大分裂圖", sub: "1054 年 · 教會歷史", cat: "church", prompt: "23_東西教會分裂.txt" },
      { n: 24, title: "六座逃城分佈圖", sub: "民數記 35 章 · 約書亞記 20–21 章", cat: "topic", prompt: "24_六座逃城.txt" },
      { n: 25, title: "約拿去尼尼微路線圖", sub: "約拿書 · 約公元前 8 世紀", cat: "topic", prompt: "25_約拿書.txt" },
      { n: 26, title: "以利亞傳道路線圖", sub: "列王紀上 17 章 – 列王紀下 2 章", cat: "topic", prompt: "26_以利亞傳道.txt" },
    ];

    const catLabel = Object.fromEntries(CATEGORIES.filter(c => c.id !== "all").map(c => [c.id, c.label]));

    let MAPS = [];
    let withImg = [];
    let activeCat = "all";
    let query = "";
    let lbIndex = 0;

    function imgFile(m) {
      return m.prompt.replace(".txt", ".png");
    }

    function probeImage(file) {
      return new Promise(resolve => {
        const probe = new Image();
        probe.onload = () => resolve(true);
        probe.onerror = () => resolve(false);
        probe.src = file;
      });
    }

    async function loadMaps() {
      MAPS = await Promise.all(MAPS_RAW.map(async m => {
        const file = imgFile(m);
        const ok = await probeImage(file);
        return { ...m, img: ok ? file : null };
      }));
      withImg = MAPS.filter(m => m.img);
      document.getElementById("done-count").textContent = `${withImg.length}`;
    }

    const filtersEl = document.getElementById("filters");
    CATEGORIES.forEach(c => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "filter-btn" + (c.id === "all" ? " active" : "");
      btn.dataset.cat = c.id;
      btn.textContent = c.label;
      btn.addEventListener("click", () => {
        activeCat = c.id;
        filtersEl.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === activeCat));
        render();
      });
      filtersEl.appendChild(btn);
    });

    document.getElementById("search").addEventListener("input", e => {
      query = e.target.value.trim().toLowerCase();
      render();
    });

    function filtered() {
      return MAPS.filter(m => {
        if (activeCat !== "all" && m.cat !== activeCat) return false;
        if (!query) return true;
        const hay = `${m.n} ${m.title} ${m.sub} ${catLabel[m.cat]}`.toLowerCase();
        return hay.includes(query);
      });
    }

    function render() {
      const list = filtered();
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = '<p class="empty">找不到符合條件的地圖</p>';
        return;
      }

      list.forEach((m, i) => {
        const card = document.createElement("article");
        card.className = "card" + (m.img ? "" : " missing");
        card.style.animationDelay = `${Math.min(i * 0.04, 0.4)}s`;

        const hasImg = Boolean(m.img);
        const thumb = hasImg
          ? `<button type="button" class="thumb-btn" data-idx="${MAPS.indexOf(m)}" aria-label="預覽 ${m.title}">
               <img src="${encodeURI(m.img)}" alt="${m.title}" loading="lazy" />
             </button>`
          : `<div class="thumb">尚未生成圖片</div>`;

        card.innerHTML = `
          ${thumb}
          <div class="card-body">
            <div class="card-top">
              <span class="num">${String(m.n).padStart(2, "0")}</span>
              <h2>${m.title}</h2>
              <span class="badge ${hasImg ? "ok" : "pending"}">${hasImg ? "已完成" : "待生成"}</span>
            </div>
            <p class="subtitle">${m.sub}</p>
            <div class="tags">
              <span class="tag">${catLabel[m.cat]}</span>
              ${m.star ? '<span class="tag">⭐ 風格參考</span>' : ""}
            </div>
            <div class="card-actions">
              <a href="prompts/${m.prompt}">查看 Prompt</a>
              ${hasImg ? `<a href="${encodeURI(m.img)}" download>下載 PNG</a>` : ""}
            </div>
          </div>`;

        grid.appendChild(card);
      });

      grid.querySelectorAll(".thumb-btn").forEach(btn => {
        btn.addEventListener("click", () => openLightbox(Number(btn.dataset.idx)));
      });
    }

    const lightbox = document.getElementById("lightbox");
    const lbImg = document.getElementById("lb-img");
    const lbTitle = document.getElementById("lb-title");
    const lbSub = document.getElementById("lb-sub");

    function openLightbox(idx) {
      const m = MAPS[idx];
      if (!m?.img) return;
      lbIndex = withImg.indexOf(m);
      lbTitle.textContent = m.title;
      lbSub.textContent = m.sub;
      lbImg.src = encodeURI(m.img);
      lbImg.alt = m.title;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
      lbImg.src = "";
    }

    function stepLightbox(dir) {
      if (!withImg.length) return;
      lbIndex = (lbIndex + dir + withImg.length) % withImg.length;
      const m = withImg[lbIndex];
      lbTitle.textContent = m.title;
      lbSub.textContent = m.sub;
      lbImg.src = encodeURI(m.img);
      lbImg.alt = m.title;
    }

    document.getElementById("lb-close").addEventListener("click", closeLightbox);
    document.getElementById("lb-prev").addEventListener("click", () => stepLightbox(-1));
    document.getElementById("lb-next").addEventListener("click", () => stepLightbox(1));
    lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", e => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") stepLightbox(-1);
      if (e.key === "ArrowRight") stepLightbox(1);
    });

    const params = new URLSearchParams(location.search);
    const openN = Number(params.get("n"));

    loadMaps().then(() => {
      render();
      if (openN >= 1 && openN <= 26) {
        const m = MAPS.find(x => x.n === openN);
        if (m?.img) openLightbox(MAPS.indexOf(m));
      }
    });
  </script>
</body>
</html>
