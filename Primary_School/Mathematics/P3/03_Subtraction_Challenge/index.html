    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fef3c7 0%, #fbbf24 100%);
        background-attachment: fixed;
      }
      .number-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      .number-card:hover {
        transform: translateY(-4px);

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const Minus = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M5 12h14" />
        </svg>
      );
      const Trophy = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"

          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
        </svg>
      );
      const Target = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}

          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="6" />
          <circle cx="12" cy="12" r="2" />
        </svg>
      );
      const CheckCircle = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <path d="m9 11 3 3L22 4" />
        </svg>
      );
      const XCircle = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <circle cx="12" cy="12" r="10" />
          <path d="m15 9-6 6" />
          <path d="m9 9 6 6" />
        </svg>
      );
      const ArrowRight = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      );
      const RotateCcw = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      );

      const t = {
        title: {
          en: "Subtraction Challenge",
          zh: "減法大挑戰",
          ja: "引き算チャレンジ",
          ko: "뺄셈 도전",
          es: "Desafío de resta",
          de: "Subtraktions-Herausforderung",
          fi: "Vähennyslaskuhaaste",
          fr: "Défi de soustraction",
          ar: "تحدي الطرح",
          it: "Sfida di sottrazione",
        },
        practice: {
          en: "Practice",
          zh: "練習模式",
          ja: "練習モード",
          ko: "연습 모드",
          es: "Práctica",
          de: "Übungsmodus",
          fi: "Harjoitustila",
          fr: "Mode entraînement",
          ar: "وضع التدريب",
          it: "Modalità pratica",
        },
        timed: {
          en: "Timed",
          zh: "計時挑戰",
          ja: "タイムアタック",
          ko: "시간 도전",
          es: "Cronometrado",
          de: "Auf Zeit",
          fi: "Ajastettu",
          fr: "Chronométré",
          ar: "تحدي الوقت",
          it: "A tempo",
        },
        story: {
          en: "Word Problems",
          zh: "應用題",
          ja: "文章題",
          ko: "서술형 문제",
          es: "Problemas verbales",
          de: "Textaufgaben",
          fi: "Sanalliset tehtävät",
          fr: "Problèmes écrits",
          ar: "المسائل اللفظية",
          it: "Problemi verbali",
        },
        borrow: {
          en: "Borrow",
          zh: "借位",
          ja: "繰り下がり",
          ko: "빌림",
          es: "Llevar",
          de: "Übertrag",
          fi: "Lainaa",
          fr: "Retenue",
          ar: "الاستلاف",
          it: "Prestito",
        },
        check: {
          en: "Check Answer",
          zh: "檢查答案",
          ja: "答え合わせ",
          ko: "정답 확인",
          es: "Comprobar respuesta",
          de: "Antwort prüfen",
          fi: "Tarkista vastaus",
          fr: "Vérifier la réponse",
          ar: "تحقق من الإجابة",
          it: "Controlla la risposta",
        },
        correct: {
          en: "Correct! Answer is",
          zh: "答對了！答案是",
          ja: "正解！答えは",
          ko: "정답! 정답은",
          es: "¡Correcto! La respuesta es",
          de: "Richtig! Antwort ist",
          fi: "Oikein! Vastaus on",
          fr: "Correct ! La réponse est",
          ar: "صحيح! الإجابة هي",
          it: "Corretto! La risposta è",
        },
        wrong: {
          en: "Try again!",
          zh: "再試試看！",
          ja: "もう一度！",
          ko: "다시 해보세요!",
          es: "¡Inténtalo de nuevo!",
          de: "Versuch es nochmal!",
          fi: "Yritä uudelleen!",
          fr: "Réessayez !",
          ar: "حاول مرة أخرى!",
          it: "Riprova!",
        },
        score: {
          en: "Score",
          zh: "得分",
          ja: "スコア",
          ko: "점수",
          es: "Puntuación",
          de: "Punktzahl",
          fi: "Pisteet",
          fr: "Score",
          ar: "النتيجة",
          it: "Punteggio",
        },
        answered: {
          en: "Answered",
          zh: "已答",
          ja: "回答数",
          ko: "답변함",
          es: "Respondidas",
          de: "Beantwortet",
          fi: "Vastattu",
          fr: "Répondu",
          ar: "تمت الإجابة",
          it: "Risposto",
        },
        tipsTitle: {
          en: "Subtraction Tips",
          zh: "減法要訣",
          ja: "引き算のコツ",
          ko: "뺄셈 팁",
          es: "Consejos de resta",
          de: "Subtraktionstipps",
          fi: "Vähennyslaskuvinkit",
          fr: "Conseils de soustraction",
          ar: "نصائح الطرح",
          it: "Suggerimenti per la sottrazione",
        },
        startTimed: {
          en: "Start Timed Mode",
          zh: "開始計時",
          ja: "計時開始",
          ko: "시간 측정 시작",
          es: "Empezar cronometrado",
          de: "Zeitmodus starten",
          fi: "Aloita ajastettu tila",
          fr: "Démarrer le mode chronométré",
          ar: "بدء الوضع المؤقت",
          it: "Avvia modalità a tempo",
        },
        storyTemplates: [
          {
            emoji: "📚",
            en: "Library has {num1} books, lent {num2}. How many left?",
            zh: "圖書館有 {num1} 本書，借出了 {num2} 本，還剩多少本？",
          },
          {
            emoji: "🎈",
            en: "Party has {num1} balloons, {num2} popped. How many left?",
            zh: "生日會有 {num1} 個氣球，爆了 {num2} 個，還剩多少個？",
          },
          {
            emoji: "🍎",
            en: "Orchard harvested {num1} apples, sold {num2}. How many left?",
            zh: "果園收成 {num1} 個蘋果，賣了 {num2} 個，還剩多少個？",
          },
          {
            emoji: "🎟️",
            en: "Cinema has {num1} tickets, sold {num2}. How many left?",
            zh: "電影院有 {num1} 張票，售出 {num2} 張，還剩多少張？",
          },
        ],
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [mode, setMode] = useState("practice");
        const [num1, setNum1] = useState(856);
        const [num2, setNum2] = useState(347);
        const [userInputs, setUserInputs] = useState(["", "", "", ""]);
        const [borrows, setBorrows] = useState(["", "", "", ""]);
        const [feedback, setFeedback] = useState(null);
        const [score, setScore] = useState(0);
        const [timeLeft, setTimeLeft] = useState(60);
        const [isTimerActive, setIsTimerActive] = useState(false);
        const [questionsAnswered, setQuestionsAnswered] = useState(0);
        const [storyIdx, setStoryIdx] = useState(0);

        const correctAnswer = num1 - num2;

        useEffect(() => {
          if (mode === "timed" && isTimerActive && timeLeft > 0) {
            const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
            return () => clearTimeout(timer);
          } else if (timeLeft === 0) {
            setIsTimerActive(false);
          }
        }, [timeLeft, isTimerActive, mode]);

        const generateQuestion = () => {
          let n1, n2;
          if (mode === "story") {
            n1 = Math.floor(Math.random() * 900) + 100;
            n2 = Math.floor(Math.random() * (n1 - 50)) + 50;
            setStoryIdx(Math.floor(Math.random() * t.storyTemplates.length));
          } else {
            n1 = Math.floor(Math.random() * 900) + 100;
            n2 = Math.floor(Math.random() * n1);
          }
          setNum1(n1);
          setNum2(n2);
          setUserInputs(["", "", "", ""]);
          setBorrows(["", "", "", ""]);
          setFeedback(null);
        };

        const checkAnswer = () => {
          const userAnswer = parseInt(userInputs.join(""), 10);
          if (userAnswer === correctAnswer) {
            setFeedback("correct");
            setScore((s) => s + 10);
            setQuestionsAnswered((q) => q + 1);
          } else {
            setFeedback("incorrect");
          }
        };

        const handleInput = (index, value) => {
          if (value.length > 1) value = value.slice(-1);
          const newInputs = [...userInputs];
          newInputs[index] = value;
          setUserInputs(newInputs);
        };

        const handleBorrow = (index, value) => {
          if (value.length > 1) value = value.slice(-1);
          const newBorrows = [...borrows];
          newBorrows[index] = value;
          setBorrows(newBorrows);
        };

        const getDigit = (num, position) => {
          const str = num.toString().padStart(4, "0");
          return str[position];
        };

        const startTimedMode = () => {
          setIsTimerActive(true);
          setTimeLeft(60);
          setScore(0);
          setQuestionsAnswered(0);
          generateQuestion();
        };

        const getStoryText = () => {
          const tmpl = t.storyTemplates[storyIdx];
          const text = tmpl[lang] || tmpl["en"];
          return text.replace("{num1}", num1).replace("{num2}", num2);
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <header className="text-center mb-8 mt-8">
              <div className="inline-flex items-center gap-3 bg-white/30 backdrop-blur-md px-6 py-3 rounded-full mb-4 shadow-lg">
                <Minus className="text-amber-800" size={24} />
                <span className="text-amber-800 font-bold text-lg">
                  {t.title[lang] || t.title["en"]}
                </span>
              </div>
              <div className="flex gap-4 justify-center mt-4">
                <button
                  onClick={() => setMode("practice")}
                  className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                    mode === "practice"
                      ? "bg-white text-amber-600 shadow-lg scale-105"
                      : "bg-white/50 text-amber-700 hover:bg-white/70"
                  }`}
                >
                  {t.practice[lang] || t.practice["en"]}
                </button>
                <button
                  onClick={() => {
                    setMode("timed");
                    startTimedMode();
                  }}
                  className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                    mode === "timed"
                      ? "bg-white text-red-600 shadow-lg scale-105"
                      : "bg-white/50 text-amber-700 hover:bg-white/70"
                  }`}
                >
                  {t.timed[lang] || t.timed["en"]}
                </button>
                <button
                  onClick={() => setMode("story")}
                  className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                    mode === "story"
                      ? "bg-white text-purple-600 shadow-lg scale-105"
                      : "bg-white/50 text-amber-700 hover:bg-white/70"
                  }`}
                >
                  {t.story[lang] || t.story["en"]}
                </button>
              </div>
            </header>

            <main className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-8 bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl">
                {mode === "story" && (
                  <div className="bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl p-6 mb-6 border-2 border-purple-200">
                    <div className="text-5xl mb-3 text-center">
                      {t.storyTemplates[storyIdx].emoji}
                    </div>
                    <div className="text-xl font-bold text-purple-800 text-center leading-relaxed">
                      {getStoryText()}
                    </div>
                  </div>
                )}

                {mode === "timed" && (
                  <div className="flex justify-between items-center mb-6 bg-gradient-to-r from-red-50 to-orange-50 p-4 rounded-2xl">
                    <div className="flex items-center gap-2">
                      <Trophy className="text-yellow-600" size={24} />
                      <span className="font-black text-2xl text-slate-800">
                        {t.score[lang] || t.score["en"]}: {score}
                      </span>
                    </div>
                    <div className="flex items-center gap-2">
                      <Target className="text-blue-600" size={24} />
                      <span className="font-black text-2xl text-slate-800">
                        {t.answered[lang] || t.answered["en"]}:{" "}
                        {questionsAnswered}
                      </span>
                    </div>
                    <div
                      className={`text-3xl font-black px-6 py-2 rounded-xl ${
                        timeLeft <= 10
                          ? "bg-red-500 text-white animate-pulse"
                          : "bg-blue-500 text-white"
                      }`}
                    >
                      ⏱️ {timeLeft}s
                    </div>
                  </div>
                )}

                <div className="max-w-md mx-auto">
                  <div className="grid grid-cols-5 gap-2 text-center mb-2 text-amber-700 font-bold text-sm">
                    <div></div>
                    <div>{lang === "zh" ? "千" : "1k"}</div>
                    <div>{lang === "zh" ? "百" : "100"}</div>
                    <div>{lang === "zh" ? "十" : "10"}</div>
                    <div>{lang === "zh" ? "個" : "1"}</div>
                  </div>

                  <div className="grid grid-cols-5 gap-2 mb-2 h-10">
                    <div></div>
                    {[0, 1, 2, 3].map((i) => (
                      <input
                        key={i}
                        type="text"
                        inputMode="numeric"
                        maxLength="1"
                        value={borrows[i]}
                        onChange={(e) => handleBorrow(i, e.target.value)}
                        className="w-full h-10 rounded-lg text-center font-bold text-red-600 bg-red-50 border-2 border-dashed border-red-300 text-sm"
                        placeholder={t.borrow[lang] || t.borrow["en"]}
                      />
                    ))}
                  </div>

                  <div className="grid grid-cols-5 gap-2 mb-2 text-2xl font-black text-slate-700">
                    <div></div>
                    {[0, 1, 2, 3].map((i) => (
                      <div
                        key={i}
                        className="number-card flex items-center justify-center h-14 bg-blue-100 rounded-xl shadow-sm"
                      >
                        {getDigit(num1, i)}
                      </div>
                    ))}
                  </div>

                  <div className="grid grid-cols-5 gap-2 mb-4 text-2xl font-black text-slate-700 relative">
                    <div className="flex items-center justify-center text-3xl text-red-600">
                      −
                    </div>
                    {[0, 1, 2, 3].map((i) => (
                      <div
                        key={i}
                        className="number-card flex items-center justify-center h-14 bg-orange-100 rounded-xl shadow-sm"
                      >
                        {getDigit(num2, i)}
                      </div>
                    ))}
                  </div>

                  <div className="border-b-4 border-amber-600 mb-4"></div>

                  <div className="grid grid-cols-5 gap-2 mb-6">
                    <div></div>
                    {[0, 1, 2, 3].map((idx) => (
                      <input
                        key={idx}
                        type="text"
                        inputMode="numeric"
                        maxLength="1"
                        className="aspect-square rounded-xl text-3xl font-black text-center border-4 border-amber-300 focus:border-amber-500 outline-none bg-white transition-all hover:scale-105"
                        placeholder="?"
                        value={userInputs[idx]}
                        onChange={(e) => handleInput(idx, e.target.value)}
                      />
                    ))}
                  </div>

                  <button
                    onClick={checkAnswer}
                    className="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 mb-4"
                  >
                    <CheckCircle strokeWidth={3} />{" "}
                    {t.check[lang] || t.check["en"]}
                  </button>

                  {feedback === "correct" && (
                    <motion.div
                      initial={{ opacity: 0, y: 10 }}
                      animate={{ opacity: 1, y: 0 }}
                      className="bg-green-100 text-green-700 p-4 rounded-xl font-bold flex flex-col items-center gap-2 mb-4"
                    >
                      <CheckCircle size={32} />
                      <div className="text-lg">
                        {t.correct[lang] || t.correct["en"]} {correctAnswer}
                      </div>
                      <button
                        onClick={generateQuestion}
                        className="px-6 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700 flex items-center gap-2"
                      >
                        <ArrowRight size={16} /> 下一題
                      </button>
                    </motion.div>
                  )}

                  {feedback === "incorrect" && (
                    <motion.div
                      initial={{ opacity: 0, y: 10 }}
                      animate={{ opacity: 1, y: 0 }}
                      className="bg-red-100 text-red-700 p-4 rounded-xl font-bold flex items-center justify-center gap-2 mb-4"
                    >
                      <XCircle /> {t.wrong[lang] || t.wrong["en"]}
                    </motion.div>
                  )}
                </div>
              </div>

              <div className="lg:col-span-4 flex flex-col gap-6">
                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                  <h3 className="text-xl font-black text-amber-600 mb-4">
                    💡 {t.tipsTitle[lang] || t.tipsTitle["en"]}
                  </h3>
                  {lang === "zh" ? (
                    <div className="space-y-3 text-sm text-slate-700">
                      <div className="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400">
                        <strong>步驟一：</strong>由個位開始計算
                      </div>
                      <div className="bg-orange-50 p-3 rounded-lg border-l-4 border-orange-400">
                        <strong>步驟二：</strong>如果上面數字較小，要向左借位
                      </div>
                      <div className="bg-red-50 p-3 rounded-lg border-l-4 border-red-400">
                        <strong>步驟三：</strong>借位後該位數字+10，左邊減1
                      </div>
                      <div className="bg-green-50 p-3 rounded-lg border-l-4 border-green-400">
                        <strong>步驟四：</strong>逐位計算直至完成
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-3 text-sm text-slate-700">
                      <div className="bg-yellow-50 p-3 rounded-lg border-l-4 border-yellow-400">
                        <strong>Step 1:</strong> Start from units.
                      </div>
                      <div className="bg-orange-50 p-3 rounded-lg border-l-4 border-orange-400">
                        <strong>Step 2:</strong> If top number is smaller,
                        borrow from left.
                      </div>
                      <div className="bg-red-50 p-3 rounded-lg border-l-4 border-red-400">
                        <strong>Step 3:</strong> After borrowing, add 10 to
                        current, subtract 1 from left.
                      </div>
                      <div className="bg-green-50 p-3 rounded-lg border-l-4 border-green-400">
                        <strong>Step 4:</strong> Calculate digit by digit.
                      </div>
                    </div>
                  )}
                </div>

                {mode === "practice" && (
                  <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                    <button
                      onClick={generateQuestion}
                      className="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition-all flex items-center justify-center gap-2 mb-3"
                    >
                      <RotateCcw size={20} /> New Question
                    </button>
                    <div className="text-center text-green-600 font-black text-2xl">
                      <Trophy className="inline mr-2" />
                      {t.score[lang] || t.score["en"]}: {score}
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
