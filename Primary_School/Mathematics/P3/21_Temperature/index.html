<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>小三數學：溫度計 | Thermometer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fee2e2 0%, #ef4444 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Thermometer",
          zh: "溫度計",
          ja: "温度計",
          ko: "온도계",
          es: "Termómetro",
          de: "Thermometer",
          fi: "Lämpömittari",
          fr: "Thermomètre",
          ar: "مقياس الحرارة",
          it: "Termometro",
        },
        unitTitle: {
          en: "Temperature Unit",
          zh: "溫度單位",
          ja: "温度単位",
          ko: "온도 단위",
          es: "Unidad de temperatura",
          de: "Temperatureinheit",
          fi: "Lämpötilayksikkö",
          fr: "Unité de température",
          ar: "وحدة درجة الحرارة",
          it: "Unità di temperatura",
        },
        unitText: {
          en: "Celsius (°C)",
          zh: "攝氏度（°C）",
          ja: "摂氏 (°C)",
          ko: "섭씨 (°C)",
          es: "Celsius (°C)",
          de: "Celsius (°C)",
          fi: "Celsius (°C)",
          fr: "Celsius (°C)",
          ar: "درجة مئوية (°C)",
          it: "Celsius (°C)",
        },
        scenarios: {
          freezing: {
            en: "Freezing",
            zh: "冰點",
            ja: "凝固点",
            ko: "빙점",
            es: "Congelación",
            de: "Gefrierpunkt",
            fi: "Jäätymispiste",
            fr: "Point de congélation",
            ar: "نقطة التجمد",
            it: "Punto di congelamento",
          },
          room: {
            en: "Room Temp",
            zh: "室溫",
            ja: "室温",
            ko: "실온",
            es: "Temp. ambiente",
            de: "Zimmertemp.",
            fi: "Huoneenlämpö",
            fr: "Temp. ambiante",
            ar: "درجة حرارة الغرفة",
            it: "Temp. ambiente",
          },
          body: {
            en: "Body Temp",
            zh: "體溫",
            ja: "体温",
            ko: "체온",
            es: "Temp. corporal",
            de: "Körpertemp.",
            fi: "Ruumiinlämpö",
            fr: "Temp. corporelle",
            ar: "درجة حرارة الجسم",
            it: "Temp. corporea",
          },
          hot: {
            en: "Hot Water",
            zh: "熱水",
            ja: "お湯",
            ko: "뜨거운 물",
            es: "Agua caliente",
            de: "Heißes Wasser",
            fi: "Kuuma vesi",
            fr: "Eau chaude",
            ar: "ماء ساخن",
            it: "Acqua calda",
          },
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [temp, setTemp] = useState(25);
        const color =
          temp < 0
            ? "#3b82f6"
            : temp < 20
            ? "#22c55e"
            : temp < 30
            ? "#eab308"
            : "#ef4444";
        const scenarios = [
          { key: "freezing", temp: 0 },
          { key: "room", temp: 25 },
          { key: "body", temp: 37 },
          { key: "hot", temp: 80 },
        ];

        const getScenarioName = (key) =>
          t.scenarios[key][lang] || t.scenarios[key]["en"];

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-6xl font-black text-white mb-8 mt-8 text-center">
              🌡️ {t.title[lang] || t.title["en"]}
            </h1>
            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-4xl w-full">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                  <svg width="200" height="500" className="mx-auto">
                    <rect
                      x="75"
                      y="50"
                      width="50"
                      height="400"
                      fill="#e5e7eb"
                      stroke="#374151"
                      strokeWidth="3"
                      rx="25"
                    />
                    <rect
                      x="75"
                      y={450 - (temp + 20) * 3.5}
                      width="50"
                      height={(temp + 20) * 3.5}
                      fill={color}
                      rx="25"
                    />
                    <circle
                      cx="100"
                      cy="470"
                      r="30"
                      fill={color}
                      stroke="#374151"
                      strokeWidth="3"
                    />
                    {[...Array(11)].map((_, i) => {
                      const t = (i - 2) * 10;
                      const y = 450 - t * 3.5;
                      return (
                        <g key={i}>
                          <line
                            x1="60"
                            y1={y}
                            x2="75"
                            y2={y}
                            stroke="#374151"
                            strokeWidth="2"
                          />
                          <text
                            x="50"
                            y={y + 5}
                            textAnchor="end"
                            className="text-sm font-bold"
                          >
                            {t}°C
                          </text>
                        </g>
                      );
                    })}
                  </svg>
                </div>
                <div>
                  <div className="mb-6">
                    <input
                      type="range"
                      min="-20"
                      max="100"
                      value={temp}
                      onChange={(e) => setTemp(parseInt(e.target.value, 10))}
                      className="w-full mb-4"
                    />
                    <div
                      className="text-center text-7xl font-black mb-2"
                      style={{ color }}
                    >
                      {temp}°C
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    {scenarios.map((s, i) => (
                      <button
                        key={i}
                        onClick={() => setTemp(s.temp)}
                        className="py-3 bg-gradient-to-r from-red-100 to-orange-100 hover:from-red-200 hover:to-orange-200 rounded-xl font-bold"
                      >
                        {getScenarioName(s.key)}
                        <div className="text-2xl">{s.temp}°C</div>
                      </button>
                    ))}
                  </div>
                  <div className="mt-6 bg-blue-50 p-4 rounded-xl">
                    <div className="font-bold text-blue-800 mb-2">
                      💡 {t.unitTitle[lang] || t.unitTitle["en"]}
                    </div>
                    <div className="text-blue-700">
                      {t.unitText[lang] || t.unitText["en"]}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
