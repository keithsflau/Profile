<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <title>小三數學：比較大小 | Compare Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Fredoka:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fecaca, #dc2626);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Compare Numbers",
          zh: "比較大小",
          ja: "数の比較",
          ko: "숫자 비교",
          es: "Comparar números",
          de: "Zahlen vergleichen",
          fi: "Vertaa numeroita",
          fr: "Comparer les nombres",
          ar: "مقارنة الأرقام",
          it: "Confronta numeri",
        },
        meaning: {
          en: "Symbol Meaning",
          zh: "符號意思",
          ja: "記号の意味",
          ko: "기호 의미",
          es: "Significado del símbolo",
          de: "Symbol Bedeutung",
          fi: "Symbolin merkitys",
          fr: "Signification du symbole",
          ar: "معنى الرمز",
          it: "Significato del simbolo",
        },
        greater: {
          en: "Greater than",
          zh: "大於",
          ja: "より大きい",
          ko: "보다 큼",
          es: "Mayor que",
          de: "Größer als",
          fi: "Suurempi kuin",
          fr: "Plus grand que",
          ar: "أكبر من",
          it: "Maggiore di",
        },
        less: {
          en: "Less than",
          zh: "小於",
          ja: "より小さい",
          ko: "보다 작음",
          es: "Menor que",
          de: "Kleiner als",
          fi: "Pienempi kuin",
          fr: "Plus petit que",
          ar: "أصغر من",
          it: "Minore di",
        },
        equal: {
          en: "Equal to",
          zh: "等於",
          ja: "等しい",
          ko: "같음",
          es: "Igual a",
          de: "Gleich",
          fi: "Yhtä suuri kuin",
          fr: "Égal à",
          ar: "يساوي",
          it: "Uguale a",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [n1, setN1] = useState(456);
        const [n2, setN2] = useState(523);
        const symbol = n1 > n2 ? ">" : n1 < n2 ? "<" : "=";

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-6xl font-black text-white mb-8 mt-8 text-center">
              ⚖️ {t.title[lang] || t.title["en"]}
            </h1>
            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl max-w-5xl w-full">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 items-center mb-8">
                <div>
                  <input
                    type="number"
                    value={n1}
                    onChange={(e) => setN1(parseInt(e.target.value, 10) || 0)}
                    className="w-full px-6 py-4 text-5xl font-black text-center rounded-2xl border-4 border-red-300"
                  />
                </div>
                <div className="text-8xl font-black text-center text-red-600">
                  {symbol}
                </div>
                <div>
                  <input
                    type="number"
                    value={n2}
                    onChange={(e) => setN2(parseInt(e.target.value, 10) || 0)}
                    className="w-full px-6 py-4 text-5xl font-black text-center rounded-2xl border-4 border-red-300"
                  />
                </div>
              </div>
              <div className="bg-red-50 p-6 rounded-xl">
                <div className="font-bold text-red-800 mb-2">
                  💡 {t.meaning[lang] || t.meaning["en"]}
                </div>
                <div className="space-y-2 text-lg">
                  <div>&gt; {t.greater[lang] || t.greater["en"]}</div>
                  <div>&lt; {t.less[lang] || t.less["en"]}</div>
                  <div>= {t.equal[lang] || t.equal["en"]}</div>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
