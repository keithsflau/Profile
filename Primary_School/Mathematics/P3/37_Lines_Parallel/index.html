<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小三數學：平行與垂直 | Parallel & Perpendicular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Parallel & Perpendicular",
          zh: "平行與垂直",
          ja: "平行と垂直",
          ko: "평행과 수직",
          es: "Paralelo y perpendicular",
          de: "Parallel und senkrecht",
          fi: "Samansuuntainen ja kohtisuora",
          fr: "Parallèle et perpendiculaire",
          ar: "متوازي ومتعامد",
          it: "Parallelo e perpendicolare",
        },
        parallel: {
          en: "Parallel Lines",
          zh: "平行線",
          ja: "平行線",
          ko: "평행선",
          es: "Líneas paralelas",
          de: "Parallele Linien",
          fi: "Yhdensuuntaiset viivat",
          fr: "Lignes parallèles",
          ar: "خطوط متوازية",
          it: "Linee parallele",
        },
        perpendicular: {
          en: "Perpendicular Lines",
          zh: "垂直線",
          ja: "垂直線",
          ko: "수직선",
          es: "Líneas perpendiculares",
          de: "Senkrechte Linien",
          fi: "Kohtisuorat viivat",
          fr: "Lignes perpendiculaires",
          ar: "خطوط متعامدة",
          it: "Linee perpendicolari",
        },
        rotate: {
          en: "Rotate to see",
          zh: "旋轉看看",
          ja: "回して見る",
          ko: "회전하여 보기",
          es: "Girar para ver",
          de: "Zum Sehen drehen",
          fi: "Kierrä nähdäksesi",
          fr: "Faire pivoter pour voir",
          ar: "تدوير للعرض",
          it: "Ruota per vedere",
        },
        neverIntersect: {
          en: "Never Intersect",
          zh: "永不相交",
          ja: "交わらない",
          ko: "절대 만나지 않음",
          es: "Nunca se cruzan",
          de: "Schneiden sich nie",
          fi: "Ei koskaan leikkaa",
          fr: "Ne se croisent jamais",
          ar: "لا تتقاطع أبدًا",
          it: "Non si intersecano mai",
        },
        paraFeature: {
          en: "Always same distance apart, never meet (like train tracks).",
          zh: "兩條直線之間的距離永遠相等，而且永不相交，像火車軌一樣。",
          ja: "常に同じ距離離れており、決して交わりません（線路のように）。",
          ko: "항상 같은 거리를 유지하며 절대 만나지 않습니다 (기차 선로처럼).",
          es: "Siempre a la misma distancia, nunca se encuentran (como vías de tren).",
          de: "Immer gleicher Abstand, treffen sich nie (wie Bahngleise).",
          fi: "Aina sama etäisyys, eivät koskaan kohtaa (kuin junaradat).",
          fr: "Toujours à la même distance, ne se rencontrent jamais (comme des rails).",
          ar: "دائمًا نفس المسافة، لا تلتقي أبدًا (مثل مسارات القطار).",
          it: "Sempre alla stessa distanza, non si incontrano mai (come i binari del treno).",
        },
        perpFeature: {
          en: "Lines meet at a right angle (90°), like a corner.",
          zh: "兩條直線相交成直角 (90度)，像十字路口或書本的角一樣。",
          ja: "線は直角（90度）で交わります（角のように）。",
          ko: "선들이 직각(90도)으로 만납니다 (모서리처럼).",
          es: "Las líneas se encuentran en un ángulo recto (90°), como una esquina.",
          de: "Linien treffen sich im rechten Winkel (90°), wie eine Ecke.",
          fi: "Viivat kohtaavat suorassa kulmassa (90°), kuten kulma.",
          fr: "Les lignes se rencontrent à angle droit (90°), comme un coin.",
          ar: "تلتقي الخطوط بزاوية قائمة (90 درجة)، مثل الزاوية.",
          it: "Le linee si incontrano ad angolo retto (90°), come un angolo.",
        },
        features: {
          en: "Features",
          zh: "特點",
          ja: "特徴",
          ko: "특징",
          es: "Características",
          de: "Eigenschaften",
          fi: "Ominaisuudet",
          fr: "Caractéristiques",
          ar: "الميزات",
          it: "Caratteristiche",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [mode, setMode] = useState("parallel"); // parallel, perpendicular
        const [angle, setAngle] = useState(0);

        const getText = (key) => t[key][lang] || t[key]["en"];

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-6xl font-black text-teal-900 mb-8 mt-8 text-center">
              {getText("title")}
            </h1>

            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-4xl w-full">
              <div className="flex gap-4 justify-center mb-8 flex-wrap">
                <button
                  onClick={() => {
                    setMode("parallel");
                    setAngle(0);
                  }}
                  className={`px-8 py-3 rounded-xl font-bold text-xl transition-all ${
                    mode === "parallel"
                      ? "bg-teal-500 text-white shadow-lg scale-105"
                      : "bg-teal-100 text-teal-800"
                  }`}
                >
                  {getText("parallel")}
                </button>
                <button
                  onClick={() => {
                    setMode("perpendicular");
                    setAngle(0);
                  }}
                  className={`px-8 py-3 rounded-xl font-bold text-xl transition-all ${
                    mode === "perpendicular"
                      ? "bg-teal-500 text-white shadow-lg scale-105"
                      : "bg-teal-100 text-teal-800"
                  }`}
                >
                  {getText("perpendicular")}
                </button>
              </div>

              <div className="relative h-96 bg-slate-50 rounded-2xl border-4 border-slate-200 overflow-hidden flex items-center justify-center">
                {/* Grid Background */}
                <div
                  className="absolute inset-0 opacity-20"
                  style={{
                    backgroundImage:
                      "linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)",
                    backgroundSize: "40px 40px",
                  }}
                ></div>

                {/* Lines */}
                <div
                  className="relative w-full h-full flex items-center justify-center transition-transform duration-500"
                  style={{ transform: `rotate(${angle}deg)` }}
                >
                  {mode === "parallel" && (
                    <>
                      <div
                        className="absolute h-2 w-64 bg-teal-600 rounded-full shadow-md"
                        style={{ transform: "translateY(-40px)" }}
                      >
                        <div className="absolute -left-8 top-1/2 -translate-y-1/2 text-2xl">
                          🛤️
                        </div>
                      </div>
                      <div
                        className="absolute h-2 w-64 bg-teal-600 rounded-full shadow-md"
                        style={{ transform: "translateY(40px)" }}
                      >
                        <div className="absolute -left-8 top-1/2 -translate-y-1/2 text-2xl">
                          🛤️
                        </div>
                      </div>
                      {/* Reference arrows showing constant distance */}
                      <div
                        className="absolute h-20 w-px border-l-2 border-dashed border-slate-400 flex items-center justify-center"
                        style={{ left: "50%" }}
                      >
                        <span className="bg-slate-50 px-1 text-xs text-slate-500 font-bold whitespace-nowrap">
                          {getText("neverIntersect")}
                        </span>
                      </div>
                    </>
                  )}

                  {mode === "perpendicular" && (
                    <>
                      <div className="absolute h-2 w-80 bg-red-500 rounded-full shadow-md"></div>
                      <div className="absolute w-2 h-80 bg-red-500 rounded-full shadow-md"></div>
                      {/* Right angle marker */}
                      <div
                        className="absolute w-8 h-8 border-t-4 border-r-4 border-slate-400"
                        style={{
                          top: "50%",
                          left: "50%",
                          transform: "translate(0, -100%)",
                        }}
                      ></div>
                      <div className="absolute top-1/2 left-1/2 -translate-y-full translate-x-1 pl-2 pb-2 font-black text-slate-400">
                        90°
                      </div>
                    </>
                  )}
                </div>
              </div>

              <div className="mt-8">
                <label className="block text-center font-bold text-teal-800 mb-2">
                  {getText("rotate")}
                </label>
                <input
                  type="range"
                  min="0"
                  max="360"
                  value={angle}
                  onChange={(e) => setAngle(parseInt(e.target.value, 10))}
                  className="w-full h-3 bg-teal-200 rounded-lg appearance-none cursor-pointer"
                />
              </div>

              <div className="mt-8 bg-teal-50 p-6 rounded-2xl flex items-start gap-4">
                <div className="text-4xl">💡</div>
                <div>
                  <h3 className="font-bold text-teal-900 text-lg mb-2">
                    {mode === "parallel"
                      ? getText("parallel")
                      : getText("perpendicular")}{" "}
                    {getText("features")}
                  </h3>
                  <p className="text-teal-700">
                    {mode === "parallel"
                      ? getText("paraFeature")
                      : getText("perpFeature")}
                  </p>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
