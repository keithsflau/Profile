<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>小三數學：直角認識 | Right Angle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Right Angle",
          zh: "直角認識",
          ja: "直角",
          ko: "직각",
          es: "Ángulo recto",
          de: "Rechter Winkel",
          fi: "Suora kulma",
          fr: "Angle droit",
          ar: "زاوية قائمة",
          it: "Angolo retto",
        },
        isRight: {
          en: "✓ This is a Right Angle!",
          zh: "✓ 這是直角！",
          ja: "✓ これは直角です！",
          ko: "✓ 이것은 직각입니다!",
          es: "✓ ¡Esto es un ángulo recto!",
          de: "✓ Das ist ein rechter Winkel!",
          fi: "✓ Tämä on suora kulma!",
          fr: "✓ C'est un angle droit !",
          ar: "✓ هذه زاوية قائمة!",
          it: "✓ Questo è un angolo retto!",
        },
        notRight: {
          en: "✗ This is not a Right Angle",
          zh: "✗ 這不是直角",
          ja: "✗ これは直角ではありません",
          ko: "✗ 이것은 직각이 아닙니다",
          es: "✗ Esto no es un ángulo recto",
          de: "✗ Das ist kein rechter Winkel",
          fi: "✗ Tämä ei ole suora kulma",
          fr: "✗ Ce n'est pas un angle droit",
          ar: "✗ هذه ليست زاوية قائمة",
          it: "✗ Questo non è un angolo retto",
        },
        keyPoint: {
          en: "Key Point",
          zh: "重點",
          ja: "ポイント",
          ko: "핵심 포인트",
          es: "Punto clave",
          de: "Schlüsselpunkt",
          fi: "Avainasia",
          fr: "Point clé",
          ar: "نقطة رئيسية",
          it: "Punto chiave",
        },
        rule: {
          en: "Right Angle = 90 degrees (90°)",
          zh: "直角 = 90度 (90°)",
          ja: "直角 = 90度 (90°)",
          ko: "직각 = 90도 (90°)",
          es: "Ángulo recto = 90 grados (90°)",
          de: "Rechter Winkel = 90 Grad (90°)",
          fi: "Suora kulma = 90 astetta (90°)",
          fr: "Angle droit = 90 degrés (90°)",
          ar: "الزاوية القائمة = 90 درجة (90°)",
          it: "Angolo retto = 90 gradi (90°)",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [angle, setAngle] = useState(90);
        const isRight = angle === 90;

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-6xl font-black text-indigo-900 mb-8 mt-8 text-center">
              📐 {t.title[lang] || t.title["en"]}
            </h1>
            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-4xl w-full">
              <div className="flex justify-center">
                <svg
                  width="300"
                  height="300"
                  viewBox="0 0 500 400"
                  className="mx-auto mb-8"
                >
                  <line
                    x1="250"
                    y1="200"
                    x2="450"
                    y2="200"
                    stroke="#4f46e5"
                    strokeWidth="6"
                  />
                  <line
                    x1="250"
                    y1="200"
                    x2={250 + 200 * Math.cos(((angle - 90) * Math.PI) / 180)}
                    y2={200 + 200 * Math.sin(((angle - 90) * Math.PI) / 180)}
                    stroke="#ef4444"
                    strokeWidth="6"
                  />
                  <path
                    d={`M${250 + 30 * Math.cos((-90 * Math.PI) / 180)},${
                      200 + 30 * Math.sin((-90 * Math.PI) / 180)
                    } A30,30 0 0,1 ${
                      250 + 30 * Math.cos(((angle - 90) * Math.PI) / 180)
                    },${200 + 30 * Math.sin(((angle - 90) * Math.PI) / 180)}`}
                    fill="none"
                    stroke="#22c55e"
                    strokeWidth="3"
                  />
                  <text
                    x="250"
                    y="150"
                    textAnchor="middle"
                    className="text-4xl font-black fill-indigo-900"
                  >
                    {angle}°
                  </text>
                </svg>
              </div>
              <div className="mb-6">
                <input
                  type="range"
                  min="0"
                  max="180"
                  value={angle}
                  onChange={(e) => setAngle(parseInt(e.target.value, 10))}
                  className="w-full"
                />
              </div>
              <div
                className={`text-center py-6 px-8 rounded-2xl font-black text-2xl md:text-3xl ${
                  isRight
                    ? "bg-green-100 text-green-700"
                    : "bg-red-100 text-red-700"
                }`}
              >
                {isRight
                  ? t.isRight[lang] || t.isRight["en"]
                  : t.notRight[lang] || t.notRight["en"]}
              </div>
              <div className="mt-8 bg-indigo-50 p-6 rounded-xl">
                <div className="font-bold text-indigo-800 text-lg mb-2">
                  💡 {t.keyPoint[lang] || t.keyPoint["en"]}
                </div>
                <div className="text-indigo-700">
                  {t.rule[lang] || t.rule["en"]}
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
