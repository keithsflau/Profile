<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>小三數學：單數與雙數 | Even and Odd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fef3c7 0%, #fb923c 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Even and Odd",
          zh: "單數與雙數",
          ja: "偶数と奇数",
          ko: "짝수와 홀수",
          es: "Pares e impares",
          de: "Gerade und Ungerade",
          fi: "Parillinen ja pariton",
          fr: "Pair et impair",
          ar: "زوجي وفردي",
          it: "Pari e dispari",
        },
        even: {
          en: "✓ Even Number",
          zh: "✓ 雙數 (Even)",
          ja: "✓ 偶数",
          ko: "✓ 짝수",
          es: "✓ Número par",
          de: "✓ Gerade Zahl",
          fi: "✓ Parillinen luku",
          fr: "✓ Nombre pair",
          ar: "✓ رقم زوجي",
          it: "✓ Numero pari",
        },
        odd: {
          en: "✓ Odd Number",
          zh: "✓ 單數 (Odd)",
          ja: "✓ 奇数",
          ko: "✓ 홀수",
          es: "✓ Número impar",
          de: "✓ Ungerade Zahl",
          fi: "✓ Pariton luku",
          fr: "✓ Nombre impair",
          ar: "✓ رقم فردي",
          it: "✓ Numero dispari",
        },
        tipTitle: {
          en: "Memory Tip",
          zh: "記憶方法",
          ja: "覚え方",
          ko: "기억 팁",
          es: "Consejo de memoria",
          de: "Merkregel",
          fi: "Muistisääntö",
          fr: "Astuce mémoire",
          ar: "نصيحة للحفظ",
          it: "Suggerimento per la memoria",
        },
        tip1: {
          en: "• Even: Can be divided into 2 groups with no remainder",
          zh: "• 雙數：可以分成2組，沒有剩餘",
          ja: "• 偶数: 2つのグループに分けられ、余りがない",
          ko: "• 짝수: 나머지가 없이 2개의 그룹으로 나눌 수 있음",
          es: "• Par: Se puede dividir en 2 grupos sin resto",
          de: "• Gerade: Kann ohne Rest in 2 Gruppen geteilt werden",
          fi: "• Parillinen: Voidaan jakaa 2 ryhmään ilman jäännöstä",
          fr: "• Pair : Peut être divisé en 2 groupes sans reste",
          ar: "• زوجي: يمكن تقسيمها إلى مجموعتين بدون باقي",
          it: "• Pari: Può essere diviso in 2 gruppi senza resto",
        },
        tip2: {
          en: "• Odd: When divided into 2 groups, 1 remains",
          zh: "• 單數：分成2組後，會剩下1個",
          ja: "• 奇数: 2つのグループに分けると、1つ余る",
          ko: "• 홀수: 2개의 그룹으로 나누면 1개가 남음",
          es: "• Impar: Al dividir en 2 grupos, sobra 1",
          de: "• Ungerade: Beim Teilen in 2 Gruppen bleibt 1 übrig",
          fi: "• Pariton: Kun jaetaan 2 ryhmään, jää 1",
          fr: "• Impair : Lorsqu'il est divisé en 2 groupes, il en reste 1",
          ar: "• فردي: عند التقسيم إلى مجموعتين، يتبقى 1",
          it: "• Dispari: Quando diviso in 2 gruppi, ne rimane 1",
        },
        tip3: {
          en: "• Even digits: 0, 2, 4, 6, 8",
          zh: "• 雙數個位：0, 2, 4, 6, 8",
          ja: "• 偶数の末尾: 0, 2, 4, 6, 8",
          ko: "• 짝수 끝자리: 0, 2, 4, 6, 8",
          es: "• Dígitos pares: 0, 2, 4, 6, 8",
          de: "• Gerade Endziffern: 0, 2, 4, 6, 8",
          fi: "• Parilliset numerot: 0, 2, 4, 6, 8",
          fr: "• Chiffres pairs : 0, 2, 4, 6, 8",
          ar: "• الأرقام الزوجية: 0, 2, 4, 6, 8",
          it: "• Cifre pari: 0, 2, 4, 6, 8",
        },
        tip4: {
          en: "• Odd digits: 1, 3, 5, 7, 9",
          zh: "• 單數個位：1, 3, 5, 7, 9",
          ja: "• 奇数の末尾: 1, 3, 5, 7, 9",
          ko: "• 홀수 끝자리: 1, 3, 5, 7, 9",
          es: "• Dígitos impares: 1, 3, 5, 7, 9",
          de: "• Ungerade Endziffern: 1, 3, 5, 7, 9",
          fi: "• Parittomat numerot: 1, 3, 5, 7, 9",
          fr: "• Chiffres impairs : 1, 3, 5, 7, 9",
          ar: "• الأرقام الفردية: 1, 3, 5, 7, 9",
          it: "• Cifre dispari: 1, 3, 5, 7, 9",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [num, setNum] = useState(12);
        const isEven = num % 2 === 0;
        const dots = [...Array(num)].map((_, i) => i);

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-6xl font-black text-orange-900 mb-8 mt-8 text-center">
              🔢 {t.title[lang] || t.title["en"]}
            </h1>
            <div className="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-4xl w-full">
              <input
                type="number"
                value={num}
                onChange={(e) =>
                  setNum(
                    Math.max(0, Math.min(30, parseInt(e.target.value, 10) || 0))
                  )
                }
                className="w-full px-8 py-6 text-6xl font-black text-center rounded-2xl border-4 border-orange-300 mb-6 focus:border-orange-600 outline-none"
              />
              <div
                className={`text-center py-8 rounded-2xl mb-8 ${
                  isEven ? "bg-green-100" : "bg-blue-100"
                }`}
              >
                <div
                  className={`text-4xl md:text-5xl font-black ${
                    isEven ? "text-green-700" : "text-blue-700"
                  }`}
                >
                  {isEven
                    ? t.even[lang] || t.even["en"]
                    : t.odd[lang] || t.odd["en"]}
                </div>
              </div>
              <div className="flex flex-wrap justify-center gap-2 mb-8">
                {dots.map((d, i) => (
                  <motion.div
                    key={i}
                    initial={{ scale: 0 }}
                    animate={{ scale: 1 }}
                    transition={{ delay: i * 0.05 }}
                    className={`w-12 h-12 rounded-full ${
                      isEven ? "bg-green-400" : "bg-blue-400"
                    }`}
                  />
                ))}
              </div>
              <div className="bg-orange-50 p-6 rounded-xl">
                <div className="font-bold text-orange-800 text-lg mb-3">
                  💡 {t.tipTitle[lang] || t.tipTitle["en"]}
                </div>
                <div className="text-orange-700 space-y-2 text-md md:text-lg">
                  <div>{t.tip1[lang] || t.tip1["en"]}</div>
                  <div>{t.tip2[lang] || t.tip2["en"]}</div>
                  <div>{t.tip3[lang] || t.tip3["en"]}</div>
                  <div>{t.tip4[lang] || t.tip4["en"]}</div>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
