<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小一數學：數線減法 | Number Line Subtraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #dbeafe 0%, #2563eb 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "🐸 Number Line Subtraction",
          zh: "🐸 數線減法",
          ja: "🐸 数直線引き算",
          ko: "🐸 수직선 뺄셈",
          es: "🐸 Resta recta numérica",
          de: "🐸 Zahlengerade Subtraktion",
          fi: "🐸 Lukusuora vähennyslasku",
          fr: "🐸 Soustraction sur droite numérique",
          ar: "🐸 طرح خط الأعداد",
          it: "🐸 Sottrazione su retta numerica",
        },
        start: {
          en: "Start",
          zh: "開始",
          ja: "開始",
          ko: "시작",
          es: "Inicio",
          de: "Start",
          fi: "Alku",
          fr: "Début",
          ar: "البداية",
          it: "Inizio",
        },
        minus: {
          en: "Minus",
          zh: "減",
          ja: "引く",
          ko: "빼기",
          es: "Menos",
          de: "Minus",
          fi: "Miinus",
          fr: "Moins",
          ar: "ناقص",
          it: "Meno",
        },
        jumping: {
          en: "Jumping...",
          zh: "跳躍中...",
          ja: "ジャンプ中...",
          ko: "점프 중...",
          es: "Saltando...",
          de: "Springen...",
          fi: "Hypätään...",
          fr: "Saut...",
          ar: "يقفز...",
          it: "Saltando...",
        },
        jumpBack: {
          en: "Jump Back!",
          zh: "向後跳！",
          ja: "後ろへジャンプ！",
          ko: "뒤로 점프!",
          es: "¡Salta atrás!",
          de: "Spring zurück!",
          fi: "Hyppää takaisin!",
          fr: "Sauter en arrière !",
          ar: "القفز للخلف!",
          it: "Salta indietro!",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [start, setStart] = useState(8);
        const [sub, setSub] = useState(3);
        const [animating, setAnimating] = useState(false);
        const [current, setCurrent] = useState(start);

        const play = () => {
          if (animating) return;
          setAnimating(true);
          setCurrent(start);

          let steps = 0;
          const interval = setInterval(() => {
            steps++;
            setCurrent((prev) => prev - 1);
            if (steps >= sub) {
              clearInterval(interval);
              setAnimating(false);
            }
          }, 800);
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <LanguageSelector lang={lang} setLang={setLang} />

            <h1 className="text-5xl font-black text-blue-900 mb-8 max-w-2xl text-center">
              {t.title[lang] || t.title["en"]}
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-4xl border-4 border-blue-300">
              <div className="mb-12 relative h-32 flex items-center px-8">
                {/* Line */}
                <div className="absolute top-1/2 left-8 right-8 h-2 bg-slate-300"></div>

                {/* Ticks */}
                <div className="flex justify-between w-full relative z-10">
                  {[...Array(11)].map((_, i) => (
                    <div key={i} className="flex flex-col items-center">
                      <div className="w-1 h-6 bg-slate-400 mb-2"></div>
                      <span className="font-bold text-slate-500">{i}</span>
                    </div>
                  ))}
                </div>

                {/* Froggy */}
                <motion.div
                  animate={{ left: `${(current / 10) * 100}%` }}
                  transition={{ type: "spring", stiffness: 300, damping: 20 }}
                  className="absolute top-0 -mt-8 text-6xl transform -scale-x-100" // Flip frog to face left
                  style={{ marginLeft: "-20px" }}
                >
                  🐸
                </motion.div>
              </div>

              <div className="flex justify-center gap-8 items-end mb-8">
                <div className="text-center">
                  <label className="font-bold text-blue-700">
                    {t.start[lang] || t.start["en"]}
                  </label>
                  <input
                    type="number"
                    min="sub"
                    max="10"
                    value={start}
                    onChange={(e) => {
                      setStart(parseInt(e.target.value, 10));
                      setCurrent(parseInt(e.target.value, 10));
                    }}
                    className="block text-4xl p-2 w-24 text-center border-4 border-blue-200 rounded-xl"
                  />
                </div>
                <div className="text-4xl font-black text-blue-500 mb-4">-</div>
                <div className="text-center">
                  <label className="font-bold text-blue-700">
                    {t.minus[lang] || t.minus["en"]}
                  </label>
                  <input
                    type="number"
                    min="1"
                    max={start}
                    value={sub}
                    onChange={(e) => setSub(parseInt(e.target.value, 10))}
                    className="block text-4xl p-2 w-24 text-center border-4 border-blue-200 rounded-xl"
                  />
                </div>
                <div className="text-4xl font-black text-blue-500 mb-4">=</div>
                <div className="text-6xl font-black text-blue-700 mb-2">
                  {current}
                </div>
              </div>

              <button
                onClick={play}
                disabled={animating}
                className="w-full py-4 bg-blue-500 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-blue-600 disabled:opacity-50 transition-all"
              >
                {animating
                  ? t.jumping[lang] || t.jumping["en"]
                  : t.jumpBack[lang] || t.jumpBack["en"]}
              </button>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
