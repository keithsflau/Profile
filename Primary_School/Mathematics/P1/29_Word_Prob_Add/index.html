<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小一數學：加法應用題 | Addition Word Problems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #f5f3ff 0%, #8b5cf6 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      function App() {
        const [a, setA] = useState(3);
        const [b, setB] = useState(2);
        const [input, setInput] = useState("");
        const [feedback, setFeedback] = useState("");

        const problems = [
          {
            t1: "小明有",
            t2: "個蘋果",
            w1: "Xiao Ming has",
            w2: "apples",
            icon: "🍎",
          },
          {
            t1: "媽媽買了",
            t2: "個橙",
            w1: "Mom bought",
            w2: "oranges",
            icon: "🍊",
          },
          {
            t1: "樹上有",
            t2: "隻鳥",
            w1: "There are",
            w2: "birds",
            icon: "🐦",
          },
          {
            t1: "盒子裡有",
            t2: "粒糖",
            w1: "The box has",
            w2: "candies",
            icon: "🍬",
          },
        ];
        const [currentP, setCurrentP] = useState(problems[0]);

        const next = () => {
          setA(Math.floor(Math.random() * 5) + 1);
          setB(Math.floor(Math.random() * 5) + 1);
          setCurrentP(problems[Math.floor(Math.random() * problems.length)]);
          setInput("");
          setFeedback("");
        };

        useEffect(next, []);

        const check = () => {
          if (parseInt(input, 10) === a + b) {
            setFeedback("CORRECT");
            setTimeout(next, 2000);
          } else {
            setFeedback("WRONG");
          }
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <h1 className="text-5xl font-black text-violet-900 mb-8">
              📝 加法應用題 Word Problems
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-3xl text-center border-4 border-violet-300">
              <div className="text-2xl font-bold text-slate-700 mb-8 leading-loose bg-violet-50 p-6 rounded-2xl border-2 border-violet-100">
                <p className="mb-4">
                  {currentP.t1}{" "}
                  <span className="text-violet-600 font-black text-4xl mx-2">
                    {a}
                  </span>{" "}
                  {currentP.t2}，<br />
                  {currentP.w1}{" "}
                  <span className="text-violet-600 font-black text-4xl mx-2">
                    {a}
                  </span>{" "}
                  {currentP.w2},
                </p>
                <p>
                  再買了{" "}
                  <span className="text-violet-600 font-black text-4xl mx-2">
                    {b}
                  </span>{" "}
                  個。
                  <br />
                  and bought{" "}
                  <span className="text-violet-600 font-black text-4xl mx-2">
                    {b}
                  </span>{" "}
                  more.
                </p>
                <hr className="my-4 border-violet-200" />
                <p className="text-violet-800 font-black">
                  現在共有多少個？
                  <br />
                  How many in total?
                </p>
              </div>

              <div className="flex justify-center gap-2 mb-8 text-4xl">
                {[...Array(a)].map((_, i) => (
                  <span key={`a${i}`}>{currentP.icon}</span>
                ))}
                <span className="mx-2 text-slate-300">+</span>
                {[...Array(b)].map((_, i) => (
                  <span key={`b${i}`}>{currentP.icon}</span>
                ))}
              </div>

              <div className="flex justify-center gap-4 mb-6">
                <input
                  type="number"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  className="w-32 text-center text-4xl font-black p-2 border-4 border-violet-400 rounded-xl"
                  placeholder="?"
                />
                <button
                  onClick={check}
                  className="px-8 bg-violet-500 text-white rounded-xl font-bold text-xl hover:bg-violet-600"
                >
                  確定 OK
                </button>
              </div>

              {feedback === "CORRECT" && (
                <div className="text-4xl font-black text-green-500 animate-bounce">
                  正確！ {a} + {b} = {a + b}
                </div>
              )}
              {feedback === "WRONG" && (
                <div className="text-3xl font-black text-red-500">
                  再想想... Think again
                </div>
              )}
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
