<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小一數學：高矮比較 | Comparing Height</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fff1f2 0%, #fb7185 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "🦒 Comparing Height",
          zh: "🦒 高矮比較",
          ja: "🦒 高さの比較",
          ko: "🦒 높이 비교",
          es: "🦒 Comparar altura",
          de: "🦒 Höhenvergleich",
          fi: "🦒 Korkeuden vertailu",
          fr: "🦒 Comparaison de hauteur",
          ar: "🦒 مقارنة الارتفاع",
          it: "🦒 Confronto di altezza",
        },
        question: {
          en: "Who is {q}?",
          zh: "由誰較{q}?",
          ja: "誰が{q}ですか？",
          ko: "누가 더 {q}?",
          es: "¿Quién es más {q}?",
          de: "Wer ist {q}?",
          fi: "Kuka on {q}?",
          fr: "Qui est plus {q} ?",
          ar: "من هو {q}؟",
          it: "Chi è più {q}?",
        },
        Taller: {
          en: "taller",
          zh: "高",
          ja: "背が高い",
          ko: "키가 큽니까",
          es: "alto",
          de: "größer",
          fi: "pidempi",
          fr: "grand",
          ar: "أطول",
          it: "alto",
        },
        Shorter: {
          en: "shorter",
          zh: "矮",
          ja: "背が低い",
          ko: "키가 작습니까",
          es: "bajo",
          de: "kleiner",
          fi: "lyhyempi",
          fr: "petit",
          ar: "أقصر",
          it: "basso",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [hA, setHA] = useState(150);
        const [hB, setHB] = useState(250);
        const [question, setQuestion] = useState("Taller"); // Taller or Shorter
        const [feedback, setFeedback] = useState("");

        const newRound = () => {
          // height in px
          let a = Math.floor(Math.random() * 150) + 100; // 100-250
          let b = Math.floor(Math.random() * 150) + 100;
          if (Math.abs(a - b) < 30) a -= 40;
          setHA(a);
          setHB(b);

          setQuestion(Math.random() > 0.5 ? "Taller" : "Shorter");
          setFeedback("");
        };

        useEffect(newRound, []);

        const check = (choice) => {
          const isATaller = hA > hB;
          let correct = false;
          if (question === "Taller") {
            if ((choice === "A" && isATaller) || (choice === "B" && !isATaller))
              correct = true;
          } else {
            if ((choice === "A" && !isATaller) || (choice === "B" && isATaller))
              correct = true;
          }

          if (correct) {
            setFeedback("CORRECT");
            setTimeout(newRound, 1500);
          } else {
            setFeedback("WRONG");
          }
        };

        const getQ = () => {
          let txt = t.question[lang] || t.question["en"];
          let qWord = t[question][lang] || t[question]["en"];
          return txt.replace("{q}", qWord);
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <LanguageSelector lang={lang} setLang={setLang} />

            <h1 className="text-5xl font-black text-rose-900 mb-8 max-w-2xl text-center">
              {t.title[lang] || t.title["en"]}
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-3xl text-center border-4 border-rose-200">
              <h2 className="text-3xl font-bold text-slate-700 mb-12">
                {getQ()}
              </h2>

              <div className="flex justify-center items-end gap-16 mb-12 h-[300px] border-b-4 border-slate-300 pb-2">
                <button
                  onClick={() => check("A")}
                  className="flex flex-col items-center group transition-transform hover:scale-105"
                >
                  <div
                    className="w-24 bg-rose-400 rounded-t-2xl shadow-lg relative"
                    style={{ height: `${hA}px` }}
                  >
                    <span className="absolute bottom-2 left-1/2 -translate-x-1/2 text-white font-black text-xl">
                      A
                    </span>
                  </div>
                </button>
                <button
                  onClick={() => check("B")}
                  className="flex flex-col items-center group transition-transform hover:scale-105"
                >
                  <div
                    className="w-24 bg-sky-400 rounded-t-2xl shadow-lg relative"
                    style={{ height: `${hB}px` }}
                  >
                    <span className="absolute bottom-2 left-1/2 -translate-x-1/2 text-white font-black text-xl">
                      B
                    </span>
                  </div>
                </button>
              </div>

              <div className="h-16">
                {feedback === "CORRECT" && (
                  <div className="text-4xl font-black text-green-500 animate-bounce">
                    {get("correct", lang)}
                  </div>
                )}
                {feedback === "WRONG" && (
                  <div className="text-4xl font-black text-red-500 animate-shake">
                    {get("wrong", lang)}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
