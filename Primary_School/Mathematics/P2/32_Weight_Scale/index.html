<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小二數學：重量 (kg/g) | Weight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #f3e8ff 0%, #a855f7 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "⚖️ Weight (g)",
          zh: "⚖️ 重量 (克)",
          ja: "⚖️ 重量 (g)",
          ko: "⚖️ 무게 (g)",
          es: "⚖️ Peso (g)",
          de: "⚖️ Gewicht (g)",
          fi: "⚖️ Paino (g)",
          fr: "⚖️ Poids (g)",
          ar: "⚖️ الوزن (غ)",
          it: "⚖️ Peso (g)",
        },
        check: {
          en: "Check",
          zh: "檢查",
          ja: "確認",
          ko: "확인",
          es: "Comprobar",
          de: "Prüfen",
          fi: "Tarkista",
          fr: "Vérifier",
          ar: "تحقق",
          it: "Controlla",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [weight, setWeight] = useState(500); // grams
        const [max, setMax] = useState(1000); // Scale max
        const [input, setInput] = useState("");
        const [feedback, setFeedback] = useState("");

        const newProb = () => {
          // Multiples of 50 or 100
          const w = (Math.floor(Math.random() * 19) + 1) * 50;
          setWeight(w);
          setInput("");
          setFeedback("");
        };

        useEffect(newProb, []);

        const check = () => {
          if (parseInt(input, 10) === weight) {
            setFeedback("CORRECT");
            setTimeout(newProb, 2000);
          } else {
            setFeedback("WRONG");
          }
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <LanguageSelector lang={lang} setLang={setLang} />

            <h1 className="text-4xl md:text-5xl font-black text-purple-900 mb-8 max-w-2xl text-center">
              {t.title[lang] || t.title["en"]}
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-xl text-center border-4 border-purple-300">
              <div className="relative w-64 h-64 mx-auto mb-12">
                {/* Object on pan */}
                <div className="absolute -top-16 left-1/2 -translate-x-1/2 text-8xl z-10 animate-bounce-softer">
                  🍎
                </div>

                {/* Scale Pan */}
                <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-48 h-6 bg-slate-400 rounded-full z-0"></div>
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-4 h-16 bg-slate-400 z-0"></div>

                {/* Scale Body */}
                <div className="w-full h-full bg-slate-100 rounded-full border-[12px] border-slate-300 shadow-inner relative flex items-center justify-center">
                  {/* Ticks */}
                  {[...Array(10)].map((_, i) => (
                    <div
                      key={i}
                      className="absolute w-full h-full pointer-events-none"
                      style={{ transform: `rotate(${i * 36}deg)` }}
                    >
                      <div className="absolute top-0 left-1/2 -translate-x-1/2 w-1 h-3 bg-slate-400"></div>
                      <div
                        className="absolute top-4 left-1/2 -translate-x-1/2 text-xs font-bold text-slate-500"
                        style={{ transform: `rotate(-${i * 36}deg)` }}
                      >
                        {i * 100}
                      </div>
                    </div>
                  ))}

                  {/* Pointer */}
                  <div
                    className="absolute top-1/2 left-1/2 w-1 h-24 bg-red-600 origin-bottom rounded-full transition-transform duration-1000 ease-out"
                    style={{
                      transform: `translate(-50%, -100%) rotate(${
                        (weight / 1000) * 360
                      }deg)`,
                    }}
                  ></div>

                  <div className="absolute top-1/2 left-1/2 w-4 h-4 bg-slate-800 rounded-full -translate-x-1/2 -translate-y-1/2 border-2 border-white"></div>
                </div>
              </div>

              <div className="flex items-center justify-center gap-4 text-4xl mb-8 font-black text-purple-900">
                <input
                  type="number"
                  step="50"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  className="w-32 text-center border-b-4 border-purple-500 bg-purple-50 focus:outline-none rounded-t-lg"
                  autoFocus
                />
                g (克)
              </div>

              <div className="text-center">
                <button
                  onClick={check}
                  className="px-10 py-3 bg-purple-500 text-white rounded-full font-black text-2xl shadow-xl hover:bg-purple-600 active:scale-95 transition-transform"
                >
                  {t.check[lang] || t.check["en"]}
                </button>
              </div>

              <div className="h-16 mt-8">
                {feedback === "CORRECT" && (
                  <div className="text-center text-4xl font-black text-green-500 animate-bounce">
                    {get("correct", lang)}
                  </div>
                )}
                {feedback === "WRONG" && (
                  <div className="text-center text-4xl font-black text-red-500 animate-shake">
                    {get("wrong", lang)}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    <style>
      @keyframes bounce-softer {
        0%,
        100% {
          transform: translate(-50%, -10px);
        }
        50% {
          transform: translate(-50%, 0);
        }
      }
      .animate-bounce-softer {
        animation: bounce-softer 2s infinite ease-in-out;
      }
    </style>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
