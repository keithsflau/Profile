<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小二數學：認識香港貨幣 | HK Currency Recognition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fffbeb 0%, #fcd34d 100%);
      }
      .coin-shadow {
        box-shadow: inset -4px -4px 10px rgba(0, 0, 0, 0.2),
          4px 4px 10px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "💰 HK Currency Recognition",
          zh: "💰 認識香港貨幣",
          ja: "💰 香港の通貨",
          ko: "💰 홍콩 화폐",
          es: "💰 Reconocimiento de moneda de HK",
          de: "💰 HK-Währungserkennung",
          fi: "💰 HK valuutan tunnistus",
          fr: "💰 Reconnaissance de la monnaie de HK",
          ar: "💰 التعرف على عملة هونج كونج",
          it: "💰 Riconoscimento valuta HK",
        },
        find: {
          en: "Find this coin",
          zh: "找出這個硬幣",
          ja: "このコインを見つけて",
          ko: "이 동전을 찾으세요",
          es: "Encuentra esta moneda",
          de: "Finde diese Münze",
          fi: "Etsi tämä kolikko",
          fr: "Trouvez cette pièce",
          ar: "ابحث عن هذه العملة",
          it: "Trova questa moneta score",
        },
        score: {
          en: "Score:",
          zh: "分數：",
          ja: "スコア:",
          ko: "점수:",
          es: "Puntuación:",
          de: "Punktzahl:",
          fi: "Pisteet:",
          fr: "Score :",
          ar: "النتيجة:",
          it: "Punteggio:",
        },
      };

      const coinsData = [
        {
          val: 0.1,
          label: { en: "10 cents", zh: "1毫" },
          css: "bg-amber-600 w-12 h-12 text-xs text-white rounded-full border-2 border-amber-700",
        },
        {
          val: 0.2,
          label: { en: "20 cents", zh: "2毫" },
          css: "bg-amber-600/80 w-14 h-14 text-xs text-white rounded-[20px] border-2 border-amber-800 wavy-edge",
        },
        {
          val: 0.5,
          label: { en: "50 cents", zh: "5毫" },
          css: "bg-amber-700 w-16 h-16 text-sm text-white rounded-full border-2 border-amber-900",
        },
        {
          val: 1,
          label: { en: "$1", zh: "$1" },
          sub: { en: "1 Dollar", zh: "1元" },
          css: "bg-slate-300 w-16 h-16 text-lg font-bold text-slate-700 rounded-full border-4 border-slate-400",
        },
        {
          val: 2,
          label: { en: "$2", zh: "$2" },
          sub: { en: "2 Dollars", zh: "2元" },
          css: "bg-slate-300 w-20 h-20 text-xl font-bold text-slate-700 rounded-[24px] border-4 border-slate-400",
        },
        {
          val: 5,
          label: { en: "$5", zh: "$5" },
          sub: { en: "5 Dollars", zh: "5元" },
          css: "bg-slate-300 w-20 h-20 text-2xl font-black text-slate-600 rounded-full border-[6px] border-slate-400",
        },
        {
          val: 10,
          label: { en: "$10", zh: "$10" },
          sub: { en: "10 Dollars", zh: "10元" },
          css: "bg-yellow-100 w-20 h-20 text-xl font-bold text-yellow-800 rounded-full border-[8px] border-yellow-600",
        },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [target, setTarget] = useState(null);
        const [feedback, setFeedback] = useState("");
        const [score, setScore] = useState(0);

        const nextQ = () => {
          const c = coinsData[Math.floor(Math.random() * coinsData.length)];
          setTarget(c);
          setFeedback("");
        };

        useEffect(nextQ, []);

        const check = (coin) => {
          if (coin.val === target.val) {
            setFeedback("CORRECT");
            setScore((s) => s + 1);
            setTimeout(nextQ, 1500);
          } else {
            setFeedback("WRONG");
          }
        };

        if (!target) return null;

        const getCoinLabel = (c) => c.label[lang] || c.label.en || c.label.zh;
        const getCoinSub = (c) => (c.sub ? c.sub[lang] || c.sub.en : "");

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <LanguageSelector lang={lang} setLang={setLang} />

            <h1 className="text-4xl md:text-5xl font-black text-amber-900 mb-8 text-center max-w-xl">
              {t.title[lang] || t.title["en"]}
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-3xl text-center border-4 border-amber-300">
              <div className="mb-12">
                <div className="text-2xl text-slate-500 mb-2 font-bold uppercase tracking-widest">
                  {t.find[lang] || t.find["en"]}
                </div>
                <div className="text-6xl md:text-7xl font-black text-amber-600 mb-2">
                  {getCoinLabel(target)}
                </div>
                <div className="text-xl text-amber-800/60 font-medium">
                  {getCoinSub(target)}
                </div>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-8 justify-items-center items-center">
                {coinsData.map((c, i) => (
                  <button
                    key={i}
                    onClick={() => check(c)}
                    className={`transition-transform active:scale-95 flex flex-col items-center gap-2 group hover:scale-110 duration-300`}
                  >
                    <div
                      className={`${c.css} flex flex-col items-center justify-center coin-shadow relative overflow-hidden`}
                    >
                      {/* Add faint detail */}
                      <div className="absolute inset-0 bg-gradient-to-br from-white/30 to-black/10 rounded-inherit opacity-50"></div>
                      <span className="relative z-10">{getCoinLabel(c)}</span>
                    </div>
                  </button>
                ))}
              </div>

              <div className="mt-12 h-16">
                {feedback === "CORRECT" && (
                  <div className="text-4xl font-black text-green-500 animate-bounce">
                    {get("correct", lang)}
                  </div>
                )}
                {feedback === "WRONG" && (
                  <div className="text-4xl font-black text-red-500 animate-shake">
                    {get("wrong", lang)}
                  </div>
                )}
              </div>

              <div className="mt-4 text-slate-400 font-bold">
                {t.score[lang] || t.score["en"]} {score}
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
