<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小二數學：直角 | Right Angles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, #172554 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "📐 Right Angles",
          zh: "📐 認識直角",
          ja: "📐 直角",
          ko: "📐 직각",
          es: "📐 Ángulos rectos",
          de: "📐 Rechte Winkel",
          fi: "📐 Suorat kulmat",
          fr: "📐 Angles droits",
          ar: "📐 زوايا قائمة",
          it: "📐 Angoli retti",
        },
        isRight: {
          en: "Is this a Right Angle?",
          zh: "這是否直角？",
          ja: "これは直角ですか？",
          ko: "이것은 직각입니까?",
          es: "¿Es esto un ángulo recto?",
          de: "Ist das ein rechter Winkel?",
          fi: "Onko tämä suora kulma?",
          fr: "Est-ce un angle droit ?",
          ar: "هل هذه زاوية قائمة؟",
          it: "È un angolo retto?",
        },
        yes: {
          en: "Yes",
          zh: "是",
          ja: "はい",
          ko: "예",
          es: "Sí",
          de: "Ja",
          fi: "Kyllä",
          fr: "Oui",
          ar: "نعم",
          it: "Sì",
        },
        no: {
          en: "No",
          zh: "不是",
          ja: "いいえ",
          ko: "아니요",
          es: "No",
          de: "Nein",
          fi: "Ei",
          fr: "Non",
          ar: "لا",
          it: "No",
        },
        hint: {
          en: "Right angle is 90°",
          zh: "直角是 90 度",
          ja: "直角は90度です",
          ko: "직각은 90도입니다",
          es: "El ángulo recto es de 90°",
          de: "Ein rechter Winkel hat 90°",
          fi: "Suora kulma on 90°",
          fr: "L'angle droit est de 90°",
          ar: "الزاوية القائمة هي 90 درجة",
          it: "L'angolo retto è di 90°",
        },
        check: {
          en: "Check",
          zh: "檢查",
          ja: "確認",
          ko: "확인",
          es: "Comprobar",
          de: "Prüfen",
          fi: "Tarkista",
          fr: "Vérifier",
          ar: "تحقق",
          it: "Controlla",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [isRight, setIsRight] = useState(true);
        const [feedback, setFeedback] = useState("");
        const [rotation, setRotation] = useState(0);

        const newProb = () => {
          setFeedback("");
          setIsRight(Math.random() > 0.5);
          setRotation(Math.floor(Math.random() * 360));
        };

        useEffect(newProb, []);

        const check = (ans) => {
          if (ans === isRight) {
            setFeedback("CORRECT");
            setTimeout(newProb, 1500);
          } else {
            setFeedback("WRONG");
          }
        };

        // Render Angle visual
        // We use SVG lines. Center (100,100).
        // Line 1: 0 deg. Line 2: 90 deg (if right), or 60/120 (if not).
        // Rotate whole SVG container.
        const angle2 = isRight ? 90 : Math.random() > 0.5 ? 60 : 120;

        return (
          <div className="min-h-screen p-8 flex flex-col items-center justify-center">
            <LanguageSelector lang={lang} setLang={setLang} />

            <h1 className="text-4xl md:text-5xl font-black text-blue-900 mb-8 max-w-2xl text-center">
              {t.title[lang] || t.title["en"]}
            </h1>

            <div className="bg-white/90 rounded-3xl p-8 shadow-2xl w-full max-w-xl text-center border-4 border-blue-300">
              <div className="h-64 flex items-center justify-center mb-8 bg-blue-50 rounded-2xl overflow-hidden relative">
                <div
                  style={{
                    transform: `rotate(${rotation}deg)`,
                    transition: "transform 0.5s",
                  }}
                >
                  <svg width="200" height="200" viewBox="0 0 200 200">
                    {/* Line 1 */}
                    <line
                      x1="100"
                      y1="100"
                      x2="180"
                      y2="100"
                      stroke="#1e3a8a"
                      strokeWidth="8"
                      strokeLinecap="round"
                    />
                    {/* Line 2 */}
                    <line
                      x1="100"
                      y1="100"
                      x2={100 + 80 * Math.cos((angle2 * Math.PI) / 180)}
                      y2={100 - 80 * Math.sin((angle2 * Math.PI) / 180)}
                      stroke="#1e3a8a"
                      strokeWidth="8"
                      strokeLinecap="round"
                    />

                    {/* Arc for visual */}
                    <path
                      d={`M 130 100 A 30 30 0 0 0 ${
                        100 + 30 * Math.cos((angle2 * Math.PI) / 180)
                      } ${100 - 30 * Math.sin((angle2 * Math.PI) / 180)}`}
                      fill="none"
                      stroke="#60a5fa"
                      strokeWidth="2"
                      strokeDasharray="4 4"
                    />
                  </svg>
                </div>
              </div>

              <div className="text-2xl font-bold text-slate-700 mb-8">
                {t.isRight[lang] || t.isRight["en"]}
              </div>

              <div className="flex gap-4 justify-center">
                <button
                  onClick={() => check(true)}
                  className="flex-1 bg-green-500 hover:bg-green-600 text-white p-4 rounded-xl font-black text-2xl shadow-lg transition-transform active:scale-95"
                >
                  {t.yes[lang] || t.yes["en"]}
                </button>
                <button
                  onClick={() => check(false)}
                  className="flex-1 bg-red-500 hover:bg-red-600 text-white p-4 rounded-xl font-black text-2xl shadow-lg transition-transform active:scale-95"
                >
                  {t.no[lang] || t.no["en"]}
                </button>
              </div>

              <div className="h-16 mt-6">
                {feedback === "CORRECT" && (
                  <div className="text-center text-4xl font-black text-green-500 animate-bounce">
                    {get("correct", lang)}
                  </div>
                )}
                {feedback === "WRONG" && (
                  <div className="text-center text-4xl font-black text-red-500 animate-shake">
                    {get("wrong", lang)}
                  </div>
                )}
              </div>

              {feedback === "CORRECT" && isRight && (
                <div className="mt-2 text-blue-600 font-bold">
                  {t.hint[lang] || t.hint["en"]}
                </div>
              )}
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
