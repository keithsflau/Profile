<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小四數學：折線圖入門 | Line Graphs Intro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #e0f2fe 0%, #0ea5e9 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Line Graphs Intro",
          zh: "折線圖入門",
          ja: "折れ線グラフ入門",
          ko: "선 그래프 소개",
          es: "Introducción a los Gráficos de Líneas",
          de: "Einführung in Liniendiagramme",
          fi: "Viivakaavioiden esittely",
          fr: "Introduction aux graphiques linéaires",
          ar: "مقدمة في الرسوم البيانية الخطية",
          it: "Introduzione ai grafici lineari",
        },
        chartTitle: {
          en: "Weekly Temperature Change",
          zh: "一週氣溫變化",
          ja: "週間気温変化",
          ko: "주간 기온 변화",
          es: "Cambio de Temperatura Semanal",
          de: "Wöchentliche Temperaturänderung",
          fi: "Viikoittainen lämpötilan muutos",
          fr: "Changement de température hebdomadaire",
          ar: "تغير درجة الحرارة الأسبوعي",
          it: "Variazione della temperatura settimanale",
        },
        featuresTitle: {
          en: "Features of Line Graphs",
          zh: "折線圖特點",
          ja: "折れ線グラフの特徴",
          ko: "선 그래프의 특징",
          es: "Características de los Gráficos de Líneas",
          de: "Merkmale von Liniendiagrammen",
          fi: "Viivakaavioiden ominaisuudet",
          fr: "Caractéristiques des graphiques linéaires",
          ar: "ميزات الرسوم البيانية الخطية",
          it: "Caratteristiche dei grafici lineari",
        },
        explanation: {
          en: "Line graphs are best for showing trends! e.g. temperature changes, grade progress.",
          zh: "折線圖最適合用來顯示變化趨勢！例如氣溫升降、成績進步退步等。",
          ja: "折れ線グラフは傾向を示すのに最適です！例：気温の変化、成績の進歩など。",
          ko: "선 그래프는 추세를 보여주는 데 가장 좋습니다! 예: 기온 변화, 성적 향상 등.",
          es: "¡Los gráficos de líneas son mejores para mostrar tendencias! p. ej., cambios de temperatura, progreso de calificaciones.",
          de: "Liniendiagramme eignen sich am besten, um Trends zu zeigen! z. B. Temperaturänderungen, Notenfortschritt.",
          fi: "Viivakaaviot sopivat parhaiten trendien osoittamiseen! esim. lämpötilan muutokset, arvosanojen kehitys.",
          fr: "Les graphiques linéaires sont les meilleurs pour montrer les tendances ! par ex. changements de température, progrès scolaire.",
          ar: "الرسوم البيانية الخطية هي الأفضل لإظهار الاتجاهات! على سبيل المثال تغيرات درجة الحرارة، تقدم الدرجات.",
          it: "I grafici lineari sono i migliori per mostrare le tendenze! ad es. variazioni di temperatura, progressi scolastici.",
        },
        day: {
          en: "Day",
          zh: "第",
          ja: "日目",
          ko: "일차",
          es: "Día",
          de: "Tag",
          fi: "Päivä",
          fr: "Jour",
          ar: "اليوم",
          it: "Giorno",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const getText = (key) => t[key][lang] || t[key]["en"];

        // Data: Temperature over a week
        const data = [22, 24, 21, 25, 28, 26, 23];
        const max = 30;
        const width = 600;
        const height = 300;
        const padding = 40;

        // Generate Path
        const points = data
          .map((d, i) => {
            const x = padding + i * ((width - padding * 2) / (data.length - 1));
            const y = height - padding - (d / max) * (height - padding * 2);
            return `${x},${y}`;
          })
          .join(" ");

        const pointArr = data.map((d, i) => {
          const x = padding + i * ((width - padding * 2) / (data.length - 1));
          const y = height - padding - (d / max) * (height - padding * 2);
          return { x, y, val: d, day: i + 1 };
        });

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-sky-900 mb-8 mt-8">
              📈 {getText("title")}
            </h1>

            <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-4xl w-full">
              <h2 className="text-2xl font-bold text-sky-800 mb-6 text-center">
                {getText("chartTitle")}
              </h2>

              <div className="overflow-x-auto">
                <svg
                  width={width}
                  height={height}
                  className="mx-auto bg-slate-50 border-2 border-slate-200 rounded-xl"
                >
                  {/* Grid Lines */}
                  {[...Array(6)].map((_, i) => {
                    const y =
                      height -
                      padding -
                      ((i * 5) / max) * (height - padding * 2);
                    return (
                      <g key={i}>
                        <line
                          x1={padding}
                          y1={y}
                          x2={width - padding}
                          y2={y}
                          stroke="#e2e8f0"
                        />
                        <text
                          x={padding - 10}
                          y={y + 5}
                          textAnchor="end"
                          className="text-xs fill-slate-400 font-bold"
                        >
                          {i * 5}°
                        </text>
                      </g>
                    );
                  })}

                  {/* Line */}
                  <polyline
                    points={points}
                    fill="none"
                    stroke="#0ea5e9"
                    strokeWidth="4"
                  />

                  {/* Points */}
                  {pointArr.map((p, i) => (
                    <g key={i} className="group cursor-pointer">
                      <circle
                        cx={p.x}
                        cy={p.y}
                        r="6"
                        fill="#0ea5e9"
                        stroke="white"
                        strokeWidth="2"
                      />
                      <text
                        x={p.x}
                        y={height - 10}
                        textAnchor="middle"
                        className="text-xs fill-slate-500 font-bold"
                      >
                        {lang === "zh" ? `第${p.day}天` : `Day ${p.day}`}
                      </text>

                      {/* Tooltip */}
                      <g className="opacity-0 group-hover:opacity-100 transition-opacity">
                        <rect
                          x={p.x - 20}
                          y={p.y - 40}
                          width="40"
                          height="25"
                          rx="4"
                          fill="#0f172a"
                        />
                        <text
                          x={p.x}
                          y={p.y - 23}
                          textAnchor="middle"
                          fill="white"
                          className="text-xs font-bold"
                        >
                          {p.val}°C
                        </text>
                      </g>
                    </g>
                  ))}
                </svg>
              </div>

              <div className="mt-8 bg-sky-50 p-6 rounded-2xl text-center text-sky-800">
                <h3 className="text-xl font-bold mb-2">
                  {getText("featuresTitle")}
                </h3>
                <p>{getText("explanation")}</p>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
