<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小四數學：大數算盤 | Large Number Abacus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fffbeb 0%, #fbbf24 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Large Number Abacus",
          zh: "大數算盤",
          ja: "大きな数のそろばん",
          ko: "큰 수 주판",
          es: "Ábaco de Grandes Números",
          de: "Große Zahlen Abakus",
          fi: "Suurten lukujen helmitaulu",
          fr: "Abaque des grands nombres",
          ar: "عداد الأعداد الكبيرة",
          it: "Abaco dei grandi numeri",
        },
        millions: {
          en: "Millions",
          zh: "百萬",
          ja: "百万",
          ko: "백만",
          es: "Millones",
          de: "Millionen",
          fi: "Miljoonat",
          fr: "Millions",
          ar: "ملايين",
          it: "Milioni",
        },
        hthou: {
          en: "100K",
          zh: "十萬",
          ja: "十万",
          ko: "십만",
          es: "100K",
          de: "100T",
          fi: "100t",
          fr: "100k",
          ar: "100 ألف",
          it: "100k",
        },
        tthou: {
          en: "10K",
          zh: "萬",
          ja: "万",
          ko: "만",
          es: "10K",
          de: "10T",
          fi: "10t",
          fr: "10k",
          ar: "10 ألف",
          it: "10k",
        },
        thou: {
          en: "1K",
          zh: "千",
          ja: "千",
          ko: "천",
          es: "1K",
          de: "1T",
          fi: "1t",
          fr: "1k",
          ar: "ألف",
          it: "1k",
        },
        hun: {
          en: "100",
          zh: "百",
          ja: "百",
          ko: "백",
          es: "100",
          de: "100",
          fi: "100",
          fr: "100",
          ar: "مئة",
          it: "100",
        },
        ten: {
          en: "10",
          zh: "十",
          ja: "十",
          ko: "십",
          es: "10",
          de: "10",
          fi: "10",
          fr: "10",
          ar: "عشرة",
          it: "10",
        },
        one: {
          en: "1",
          zh: "個",
          ja: "一",
          ko: "일",
          es: "1",
          de: "1",
          fi: "1",
          fr: "1",
          ar: "واحد",
          it: "1",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const getText = (key) => t[key][lang] || t[key]["en"];

        // Need columns for 1, 10, 100, 1000, 10000, 100000, 1000000
        const [val, setVal] = useState(1234567);
        const digits = val.toString().padStart(7, "0").split("").map(Number);
        const places = [
          getText("millions"),
          getText("hthou"),
          getText("tthou"),
          getText("thou"),
          getText("hun"),
          getText("ten"),
          getText("one"),
        ];

        const moveBead = (idx, delta) => {
          let newDigits = [...digits];
          newDigits[idx] = Math.max(0, Math.min(9, newDigits[idx] + delta));
          setVal(parseInt(newDigits.join(""), 10));
        };

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-amber-900 mb-8 mt-8">
              🧮 {getText("title")}
            </h1>

            <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-5xl w-full flex flex-col items-center">
              <div className="mb-12 text-7xl font-black text-amber-600 tracking-widest font-mono">
                {val.toLocaleString()}
              </div>

              {/* Abacus Visual */}
              <div className="flex flex-wrap justify-center bg-amber-800 p-8 rounded-xl shadow-2xl gap-4 border-b-8 border-amber-950">
                {digits.map((d, i) => (
                  <div
                    key={i}
                    className="flex flex-col items-center relative h-[300px] w-16 md:w-20"
                  >
                    {/* Rod */}
                    <div className="absolute top-0 bottom-0 w-2 bg-slate-300 rounded-full"></div>

                    {/* Label */}
                    <div className="absolute -top-12 text-amber-900 font-bold text-sm md:text-xl text-center w-24">
                      {places[i]}
                    </div>

                    {/* Beads - simple representation: stack of beads */}
                    <div className="z-10 mt-auto flex flex-col gap-1 mb-4 w-full items-center">
                      {[...Array(d)].map((_, j) => (
                        <div
                          key={j}
                          className="h-5 md:h-6 w-14 md:w-16 bg-gradient-to-r from-red-500 to-red-600 rounded-full shadow-md border border-red-800"
                        ></div>
                      ))}
                    </div>

                    <div className="absolute -bottom-16 flex flex-col gap-2 z-20">
                      <button
                        onClick={() => moveBead(i, 1)}
                        className="w-8 h-8 rounded-full bg-green-500 text-white font-bold flex items-center justify-center hover:bg-green-600 shadow"
                      >
                        +
                      </button>
                      <button
                        onClick={() => moveBead(i, -1)}
                        className="w-8 h-8 rounded-full bg-red-500 text-white font-bold flex items-center justify-center hover:bg-red-600 shadow"
                      >
                        -
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
