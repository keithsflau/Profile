    <script type="text/babel">

        },

        },
        numerator: {

        },
        knowledge: {
          en: "Fraction Facts",
          zh: "分數知識",
          ja: "分数の知識",
          ko: "분수 지식",
          es: "Datos de fracciones",
          de: "Fakten zu Brüchen",
          fi: "Murtolukutietoa",
          fr: "Faits sur les fractions",
          ar: "حقائق الكسور",
          it: "Fatti sulle frazioni",
        },
        factNum: {
          en: "Numerator: Top number, parts taken",
          zh: "分子：分數線上面的數字，代表取了幾份",
          ja: "分子：上の数字、取られた部分",
          ko: "분자: 위쪽 숫자, 취한 부분",
          es: "Numerador: Número superior, partes tomadas",
          de: "Zähler: Obere Zahl, genommene Teile",
          fi: "Osoittaja: Ylempi luku, otetut osat",
          fr: "Numérateur : Nombre du haut, parties prises",
          ar: "البسط: الرقم العلوي، الأجزاء المأخوذة",
          it: "Numeratore: Numero superiore, parti prese",
        },
        factDen: {
          en: "Denominator: Bottom number, total parts",
          zh: "分母：分數線下面的數字，代表總共分成幾份",
          ja: "分母：下の数字、合計部分",
          ko: "분모: 아래쪽 숫자, 총 부분",
          es: "Denominador: Número inferior, partes totales",
          de: "Nenner: Untere Zahl, Gesamtteile",
          fi: "Nimittäjä: Alempi luku, kokonaisosat",
          fr: "Dénominateur : Nombre du bas, parties totales",
          ar: "المقام: الرقم السفلي، الأجزاء الكلية",
          it: "Denominatore: Numero inferiore, parti totali",
        },
        factProper: {
          en: "Proper Fraction: Numerator < Denominator",
          zh: "真分數：分子 < 分母",
          ja: "真分数：分子 < 分母",
          ko: "진분수: 분자 < 분모",
          es: "Fracción propia: Numerador < Denominador",
          de: "Echter Bruch: Zähler < Nenner",
          fi: "Aito murtoluku: Osoittaja < Nimittäjä",
          fr: "Fraction propre : Numérateur < Dénominateur",
          ar: "كسر حقيقي: البسط < المقام",
          it: "Frazione propria: Numeratore < Denominatore",
        },
        factImproper: {
          en: "Improper Fraction: Numerator ≥ Denominator",
          zh: "假分數：分子 ≥ 分母",
          ja: "仮分数：分子 ≥ 分母",
          ko: "가분수: 분자 ≥ 분모",
          es: "Fracción impropia: Numerador ≥ Denominador",
          de: "Unechter Bruch: Zähler ≥ Nenner",
          fi: "Epäaito murtoluku: Osoittaja ≥ Nimittäjä",
          fr: "Fraction impropre : Numérateur ≥ Dénominateur",
          ar: "كسر غير حقيقي: البسط ≥ المقام",
          it: "Frazione impropria: Numeratore ≥ Denominatore",
        },
      };

      const PieChart = ({ size = 24, className = "" }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
          <path d="M22 12A10 10 0 0 0 12 2v10z" />
        </svg>
      );

      function App() {
        const [lang, setLang] = useState("zh");
        const [numerator, setNumerator] = useState(1);
        const [denominator, setDenominator] = useState(4);
        const [shape, setShape] = useState("circle"); // circle, rectangle, strip

        const MAX_PARTS = 12;

        const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));
        const simplify = (num, den) => {
          const divisor = gcd(num, den);
          return { num: num / divisor, den: den / divisor };
        };

        const simplified = simplify(numerator, denominator);
        const decimal = (numerator / denominator).toFixed(3);
        const percentage = ((numerator / denominator) * 100).toFixed(1);

        const renderCircle = () => {
          const anglePerPart = 360 / denominator;
          const parts = [];

          return (
            <div className="relative w-64 h-64 mx-auto">
              <svg
                className="absolute inset-0 w-full h-full"
                viewBox="0 0 200 200"
              >
                {[...Array(denominator)].map((_, i) => {
                  const angle = (360 / denominator) * i;
                  const x1 = 100;
                  const y1 = 100;
                  const x2 =
                    100 + 100 * Math.cos(((angle - 90) * Math.PI) / 180);
                  const y2 =
                    100 + 100 * Math.sin(((angle - 90) * Math.PI) / 180);
                  const isFilled = i < numerator;

                  const largeArcFlag = 360 / denominator > 180 ? 1 : 0;
                  const x3 =
                    100 +
                    100 *
                      Math.cos(
                        ((angle - 90 + 360 / denominator) * Math.PI) / 180
                      );
                  const y3 =
                    100 +
                    100 *
                      Math.sin(
                        ((angle - 90 + 360 / denominator) * Math.PI) / 180
                      );

                  // Handle full circle case
                  if (denominator === 1) {
                    return (
                      <motion.circle
                        key={i}
                        cx="100"
                        cy="100"
                        r="100"
                        fill={isFilled ? "#fbbf24" : "#ffffff40"}
                        stroke="white"
                        strokeWidth="2"
                        initial={{ opacity: 0, scale: 0 }}
                        animate={{ opacity: 1, scale: 1 }}
                      />
                    );
                  }

                  return (
                    <motion.path
                      key={i}
                      d={`M ${x1} ${y1} L ${x2} ${y2} A 100 100 0 ${largeArcFlag} 1 ${x3} ${y3} Z`}
                      fill={isFilled ? "#fbbf24" : "#ffffff40"}
                      stroke="white"
                      strokeWidth="2"
                      initial={{ opacity: 0, scale: 0 }}
                      animate={{ opacity: 1, scale: 1 }}
                      transition={{ delay: i * 0.05 }}
                    />
                  );
                })}
              </svg>
            </div>
          );
        };

        const renderRectangle = () => {
          const cols = Math.ceil(Math.sqrt(denominator));
          const rows = Math.ceil(denominator / cols);

          return (
            <div
              className="grid gap-2 w-full max-w-md mx-auto"
              style={{ gridTemplateColumns: `repeat(${cols}, 1fr)` }}
            >
              {[...Array(denominator)].map((_, i) => (
                <motion.div
                  key={i}
                  className={`aspect-square rounded-lg border-2 border-white ${
                    i < numerator ? "bg-yellow-400" : "bg-white/30"
                  }`}
                  initial={{ opacity: 0, scale: 0 }}
                  animate={{ opacity: 1, scale: 1 }}
                  transition={{ delay: i * 0.03 }}
                />
              ))}
            </div>
          );
        };

        const renderStrip = () => {
          return (
            <div className="w-full max-w-2xl mx-auto">
              <div
                className="grid gap-1"
                style={{ gridTemplateColumns: `repeat(${denominator}, 1fr)` }}
              >
                {[...Array(denominator)].map((_, i) => (
                  <motion.div
                    key={i}
                    className={`h-24 rounded-lg border-2 border-white ${
                      i < numerator ? "bg-yellow-400" : "bg-white/30"
                    }`}
                    initial={{ opacity: 0, scaleX: 0 }}
                    animate={{ opacity: 1, scaleX: 1 }}
                    transition={{ delay: i * 0.05 }}
                  />
                ))}
              </div>
            </div>
          );
        };

        const getText = (key) => t[key][lang] || t[key]["en"];

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <header className="text-center mb-8 mt-8">
              <div className="inline-flex items-center gap-3 bg-white/20 backdrop-blur-md px-6 py-3 rounded-full mb-4">
                <PieChart className="text-white" size={24} />
                <span className="text-white font-bold text-lg">
                  {getText("header")}
                </span>
              </div>
              <h1 className="text-4xl md:text-6xl font-black text-white mb-2 tracking-tight">
                {getText("title")}
              </h1>
              <p className="text-xl text-white/80 font-medium">
                {getText("subtitle")}
              </p>
            </header>

            <main className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
              {/* Visualization Area */}
              <div className="lg:col-span-8 bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl">
                {/* Fraction Display */}
                <div className="text-center mb-8">
                  <div className="inline-flex flex-col items-center justify-center text-slate-800">
                    <div className="text-6xl font-black">{numerator}</div>
                    <div className="fraction-line my-2"></div>
                    <div className="text-6xl font-black">{denominator}</div>
                  </div>
                  {simplified.num !== numerator && (
                    <div className="mt-4 text-2xl font-bold text-purple-600">
                      = {simplified.num}/{simplified.den}{" "}
                      <span className="text-lg">({getText("simplified")})</span>
                    </div>
                  )}
                </div>

                {/* Shape Selector */}
                <div className="flex justify-center gap-4 mb-8 flex-wrap">
                  <button
                    onClick={() => setShape("circle")}
                    className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                      shape === "circle"
                        ? "bg-purple-600 text-white shadow-lg"
                        : "bg-white/50 text-slate-700"
                    }`}
                  >
                    {getText("circle")}
                  </button>
                  <button
                    onClick={() => setShape("rectangle")}
                    className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                      shape === "rectangle"
                        ? "bg-purple-600 text-white shadow-lg"
                        : "bg-white/50 text-slate-700"
                    }`}
                  >
                    {getText("rectangle")}
                  </button>
                  <button
                    onClick={() => setShape("strip")}
                    className={`px-6 py-3 rounded-2xl font-bold transition-all ${
                      shape === "strip"
                        ? "bg-purple-600 text-white shadow-lg"
                        : "bg-white/50 text-slate-700"
                    }`}
                  >
                    {getText("strip")}
                  </button>
                </div>

                {/* Visual Representation */}
                <div className="min-h-[300px] flex items-center justify-center py-8">
                  {shape === "circle" && renderCircle()}
                  {shape === "rectangle" && renderRectangle()}
                  {shape === "strip" && renderStrip()}
                </div>

                {/* Info Panel */}
                <div className="grid grid-cols-2 gap-4 mt-8">
                  <div className="bg-blue-50 rounded-2xl p-4 text-center">
                    <div className="text-sm font-bold text-slate-600 mb-1">
                      {getText("decimal")}
                    </div>
                    <div className="text-3xl font-black text-blue-600">
                      {decimal}
                    </div>
                  </div>
                  <div className="bg-green-50 rounded-2xl p-4 text-center">
                    <div className="text-sm font-bold text-slate-600 mb-1">
                      {getText("percentage")}
                    </div>
                    <div className="text-3xl font-black text-green-600">
                      {percentage}%
                    </div>
                  </div>
                </div>
              </div>

              {/* Control Panel */}
              <div className="lg:col-span-4 flex flex-col gap-6">
                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                  <h3 className="text-xl font-black text-purple-600 mb-4">
                    {getText("adjust")}
                  </h3>

                  <div className="mb-6">
                    <label className="block text-sm font-bold text-slate-600 mb-2">
                      {getText("numerator")}
                    </label>
                    <input
                      type="range"
                      min="0"
                      max={denominator}
                      value={numerator}
                      onChange={(e) => setNumerator(parseInt(e.target.value, 10))}
                      className="w-full"
                    />
                    <div className="text-4xl font-black text-center text-slate-800 mt-2">
                      {numerator}
                    </div>
                  </div>

                  <div className="mb-6">
                    <label className="block text-sm font-bold text-slate-600 mb-2">
                      {getText("denominator")}
                    </label>
                    <input
                      type="range"
                      min="1"
                      max={MAX_PARTS}
                      value={denominator}
                      onChange={(e) => {
                        const newDen = parseInt(e.target.value, 10);
                        setDenominator(newDen);
                        if (numerator > newDen) setNumerator(newDen);
                      }}
                      className="w-full"
                    />
                    <div className="text-4xl font-black text-center text-slate-800 mt-2">
                      {denominator}
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <button
                      onClick={() => {
                        setNumerator(1);
                        setDenominator(2);
                      }}
                      className="py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl font-bold text-sm transition-all"
                    >
                      1/2
                    </button>
                    <button
                      onClick={() => {
                        setNumerator(1);
                        setDenominator(4);
                      }}
                      className="py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl font-bold text-sm transition-all"
                    >
                      1/4
                    </button>
                    <button
                      onClick={() => {
                        setNumerator(3);
                        setDenominator(4);
                      }}
                      className="py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl font-bold text-sm transition-all"
                    >
                      3/4
                    </button>
                    <button
                      onClick={() => {
                        setNumerator(1);
                        setDenominator(3);
                      }}
                      className="py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-xl font-bold text-sm transition-all"
                    >
                      1/3
                    </button>
                  </div>
                </div>

                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                  <h3 className="text-lg font-black text-slate-800 mb-3 flex items-center gap-2">
                    💡 {getText("knowledge")}
                  </h3>
                  <div className="text-sm text-slate-600 leading-relaxed space-y-2">
                    <p>
                      <strong>{getText("factNum")}</strong>
                    </p>
                    <p>
                      <strong>{getText("factDen")}</strong>
                    </p>
                    <p>
                      <strong>{getText("factProper")}</strong>
                    </p>
                    <p>
                      <strong>{getText("factImproper")}</strong>
                    </p>
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
