<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小四數學：大數運算計算機 | Large Number Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #fecaca 0%, #991b1b 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Large Number Operations",
          zh: "大數運算",
          ja: "大きな数の計算",
          ko: "큰 수 연산",
          es: "Operaciones con Números Grandes",
          de: "Rechnen mit großen Zahlen",
          fi: "Suurten lukujen laskutoimitukset",
          fr: "Opérations sur les grands nombres",
          ar: "العمليات على الأعداد الكبيرة",
          it: "Operazioni con grandi numeri",
        },
        verticalHint: {
          en: "Vertical Working (Hint)",
          zh: "直式提示",
          ja: "筆算のヒント",
          ko: "세로식 힌트",
          es: "Pista de cálculo vertical",
          de: "Tipp für schriftliche Rechnung",
          fi: "Allekkainlaskuvihje",
          fr: "Indice de calcul vertical",
          ar: "تلميح العمليات العمودية",
          it: "Suggerimento calcolo verticale",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [n1, setN1] = useState(1234);
        const [n2, setN2] = useState(56);
        const [op, setOp] = useState("×");

        const res = op === "×" ? n1 * n2 : Math.floor(n1 / n2);
        const rem = op === "÷" ? n1 % n2 : 0;

        const getText = (key) => t[key][lang] || t[key]["en"];

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-white mb-8 mt-8">
              🧮 {getText("title")}
            </h1>

            <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl max-w-2xl w-full">
              <div className="flex gap-4 mb-8">
                <input
                  type="number"
                  value={n1}
                  onChange={(e) => setN1(parseInt(e.target.value, 10) || 0)}
                  className="flex-1 text-2xl md:text-4xl font-black text-center p-4 border-4 border-red-200 rounded-2xl outline-none focus:border-red-500"
                />
                <div className="flex flex-col gap-2 justify-center">
                  <button
                    onClick={() => setOp("×")}
                    className={`p-2 rounded-lg font-black ${
                      op === "×" ? "bg-red-500 text-white" : "bg-slate-200"
                    }`}
                  >
                    ×
                  </button>
                  <button
                    onClick={() => setOp("÷")}
                    className={`p-2 rounded-lg font-black ${
                      op === "÷" ? "bg-red-500 text-white" : "bg-slate-200"
                    }`}
                  >
                    ÷
                  </button>
                </div>
                <input
                  type="number"
                  value={n2}
                  onChange={(e) => setN2(parseInt(e.target.value, 10) || 1)}
                  className="w-24 md:w-32 text-2xl md:text-4xl font-black text-center p-4 border-4 border-red-200 rounded-2xl outline-none focus:border-red-500"
                />
              </div>

              <div className="bg-slate-100 p-8 rounded-2xl text-right font-mono text-3xl md:text-5xl font-black tracking-widest text-slate-700 break-words">
                {res.toLocaleString()}
                {op === "÷" && rem > 0 && (
                  <span className="text-xl md:text-2xl text-slate-400 ml-4">
                    ... {rem}
                  </span>
                )}
              </div>

              {op === "×" && (
                <div className="mt-8 bg-red-50 p-6 rounded-2xl">
                  <h3 className="text-xl font-bold text-red-800 mb-4">
                    {getText("verticalHint")}
                  </h3>
                  <div className="font-mono text-right text-xl leading-relaxed text-red-900 overflow-x-auto">
                    <div>{n1}</div>
                    <div>× {n2}</div>
                    <div className="border-b-2 border-red-800 my-1"></div>
                    {n2
                      .toString()
                      .split("")
                      .reverse()
                      .map((d, i) => (
                        <div key={i} className="text-slate-500">
                          {parseInt(d, 10) * n1}
                          {"0".repeat(i)}
                          <span className="text-xs ml-2 text-red-300">
                            ( {n1} × {d}
                            {"0".repeat(i)} )
                          </span>
                        </div>
                      ))}
                    <div className="border-t-2 border-red-800 mt-1 font-bold pt-1">
                      {n1 * n2}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
