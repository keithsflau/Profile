<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小四數學：棒形圖（一格代表多個單位） | Bar Charts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #e0f2fe 0%, #0284c7 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Bar Charts: Scale of One Unit",
          zh: "棒形圖：一格代表？",
          ja: "棒グラフ：1単位の目盛り",
          ko: "막대 그래프: 1단위의 척도",
          es: "Gráficos de Barras: Escala de Una Unidad",
          de: "Balkendiagramme: Maßstab",
          fi: "Pylväskaaviot: Yhden yksikön asteikko",
          fr: "Graphiques à barres : Échelle d'une unité",
          ar: "الرسوم البيانية الشريطية: مقياس الوحدة الواحدة",
          it: "Grafici a barre: Scala di un'unità",
        },
        scaleSettings: {
          en: "Set Scale",
          zh: "設定刻度",
          ja: "目盛り設定",
          ko: "척도 설정",
          es: "Ajustar Escala",
          de: "Maßstab einstellen",
          fi: "Aseta asteikko",
          fr: "Définir l'échelle",
          ar: "تعيين المقياس",
          it: "Imposta scala",
        },
        oneBlockEquals: {
          en: "1 Block = {n} units",
          zh: "1 格代表 {n} 人",
          ja: "1ブロック = {n} 人",
          ko: "1 블록 = {n} 명",
          es: "1 Bloque = {n} unidades",
          de: "1 Block = {n} Einheiten",
          fi: "1 lohko = {n} yksikköä",
          fr: "1 Bloc = {n} unités",
          ar: "1 كتلة = {n} وحدة",
          it: "1 Blocco = {n} unità",
        },
        classA: {
          en: "Class A",
          zh: "A班",
          ja: "クラスA",
          ko: "A반",
          es: "Clase A",
          de: "Klasse A",
          fi: "Luokka A",
          fr: "Classe A",
          ar: "الصف أ",
          it: "Classe A",
        },
        classB: {
          en: "Class B",
          zh: "B班",
          ja: "クラスB",
          ko: "B반",
          es: "Clase B",
          de: "Klasse B",
          fi: "Luokka B",
          fr: "Classe B",
          ar: "الصف ب",
          it: "Classe B",
        },
        classC: {
          en: "Class C",
          zh: "C班",
          ja: "クラスC",
          ko: "C반",
          es: "Clase C",
          de: "Klasse C",
          fi: "Luokka C",
          fr: "Classe C",
          ar: "الصف ج",
          it: "Classe C",
        },
        classD: {
          en: "Class D",
          zh: "D班",
          ja: "クラスD",
          ko: "D반",
          es: "Clase D",
          de: "Klasse D",
          fi: "Luokka D",
          fr: "Classe D",
          ar: "الصف د",
          it: "Classe D",
        },
        offChart: {
          en: "Off Chart!",
          zh: "爆表了!",
          ja: "チャート外！",
          ko: "차트 초과!",
          es: "¡Fuera de Gráfico!",
          de: "Außerhalb des Diagramms!",
          fi: "Ohi kaavion!",
          fr: "Hors graphique !",
          ar: "خارج الرسم البياني!",
          it: "Fuori scala!",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [scale, setScale] = useState(10); // 1, 2, 5, 10, 100
        const maxVal = 100;

        const getText = (key) => t[key][lang] || t[key]["en"];

        const data = [
          { name: getText("classA"), val: 40, color: "bg-red-500" },
          { name: getText("classB"), val: 70, color: "bg-green-500" },
          { name: getText("classC"), val: 55, color: "bg-yellow-500" },
          { name: getText("classD"), val: 90, color: "bg-purple-500" },
        ];

        return (
          <div className="min-h-screen p-8 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-sky-900 mb-8 mt-8">
              📊 {getText("title")}
            </h1>

            <div className="bg-white/95 backdrop-blur-md rounded-3xl p-8 shadow-2xl w-full max-w-5xl flex flex-col md:flex-row gap-8">
              <div className="w-full md:w-1/4">
                <h3 className="text-2xl font-bold text-sky-800 mb-4">
                  {getText("scaleSettings")}
                </h3>
                <div className="space-y-3">
                  {[1, 2, 5, 10, 20].map((s) => (
                    <button
                      key={s}
                      onClick={() => setScale(s)}
                      className={`w-full py-3 rounded-xl font-bold text-xl transition-all ${
                        scale === s
                          ? "bg-sky-600 text-white shadow-lg"
                          : "bg-sky-100 text-sky-700 hover:bg-sky-200"
                      }`}
                    >
                      {getText("oneBlockEquals").replace("{n}", s)}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex-1 bg-slate-50 p-8 rounded-2xl border-2 border-slate-200 relative">
                {/* Grid Lines */}
                <div className="absolute inset-0 p-8 flex flex-col-reverse justify-between pointer-events-none">
                  {[...Array(11)].map((_, i) => (
                    <div
                      key={i}
                      className="w-full h-px bg-slate-300 relative"
                    ></div>
                  ))}
                </div>

                {/* Axis Labels override logic */}
                <div className="h-[400px] border-l-4 border-b-4 border-slate-600 flex items-end justify-around relative pl-2">
                  {/* Correct approach: Fixed 10 grid lines. Value = index * scale */}
                  <div className="absolute left-[-50px] top-0 bottom-0 flex flex-col-reverse justify-between h-full">
                    {[...Array(11)].map((_, i) => (
                      <div
                        key={i}
                        className="text-right w-10 text-slate-500 font-bold text-sm"
                        style={{ transform: "translateY(50%)" }}
                      >
                        {i * scale}
                      </div>
                    ))}
                  </div>

                  {/* Bars */}
                  {data.map((d, i) => {
                    // Height calc: Value / (TopScaleValue) * 100%
                    // TopScaleValue = 10 * scale
                    const hPercent = (d.val / (10 * scale)) * 100;

                    return (
                      <div
                        key={i}
                        className="w-16 flex flex-col justify-end h-full group relative"
                      >
                        {hPercent > 100 ? (
                          <div className="w-full bg-red-800 text-white text-center font-bold text-xs py-1 rounded-t-lg animate-pulse">
                            {getText("offChart")}
                          </div>
                        ) : (
                          <div
                            className={`w-full ${d.color} rounded-t-lg transition-all duration-500 relative group-hover:opacity-80`}
                            style={{ height: `${hPercent}%` }}
                          >
                            <div className="absolute -top-8 w-full text-center font-black text-slate-700 opacity-0 group-hover:opacity-100 transition-opacity">
                              {d.val}
                            </div>
                          </div>
                        )}
                        <div className="text-center font-bold text-slate-700 mt-2">
                          {d.name}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
