                          setValue(parseFloat(e.target.value) || 0)
                        }
                        className="w-full px-6 py-4 rounded-2xl border-2 border-pink-200 focus:border-pink-500 outline-none text-2xl font-black text-center"
                      />
                    </div>

                    <div className="mb-6">
                      <label className="block text-sm font-bold text-slate-600 mb-3">
                        {getText("percent")}
                      </label>
                      <input
                        type="range"
                        min="0"
                        max="100"
                        value={percentage}
                        onChange={(e) =>
                          setPercentage(parseInt(e.target.value, 10))
                        }
                        className="w-full mb-3"
                      />
                      <div className="text-center text-4xl font-black text-pink-600 mb-4">
                        {percentage}%
                      </div>
                      {renderProgressBar(percentage)}
                    </div>

                    <div className="bg-gradient-to-br from-pink-50 to-orange-50 rounded-2xl p-8 border-2 border-pink-200">
                      <div className="text-center mb-4">
                        <div className="text-xl font-bold text-slate-600 mb-2">
                          {getText("formula")}
                        </div>
                        <div className="text-2xl font-mono text-slate-800 mb-4">
                          {value} × {percentage}% = {value} ×{" "}
                          {(percentage / 100).toFixed(2)}
                        </div>
                      </div>
                      <div className="text-center">
                        <div className="text-lg font-bold text-slate-600 mb-2">
                          {getText("answer")}
                        </div>
                        <div className="text-6xl font-black text-pink-600">
                          {result.toFixed(2)}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Discount Mode */}
                {mode === "discount" && (
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2">
                      <ShoppingBag /> {getText("discount_title")}
                    </h2>

                    <div className="mb-6">
                      <label className="block text-sm font-bold text-slate-600 mb-3">
                        {getText("original_price")}
                      </label>
                      <input
                        type="number"
                        value={originalPrice}
                        onChange={(e) =>
                          setOriginalPrice(parseFloat(e.target.value) || 0)
                        }
                        className="w-full px-6 py-4 rounded-2xl border-2 border-blue-200 focus:border-blue-500 outline-none text-2xl font-black text-center"
                      />
                    </div>

                    <div className="mb-6">
                      <label className="block text-sm font-bold text-slate-600 mb-3">
                        {getText("discount_rate")}
                      </label>
                      <input
                        type="range"
                        min="0"
                        max="90"
                        value={discountRate}
                        onChange={(e) =>
                          setDiscountRate(parseInt(e.target.value, 10))
                        }
                        className="w-full mb-3"
                      />
                      <div className="text-center text-4xl font-black text-blue-600 mb-4">
                        {discountRate}% OFF
                      </div>
                      {renderProgressBar(discountRate)}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                      <div className="bg-slate-100 rounded-2xl p-4 text-center">
                        <div className="text-sm font-bold text-slate-600 mb-2">
                          {getText("label_original")}
                        </div>
                        <div className="text-3xl font-black text-slate-800">
                          ${originalPrice}
                        </div>
                      </div>
                      <div className="bg-red-100 rounded-2xl p-4 text-center">
                        <div className="text-sm font-bold text-red-600 mb-2">
                          {getText("label_saved")}
                        </div>
                        <div className="text-3xl font-black text-red-600">
                          -${discountAmount.toFixed(2)}
                        </div>
                      </div>
                      <div className="bg-green-100 rounded-2xl p-4 text-center border-2 border-green-400">
                        <div className="text-sm font-bold text-green-700 mb-2">
                          {getText("label_final")}
                        </div>
                        <div className="text-3xl font-black text-green-600">
                          ${finalPrice.toFixed(2)}
                        </div>
                      </div>
                    </div>

                    <div className="bg-gradient-to-r from-blue-50 to-purple-50 rounded-2xl p-6">
                      <h3 className="font-black text-lg text-slate-800 mb-3">
                        {getText("steps")}
                      </h3>
                      <ol className="space-y-2 text-slate-700">
                        <li>
                          <strong>1.</strong> {getText("step1_desc")} $
                          {originalPrice} × {discountRate}% = $
                          {discountAmount.toFixed(2)}
                        </li>
                        <li>
                          <strong>2.</strong> {getText("step2_desc")} $
                          {originalPrice} - ${discountAmount.toFixed(2)} ={" "}
                          <span className="text-green-600 font-black">
                            ${finalPrice.toFixed(2)}
                          </span>
                        </li>
                      </ol>
                    </div>
                  </div>
                )}

                {/* Scenarios Mode */}
                {mode === "scenarios" && (
                  <div>
                    <h2 className="text-2xl font-black text-slate-800 mb-6">
                      {getText("scenarios_title")}
                    </h2>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {scenarios.map((scenario, idx) => {
                        const amount =
                          (scenario.original * scenario.rate) / 100;
                        const final =
                          scenario.type === "discount"
                            ? scenario.original - amount
                            : scenario.original + amount;

                        return (
                          <div
                            key={idx}
                            className="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-6 border-2 border-purple-200"
                          >
                            <div className="text-4xl mb-3">{scenario.icon}</div>
                            <h3 className="text-xl font-black text-slate-800 mb-4">
                              {getText(scenario.titleKey)}
                            </h3>

                            <div className="space-y-3 text-slate-700">
                              <div className="flex justify-between">
                                <span>{getText("base")}</span>
                                <span className="font-black">
                                  ${scenario.original}
                                </span>
                              </div>
                              <div className="flex justify-between">
                                <span>{getText("rate_label")}</span>
                                <span className="font-black">
                                  {scenario.rate}%
                                </span>
                              </div>
                              <div className="flex justify-between border-t-2 border-purple-200 pt-2">
                                <span className="font-bold">
                                  {scenario.type === "discount"
                                    ? getText("decrease")
                                    : getText("increase")}
                                </span>
                                <span
                                  className={`font-black ${
                                    scenario.type === "discount"
                                      ? "text-red-600"
                                      : "text-green-600"
                                  }`}
                                >
                                  ${amount.toFixed(2)}
                                </span>
                              </div>
                              <div className="flex justify-between bg-white rounded-lg p-2 border-2 border-purple-300">
                                <span className="font-bold">
                                  {getText("final_label")}
                                </span>
                                <span className="font-black text-purple-600 text-lg">
                                  ${final.toFixed(2)}
                                </span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Info Panel */}
              <div className="lg:col-span-4 flex flex-col gap-6">
                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                  <h3 className="text-lg font-black text-pink-600 mb-3">
                    💡 {getText("info_concept")}
                  </h3>
                  <div className="text-sm text-slate-700 leading-relaxed space-y-3">
                    <div className="bg-pink-50 p-3 rounded-lg">
                      <strong>{getText("percent")}</strong>
                      <p className="text-slate-600 mt-1">
                        {getText("info_per100")}
                      </p>
                    </div>
                    <div className="bg-blue-50 p-3 rounded-lg">
                      <strong>{getText("info_decimal")}</strong>
                      <p className="text-slate-600 mt-1">
                        25% = 25 ÷ 100 = 0.25
                      </p>
                    </div>
                    <div className="bg-green-50 p-3 rounded-lg">
                      <strong>{getText("info_fraction")}</strong>
                      <p className="text-slate-600 mt-1">50% = 50/100 = 1/2</p>
                    </div>
                  </div>
                </div>

                <div className="bg-gradient-to-br from-yellow-100 to-orange-100 rounded-3xl p-6 shadow-lg">
                  <h3 className="text-lg font-black text-orange-700 mb-3">
                    📊 {getText("info_common")}
                  </h3>
                  <div className="space-y-2 text-sm">
                    <div className="bg-white p-2 rounded-lg flex justify-between">
                      <span>100%</span>
                      <span className="font-black">{getText("all_whole")}</span>
                    </div>
                    <div className="bg-white p-2 rounded-lg flex justify-between">
                      <span>50%</span>
                      <span className="font-black">{getText("half")}</span>
                    </div>
                    <div className="bg-white p-2 rounded-lg flex justify-between">
                      <span>25%</span>
                      <span className="font-black">{getText("quarter")}</span>
                    </div>
                    <div className="bg-white p-2 rounded-lg flex justify-between">
                      <span>10%</span>
                      <span className="font-black">{getText("tenth")}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-lg">
                  <h3 className="text-lg font-black text-slate-800 mb-3">
                    🎯 {getText("info_apps")}
                  </h3>
                  <ul className="text-sm text-slate-600 space-y-2">
                    <li>✓ {getText("app_shop")}</li>
                    <li>✓ {getText("app_bank")}</li>
                    <li>✓ {getText("app_exam")}</li>
                    <li>✓ {getText("app_data")}</li>
                    <li>✓ {getText("app_tax")}</li>
                  </ul>
                </div>
              </div>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
