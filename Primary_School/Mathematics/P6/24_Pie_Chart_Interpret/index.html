<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小六數學：圓形圖解讀 | Interpreting Pie Charts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Outfit", "Noto Sans TC", sans-serif;
        background: #0f172a;
        color: white;
        overflow-x: hidden;
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion, AnimatePresence } = window.Motion;
      const { LanguageSelector } = window.MathI18n || {
        LanguageSelector: () => null,
      };

      const t = {
        title: {
          en: "Interpreting Pie Charts",
          zh: "圓形圖解讀",
          ja: "円グラフの解釈",
          ko: "원형 차트 해석",
          es: "Interpretación de Gráficos Circulares",
          de: "Kreisdiagramme interpretieren",
          fi: "Ympyräkaavioiden tulkinta",
          fr: "Interprétation des diagrammes circulaires",
          ar: "تفسير المخططات الدائرية",
          it: "Interpretazione dei Grafici a Torta",
        },
        method: {
          en: "Transport Method",
          zh: "上學方法",
          ja: "通学方法",
          ko: "통학 방법",
          es: "Método de Transporte",
          de: "Transportmethode",
          fi: "Kulkutapa",
          fr: "Moyen de transport",
          ar: "وسيلة النقل",
          it: "Metodo di Trasporto",
        },
        total: {
          en: "Total Students",
          zh: "總學生人數",
          ja: "総学生数",
          ko: "총 학생 수",
          es: "Total de Estudiantes",
          de: "Gesamtschülerzahl",
          fi: "Opiskelijoita yhteensä",
          fr: "Nombre total d'étudiants",
          ar: "إجمالي عدد الطلاب",
          it: "Studenti Totali",
        },
        bus: {
          en: "Bus",
          zh: "巴士",
          ja: "バス",
          ko: "버스",
          es: "Autobús",
          de: "Bus",
          fi: "Bussi",
          fr: "Bus",
          ar: "حافلة",
          it: "Autobus",
        },
        mtr: {
          en: "MTR",
          zh: "港鐵",
          ja: "地下鉄",
          ko: "지하철",
          es: "Metro",
          de: "U-Bahn",
          fi: "Metro",
          fr: "Métro",
          ar: "مترو",
          it: "Metropolitana",
        },
        walk: {
          en: "Walk",
          zh: "步行",
          ja: "徒歩",
          ko: "도보",
          es: "Caminar",
          de: "Zu Fuß",
          fi: "Kävely",
          fr: "Marche",
          ar: "مشي",
          it: "Camminare",
        },
        other: {
          en: "Other",
          zh: "其他",
          ja: "その他",
          ko: "기타",
          es: "Otro",
          de: "Andere",
          fi: "Muu",
          fr: "Autre",
          ar: "أخرى",
          it: "Altro",
        },
        people: {
          en: "students",
          zh: "人",
          ja: "人",
          ko: "명",
          es: "estudiantes",
          de: "Schüler",
          fi: "opiskelijaa",
          fr: "étudiants",
          ar: "طلاب",
          it: "studenti",
        },
        q1: {
          en: "Which method is most popular?",
          zh: "哪種方法最受歡迎？",
          ja: "最も人気のある方法は？",
          ko: "가장 인기 있는 방법은?",
          es: "¿Qué método es más popular?",
          de: "Welche Methode ist am beliebtesten?",
          fi: "Mikä tapa on suosituin?",
          fr: "Quelle méthode est la plus populaire ?",
          ar: "ما هي الطريقة الأكثر شعبية؟",
          it: "Quale metodo è più popolare?",
        },
        q2: {
          en: "How many take the MTR?",
          zh: "搭港鐵的有多少人？",
          ja: "地下鉄を利用する人は何人？",
          ko: "지하철을 타는 사람은 몇 명인가요?",
          es: "¿Cuántos toman el metro?",
          de: "Wie viele nehmen die U-Bahn?",
          fi: "Kuinka moni menee metrolla?",
          fr: "Combien prennent le métro ?",
          ar: "كم عدد الذين يركبون المترو؟",
          it: "Quanti prendono la metropolitana?",
        },
        q3: {
          en: "Difference between Bus and Walk?",
          zh: "搭巴士的比步行的多多少人？",
          ja: "バスと徒歩の差は？",
          ko: "버스와 도보의 차이?",
          es: "¿Diferencia entre autobús y caminar?",
          de: "Unterschied zwischen Bus und zu Fuß?",
          fi: "Ero bussin ja kävelyn välillä?",
          fr: "Différence entre Bus et Marche ?",
          ar: "الفرق بين الحافلة والمشي؟",
          it: "Differenza tra autobus e camminare?",
        },
        reveal: {
          en: "Reveal Answer",
          zh: "顯示答案",
          ja: "答えを表示",
          ko: "정답 공개",
          es: "Revelar Respuesta",
          de: "Antwort zeigen",
          fi: "Paljasta vastaus",
          fr: "Révéler la réponse",
          ar: "كشف الإجابة",
          it: "Rivela Risposta",
        },
      };

      const getText = (key, lang) => t[key]?.[lang] || t[key]?.["en"] || key;

      const PieSlice = ({
        startAngle,
        endAngle,
        color,
        radius,
        onClick,
        active,
      }) => {
        const start = ((startAngle - 90) * Math.PI) / 180;
        const end = ((endAngle - 90) * Math.PI) / 180;
        const largeArc = endAngle - startAngle > 180 ? 1 : 0;

        const x1 = 150 + radius * Math.cos(start);
        const y1 = 150 + radius * Math.sin(start);
        const x2 = 150 + radius * Math.cos(end);
        const y2 = 150 + radius * Math.sin(end);

        const path = active
          ? `M 150 150 L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`
          : `M 150 150 L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;

        return (
          <motion.path
            d={path}
            fill={color}
            stroke="rgba(15, 23, 42, 0.5)"
            strokeWidth="2"
            onClick={onClick}
            whileHover={{ scale: 1.05, opacity: 0.9 }}
            animate={{ scale: active ? 1.1 : 1 }}
            style={{ originX: "150px", originY: "150px", cursor: "pointer" }}
          />
        );
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [activeSlice, setActiveSlice] = useState(null);
        const [revealed, setRevealed] = useState({});

        const total = 400;
        const data = [
          { id: "bus", percent: 40, color: "#f59e0b" },
          { id: "mtr", percent: 35, color: "#3b82f6" },
          { id: "walk", percent: 15, color: "#22c55e" },
          { id: "other", percent: 10, color: "#94a3b8" },
        ];

        let currentAngle = 0;
        const slices = data.map((d) => {
          const angle = (d.percent / 100) * 360;
          const s = { ...d, start: currentAngle, end: currentAngle + angle };
          currentAngle += angle;
          return s;
        });

        const toggleReveal = (q) => {
          setRevealed((prev) => ({ ...prev, [q]: !prev[q] }));
        };

        const calc = (pct) => (pct / 100) * total;

        return (
          <div className="min-h-screen flex flex-col items-center p-4 font-sans bg-slate-900 text-white">
            <div className="w-full max-w-5xl flex justify-between items-center mb-10">
              <h1 className="text-4xl font-black text-teal-400 drop-shadow-[0_0_15px_rgba(45,212,191,0.5)]">
                📊 {getText("title", lang)}
              </h1>
              <div className="flex bg-slate-800/80 p-1.5 rounded-xl border border-white/10 flex-wrap justify-end gap-1 max-w-[50%]">
                {[
                  "zh",
                  "en",
                  "ja",
                  "ko",
                  "es",
                  "de",
                  "fi",
                  "fr",
                  "ar",
                  "it",
                ].map((l) => (
                  <button
                    key={l}
                    onClick={() => setLang(l)}
                    className={`px-3 py-1.5 rounded-lg font-bold text-xs uppercase transition-all ${
                      lang === l
                        ? "bg-teal-600 text-white shadow-lg scale-105"
                        : "text-slate-400 hover:text-white hover:bg-white/5"
                    }`}
                  >
                    {l}
                  </button>
                ))}
              </div>
            </div>

            <div className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 gap-12">
              {/* Chart Section */}
              <div className="glass-panel p-8 rounded-3xl flex flex-col items-center">
                <h2 className="text-xl font-bold mb-6 text-teal-400 text-center">
                  {getText("method", lang)} ({getText("total", lang)}: {total})
                </h2>

                <div className="relative w-80 h-80">
                  <svg
                    viewBox="0 0 300 300"
                    className="w-full h-full drop-shadow-2xl"
                  >
                    {slices.map((s, i) => (
                      <PieSlice
                        key={i}
                        startAngle={s.start}
                        endAngle={s.end}
                        color={s.color}
                        radius={140}
                        active={activeSlice === s.id}
                        onClick={() =>
                          setActiveSlice(activeSlice === s.id ? null : s.id)
                        }
                      />
                    ))}
                    {/* Center Hole for Donut Look (Optional, but let's keep it Pie for clarity) */}
                  </svg>
                </div>

                <div className="grid grid-cols-2 gap-4 mt-8 w-full max-w-xs">
                  {data.map((d) => (
                    <button
                      key={d.id}
                      onClick={() =>
                        setActiveSlice(activeSlice === d.id ? null : d.id)
                      }
                      className={`flex items-center gap-3 p-2 rounded-xl transition-all ${
                        activeSlice === d.id
                          ? "bg-slate-700 ring-2 ring-white/50"
                          : "hover:bg-slate-800/50"
                      }`}
                    >
                      <div
                        className="w-4 h-4 rounded-full"
                        style={{ background: d.color }}
                      ></div>
                      <div className="text-left">
                        <div className="font-bold text-sm">
                          {getText(d.id, lang)}
                        </div>
                        <div className="text-xs text-slate-400">
                          {d.percent}%
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Questions Section */}
              <div className="flex flex-col gap-6">
                {[
                  { id: "q1", ans: `${getText("bus", lang)} (40%)` },
                  {
                    id: "q2",
                    ans: `${total} × 35% = ${calc(35)} ${getText(
                      "people",
                      lang
                    )}`,
                  },
                  {
                    id: "q3",
                    ans: `${calc(40)} - ${calc(15)} = ${
                      calc(40) - calc(15)
                    } ${getText("people", lang)}`,
                  },
                ].map((q, i) => (
                  <div
                    key={q.id}
                    className="glass-panel p-6 rounded-2xl border-l-4 border-teal-500 bg-teal-900/10"
                  >
                    <div className="text-lg font-bold text-slate-200 mb-4">
                      {i + 1}. {getText(q.id, lang)}
                    </div>

                    {revealed[q.id] ? (
                      <motion.div
                        initial={{ opacity: 0, height: 0 }}
                        animate={{ opacity: 1, height: "auto" }}
                        className="text-2xl font-black text-teal-400"
                      >
                        {q.ans}
                      </motion.div>
                    ) : (
                      <button
                        onClick={() => toggleReveal(q.id)}
                        className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm font-bold uppercase transition-colors"
                      >
                        {getText("reveal", lang)}
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
