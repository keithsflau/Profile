<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小一常識：動物分類大師 | Animal Sorting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: #f0f9ff;
        overflow: hidden; /* Game layout mostly static */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion, AnimatePresence } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Animal Sorter",
          zh: "動物分類大師",
          ja: "動物分類",
          ko: "동물 분류기",
          es: "Clasificador de animales",
          de: "Tiersortierer",
          fi: "Eläinten lajittelija",
          fr: "Trier les animaux",
          ar: "فرز الحيوانات",
          it: "Selezionatore di animali",
        },
        instruction: {
          en: "Where does this animal live?",
          zh: "這種動物住在哪裡？",
          ja: "この動物はどこに住んでいますか？",
          ko: "이 동물은 어디에 사나요?",
          es: "¿Dónde vive este animal?",
          de: "Wo lebt dieses Tier?",
          fi: "Missä tämä eläin asuu?",
          fr: "Où vit cet animal ?",
          ar: "أين يعيش هذا الحيوان؟",
          it: "Dove vive questo animale?",
        },
        sky: {
          en: "Sky",
          zh: "天空",
          es: "Cielo",
          de: "Himmel",
          fi: "Taivas",
          fr: "Ciel",
          ar: "سماء",
          it: "Cielo",
        },
        land: {
          en: "Land",
          zh: "陸地",
          es: "Tierra",
          de: "Land",
          fi: "Maa",
          fr: "Terre",
          ar: "أرض",
          it: "Terra",
        },
        sea: {
          en: "Sea",
          zh: "海洋",
          es: "Mar",
          de: "Meer",
          fi: "Meri",
          fr: "Mer",
          ar: "بحر",
          it: "Mare",
        },
        correct: {
          en: "Correct!",
          zh: "答對了！",
          es: "¡Correcto!",
          de: "Richtig!",
          fi: "Oikein!",
          fr: "Correct !",
          ar: "صحيح!",
          it: "Corretto!",
        },
        completed: {
          en: "All Animals Home!",
          zh: "所有動物都回家了！",
          es: "¡Todos los animales en casa!",
          de: "Alle Tiere zu Hause!",
          fi: "Kaikki eläimet kotona!",
          fr: "Tous les animaux à la maison !",
          ar: "جميع الحيوانات في المنزل!",
          it: "Tutti gli animali a casa!",
        },
        restart: {
          en: "Play Again",
          zh: "再玩一次",
          es: "Jugar de nuevo",
          de: "Nochmal spielen",
          fi: "Pelaa uudelleen",
          fr: "Rejouer",
          ar: "العب مرة أخرى",
          it: "Gioca di nuovo",
        },
      };

      const animals = [
        { id: "eagle", icon: "🦅", habitat: "sky" },
        { id: "parrot", icon: "🦜", habitat: "sky" },
        { id: "bee", icon: "🐝", habitat: "sky" },

        { id: "lion", icon: "🦁", habitat: "land" },
        { id: "elephant", icon: "🐘", habitat: "land" },
        { id: "rabbit", icon: "🐇", habitat: "land" },

        { id: "fish", icon: "🐟", habitat: "sea" },
        { id: "whale", icon: "🐋", habitat: "sea" },
        { id: "octopus", icon: "🐙", habitat: "sea" },
        { id: "shrimp", icon: "🦐", habitat: "sea" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [queue, setQueue] = useState([]);
        const [current, setCurrent] = useState(null);
        const [score, setScore] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];

        useEffect(() => {
          resetGame();
        }, []);

        const resetGame = () => {
          const shuffled = [...animals].sort(() => Math.random() - 0.5);
          setQueue(shuffled.slice(1));
          setCurrent(shuffled[0]);
          setScore(0);
          setFeedback(null);
        };

        const handleZoneClick = (zone) => {
          if (!current) return;
          if (current.habitat === zone) {
            setFeedback("correct");
            setScore((s) => s + 10);

            // Delayed next
            setTimeout(() => {
              setFeedback(null);
              if (queue.length > 0) {
                const next = queue[0];
                setQueue(queue.slice(1));
                setCurrent(next);
              } else {
                setCurrent(null); // Win
              }
            }, 500);
          } else {
            // penalty or visual shake?
            // visual feedback embedded in button?
            // simpler to just ignore or show 'wrong'
            const btn = document.getElementById(`zone-${zone}`);
            if (btn) {
              btn.classList.add("animate-ping");
              setTimeout(() => btn.classList.remove("animate-ping"), 500);
            }
          }
        };

        return (
          <div className="h-screen flex flex-col items-center relative">
            <LanguageSelector lang={lang} setLang={setLang} />

            {/* Zones Background */}
            <div className="absolute inset-0 z-0 flex flex-col">
              {/* Sky */}
              <button
                id="zone-sky"
                onClick={() => handleZoneClick("sky")}
                className="flex-1 bg-sky-200 border-b-4 border-sky-300 flex items-start justify-center pt-8 text-sky-700 font-black text-4xl hover:bg-sky-300 transition-colors active:opacity-80"
              >
                {getText("sky")} ☁️
              </button>
              {/* Land */}
              <button
                id="zone-land"
                onClick={() => handleZoneClick("land")}
                className="flex-1 bg-green-200 border-b-4 border-green-300 flex items-center justify-center text-green-800 font-black text-4xl hover:bg-green-300 transition-colors active:opacity-80"
              >
                {getText("land")} 🌳
              </button>
              {/* Sea */}
              <button
                id="zone-sea"
                onClick={() => handleZoneClick("sea")}
                className="flex-1 bg-blue-500 flex items-end justify-center pb-8 text-white font-black text-4xl hover:bg-blue-600 transition-colors active:opacity-80"
              >
                {getText("sea")} 🌊
              </button>
            </div>

            {/* Game UI Layer */}
            <div className="z-10 w-full h-full pointer-events-none flex flex-col items-center justify-center">
              <h1 className="absolute top-4 left-4 text-3xl font-black text-white drop-shadow-md">
                {getText("title")}
              </h1>

              {current ? (
                <div className="pointer-events-auto flex flex-col items-center">
                  <div className="bg-white/90 p-6 rounded-3xl shadow-2xl mb-4 text-center">
                    <p className="text-xl font-bold text-slate-600 mb-2">
                      {getText("instruction")}
                    </p>
                    <motion.div
                      key={current.id}
                      initial={{ scale: 0 }}
                      animate={{ scale: 1 }}
                      className="text-9xl filter drop-shadow-lg"
                    >
                      {current.icon}
                    </motion.div>
                  </div>
                  {feedback && (
                    <motion.div
                      initial={{ scale: 0 }}
                      animate={{ scale: 1 }}
                      className="bg-green-500 text-white px-8 py-3 rounded-full font-black text-2xl shadow-xl"
                    >
                      {getText("correct")}
                    </motion.div>
                  )}
                </div>
              ) : (
                <div className="pointer-events-auto text-center bg-white/90 p-12 rounded-3xl shadow-2xl">
                  <h2 className="text-4xl font-black text-slate-800 mb-6">
                    {getText("completed")}
                  </h2>
                  <button
                    onClick={resetGame}
                    className="bg-sky-500 text-white px-10 py-4 rounded-full font-black text-2xl hover:bg-sky-600 shadow-xl"
                  >
                    {getText("restart")} 🔄
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
