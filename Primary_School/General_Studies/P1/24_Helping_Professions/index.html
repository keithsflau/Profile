        },
        tool_helmet: {

          zh: "安全帽",
          es: "Casco de seguridad",
          de: "Schutzhelm",
          fi: "Suojakypärä",
          fr: "Casque de sécurité",
          ar: "خوذة الأمان",
          it: "Elmetto di sicurezza",
        },
        tool_mail: {
          en: "Mail Bag",
          zh: "郵袋",
          es: "Saca de correos",
          de: "Postsack",
          fi: "Postisäkki",
          fr: "Sac postal",
          ar: "حقيبة بريد",
          it: "Sacco postale",
        },
      };

      const professions = [
        { id: "doctor", icon: "👨‍⚕️", color: "bg-white" },
        { id: "firefighter", icon: "👨‍🚒", color: "bg-red-200" },
        { id: "police", icon: "👮", color: "bg-blue-200" },
        { id: "chef", icon: "👨‍🍳", color: "bg-yellow-100" },
        { id: "teacher", icon: "👩‍🏫", color: "bg-green-100" },
        { id: "worker", icon: "👷", color: "bg-orange-200" },
        { id: "postman", icon: "📮", color: "bg-green-200" }, // Using postbox emoji for postman slightly inaccurate but recognizable context
      ];

      const questions = [
        {
          id: "q1",
          toolIcon: "🩺",
          toolName: "tool_stethoscope",
          answer: "doctor",
        },
        {
          id: "q2",
          toolIcon: "🚒",
          toolName: "tool_hose",
          answer: "firefighter",
        },
        { id: "q3", toolIcon: "🚓", toolName: "tool_badge", answer: "police" }, // Using Car for visual simplicity
        { id: "q4", toolIcon: "🍳", toolName: "tool_hat", answer: "chef" },
        { id: "q5", toolIcon: "🏫", toolName: "tool_board", answer: "teacher" },
        { id: "q6", toolIcon: "⛑️", toolName: "tool_helmet", answer: "worker" },
        { id: "q7", toolIcon: "✉️", toolName: "tool_mail", answer: "postman" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [qIdx, setQIdx] = useState(0);
        const [options, setOptions] = useState([]);
        const [score, setScore] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const currentQ = qIdx < questions.length ? questions[qIdx] : null;

        useEffect(() => {
          if (currentQ) generateOptions();
        }, [qIdx]);

        const generateOptions = () => {
          const ans = currentQ.answer;
          // Select distractors
          const distractors = professions
            .filter((p) => p.id !== ans)
            .sort(() => Math.random() - 0.5)
            .slice(0, 2);

          const correct = professions.find((p) => p.id === ans);
          setOptions([correct, ...distractors].sort(() => Math.random() - 0.5));
          setFeedback(null);
        };

        const handleAnswer = (profId) => {
          if (feedback) return;
          if (profId === currentQ.answer) {
            setFeedback("correct");
            setScore((s) => s + 10);
            setTimeout(() => {
              setFeedback(null);
              setQIdx(qIdx + 1);
            }, 1000);
          } else {
            setFeedback("wrong");
            setScore((s) => Math.max(0, s - 5));
            setTimeout(() => setFeedback(null), 1000);
          }
        };

        const restart = () => {
          setQIdx(0);
          setScore(0);
        };

        return (
          <div className="min-h-screen p-4 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-white mb-4 mt-8 drop-shadow-md">
              🛠️ {getText("title")}
            </h1>
            <div className="bg-white/90 px-6 py-2 rounded-full shadow mb-6 font-bold text-slate-600">
              {getText("score")}: {score}
            </div>

            {currentQ ? (
              <div className="w-full max-w-2xl bg-white rounded-3xl p-8 shadow-2xl flex flex-col items-center">
                <p className="font-bold text-slate-500 mb-6">
                  {getText("instruction")}
                </p>

                <motion.div
                  key={currentQ.id}
                  initial={{ scale: 0.8, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  className="w-48 h-48 bg-slate-100 rounded-full flex items-center justify-center text-8xl mb-4 border-4 border-slate-200"
                >
                  {currentQ.toolIcon}
                </motion.div>
                <div className="text-2xl font-black text-slate-800 mb-8">
                  {getText(currentQ.toolName)}
                </div>

                {feedback && (
                  <div
                    className={`text-4xl font-black mb-6 ${
                      feedback === "correct" ? "text-green-500" : "text-red-500"
                    }`}
                  >
                    {getText(feedback)}
                  </div>
                )}

                <div className="grid grid-cols-3 gap-4 w-full">
                  {options.map((opt) => (
                    <button
                      key={opt.id}
                      onClick={() => handleAnswer(opt.id)}
                      className={`${opt.color} p-4 rounded-xl flex flex-col items-center justify-center shadow-md hover:scale-105 active:scale-95 transition-transform h-32 md:h-40 border-b-4 border-black/10`}
                    >
                      <span className="text-5xl mb-2">{opt.icon}</span>
                      <span className="font-bold text-sm md:text-base leading-tight">
                        {getText(opt.id)}
                      </span>
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              <div className="mt-12 text-center bg-white/90 p-12 rounded-3xl shadow-xl">
                <div className="text-8xl mb-4">🌟</div>
                <h2 className="text-3xl font-black text-slate-800 mb-6">
                  {getText("completed")}
                </h2>
                <button
                  onClick={restart}
                  className="bg-blue-500 text-white px-10 py-4 rounded-full font-black text-xl hover:bg-blue-600 shadow-xl"
                >
                  {getText("restart")} 🔄
                </button>
              </div>
            )}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
