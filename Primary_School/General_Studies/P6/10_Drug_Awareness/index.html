<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Drug Awareness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #18181b;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Say NO to Drugs",
          zh: "向毒品說不",
          ja: "薬物にNO",
          ko: "마약에 NO라고 말하세요",
          es: "Di NO a las drogas",
          de: "Sag NEIN zu Drogen",
          fi: "Sano EI huumeille",
          fr: "Dites NON à la drogue",
          ar: "قل لا للمخدرات",
          it: "Dì NO alla droga",
        },
        instruction: {
          en: "See the harmful effects and choose wisely.",
          zh: "了解有害影響並明智地選擇。",
          ja: "有害な影響を見て、賢く選んでください。",
          ko: "해로운 영향을 확인하고 현명하게 선택하세요.",
          es: "Mira los efectos nocivos y elige sabiamente.",
          de: "Sieh dir die schädlichen Auswirkungen an und wähle weise.",
          fi: "Katso haitalliset vaikutukset ja valitse viisaasti.",
          fr: "Voyez les effets nocifs et choisissez judicieusement.",
          ar: "انظر إلى الآثار الضارة واختيار بحكمة.",
          it: "Guarda gli effetti nocivi e scegli saggiamente.",
        },
        brain: {
          en: "Brain Damage",
          zh: "腦部受損",
          ja: "脳の損傷",
          ko: "뇌 손상",
        },
        lungs: { en: "Lung Cancer", zh: "肺癌", ja: "肺がん", ko: "폐암" },
        heart: {
          en: "Heart Failure",
          zh: "心臟衰竭",
          ja: "心不全",
          ko: "심부전",
        },
        addiction: { en: "Addiction", zh: "上癮", ja: "中毒", ko: "중독" },

        scenario: {
          en: "Friend offers you a 'magic pill'.",
          zh: "朋友給你一顆'神奇藥丸'。",
          ja: "友達が「魔法の薬」を勧めてきた。",
          ko: "친구가 '마법 알약'을 권합니다.",
        },
        sayno: {
          en: "Say NO & Leave",
          zh: "拒絕並離開",
          ja: "NOと言って立ち去る",
          ko: "거절하고 떠나기",
        },
        take: { en: "Take it", zh: "接受", ja: "受け取る", ko: "받기" },

        good_choice: {
          en: "Good Choice! Stay Healthy.",
          zh: "好選擇！保持健康。",
          ja: "良い選択！健康を保とう。",
          ko: "좋은 선택! 건강을 유지하세요.",
        },
        bad_choice: {
          en: "Dangerous! Never take unknown drugs.",
          zh: "危險！切勿服用不明藥物。",
          ja: "危険！未知の薬は絶対に飲まないで。",
          ko: "위험합니다! 모르는 약은 절대 복용하지 마세요.",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [view, setView] = useState("effects"); // effects, scenario
        const [result, setResult] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];

        const handleChoice = (choice) => {
          setResult(choice);
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-red-500">
              {getText("title")}
            </h1>

            <div className="flex gap-4 mb-8">
              <button
                onClick={() => {
                  setView("effects");
                  setResult(null);
                }}
                className={`px-6 py-2 rounded-full font-bold ${
                  view === "effects"
                    ? "bg-red-600 text-white"
                    : "bg-zinc-800 text-zinc-400"
                }`}
              >
                Effects
              </button>
              <button
                onClick={() => {
                  setView("scenario");
                  setResult(null);
                }}
                className={`px-6 py-2 rounded-full font-bold ${
                  view === "scenario"
                    ? "bg-red-600 text-white"
                    : "bg-zinc-800 text-zinc-400"
                }`}
              >
                Scenario
              </button>
            </div>

            {view === "effects" && (
              <div className="grid grid-cols-2 gap-4 w-full max-w-2xl px-4">
                <div className="bg-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center">
                  <div className="text-6xl mb-4">🧠</div>
                  <div className="font-bold text-red-400 text-xl">
                    {getText("brain")}
                  </div>
                  <div className="text-xs text-zinc-400 mt-2">
                    Memory loss, confusion, slow thinking.
                  </div>
                </div>
                <div className="bg-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center">
                  <div className="text-6xl mb-4">🫁</div>
                  <div className="font-bold text-red-400 text-xl">
                    {getText("lungs")}
                  </div>
                  <div className="text-xs text-zinc-400 mt-2">
                    Breathing problems, cough, cancer.
                  </div>
                </div>
                <div className="bg-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center">
                  <div className="text-6xl mb-4">❤️</div>
                  <div className="font-bold text-red-400 text-xl">
                    {getText("heart")}
                  </div>
                  <div className="text-xs text-zinc-400 mt-2">
                    Heart attack, irregular beat.
                  </div>
                </div>
                <div className="bg-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center">
                  <div className="text-6xl mb-4">🔗</div>
                  <div className="font-bold text-red-400 text-xl">
                    {getText("addiction")}
                  </div>
                  <div className="text-xs text-zinc-400 mt-2">
                    Cannot stop, lose friends & family.
                  </div>
                </div>
              </div>
            )}

            {view === "scenario" && (
              <div className="w-full max-w-lg bg-zinc-800 p-8 rounded-3xl shadow-xl text-center">
                <div className="text-8xl mb-6">💊</div>
                <div className="text-2xl font-bold mb-8">
                  {getText("scenario")}
                </div>

                {!result ? (
                  <div className="flex gap-4">
                    <button
                      onClick={() => handleChoice("good")}
                      className="flex-1 bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl"
                    >
                      {getText("sayno")}
                    </button>
                    <button
                      onClick={() => handleChoice("bad")}
                      className="flex-1 bg-zinc-600 hover:bg-zinc-500 text-white font-black py-4 rounded-xl"
                    >
                      {getText("take")}
                    </button>
                  </div>
                ) : (
                  <div
                    className={`text-2xl font-black ${
                      result === "good" ? "text-green-500" : "text-red-500"
                    }`}
                  >
                    {getText(result === "good" ? "good_choice" : "bad_choice")}
                    {result === "bad" && (
                      <div className="text-6xl mt-4">☠️</div>
                    )}
                    {result === "good" && (
                      <div className="text-6xl mt-4">🏃💨</div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
