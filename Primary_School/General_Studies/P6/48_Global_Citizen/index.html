<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Global Citizen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Good Global Citizen",
          zh: "好世界公民",
          ja: "良き地球市民",
          ko: "좋은 세계 시민",
          es: "Buen ciudadano global",
          de: "Guter Weltbürger",
          fi: "Hyvä maailmankansalainen",
          fr: "Bon citoyen du monde",
          ar: "مواطن عالمي صالح",
          it: "Buon Cittadino Globale",
        },
        instruction: {
          en: "Is this a responsible action?",
          zh: "這是負責任的行為嗎？",
          ja: "これは責任ある行動ですか？",
          ko: "이것은 책임감 있는 행동입니까?",
          es: "¿Es esta una acción responsable?",
          de: "Ist das eine verantwortungsvolle Handlung?",
          fi: "Onko tämä vastuullinen teko?",
          fr: "Est-ce une action responsable ?",
          ar: "هل هذا تصرف مسؤول؟",
          it: "È un'azione responsabile?",
        },
        good: { en: "Good", zh: "好", ja: "良い", ko: "좋음" },
        bad: { en: "Bad", zh: "壞", ja: "悪い", ko: "나쁨" },

        recycle: {
          en: "Recycling Waste",
          zh: "回收廢物",
          ja: "リサイクル",
          ko: "쓰레기 재활용",
        },
        waste_water: {
          en: "Wasting Water",
          zh: "浪費食水",
          ja: "水の無駄遣い",
          ko: "물 낭비",
        },
        help_others: {
          en: "Helping Others",
          zh: "幫助他人",
          ja: "他人を助ける",
          ko: "他人 돕기",
        },
        pollute: {
          en: "Littering",
          zh: "亂拋垃圾",
          ja: "ポイ捨て",
          ko: "쓰레기 투기",
        },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
        wrong: {
          en: "Think again!",
          zh: "再想一想！",
          ja: "考え直して！",
          ko: "다시 생각해보세요!",
        },
      };

      const actions = [
        { id: "recycle", type: "good", icon: "♻️" },
        { id: "waste_water", type: "bad", icon: "🚰" },
        { id: "help_others", type: "good", icon: "🤝" },
        { id: "pollute", type: "bad", icon: "🚮" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [idx, setIdx] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = actions[idx];

        const check = (type) => {
          if (feedback) return;
          if (type === current.type) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIdx((idx + 1) % actions.length);
            }, 1000);
          } else {
            setFeedback("wrong");
            setTimeout(() => setFeedback(null), 800);
          }
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-slate-800">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <motion.div
              key={current.id}
              initial={{ x: 100, opacity: 0 }}
              animate={{ x: 0, opacity: 1 }}
              className="w-64 h-80 bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center border-4 border-slate-200 mb-8 p-4 text-center"
            >
              <div className="text-9xl mb-8">{current.icon}</div>
              <div className="text-xl font-bold text-slate-700">
                {getText(current.id)}
              </div>
            </motion.div>

            <div className="flex gap-8 w-full max-w-sm">
              <button
                onClick={() => check("bad")}
                className="flex-1 py-4 bg-red-100 text-red-700 rounded-xl font-bold text-2xl hover:bg-red-200 border-b-4 border-red-300 active:scale-95"
              >
                👎 {getText("bad")}
              </button>
              <button
                onClick={() => check("good")}
                className="flex-1 py-4 bg-green-100 text-green-700 rounded-xl font-bold text-2xl hover:bg-green-200 border-b-4 border-green-300 active:scale-95"
              >
                👍 {getText("good")}
              </button>
            </div>

            {feedback && (
              <div
                className={`mt-8 text-3xl font-black ${
                  feedback === "correct" ? "text-green-500" : "text-red-500"
                } animate-bounce`}
              >
                {getText(feedback)}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
