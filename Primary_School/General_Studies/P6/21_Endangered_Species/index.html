<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Endangered Species</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #f0fdf4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Endangered Species",
          zh: "瀕危物種",
          ja: "絶滅危惧種",
          ko: "멸종 위기 종",
          es: "Especies en peligro de extinción",
          de: "Bedrohte Arten",
          fi: "Uhanalaiset lajit",
          fr: "Espèces en voie de disparition",
          ar: "الأنواع المهددة بالانقراض",
          it: "Specie in Via di Estinzione",
        },
        instruction: {
          en: "Click on the animal to learn why it's endangered.",
          zh: "點擊動物以了解牠們為何瀕危。",
          ja: "動物をクリックして、なぜ絶滅の危機に瀕しているのかを学びましょう。",
          ko: "동물을 클릭하여 멸종 위기에 처한 이유를 알아보세요.",
          es: "Haz clic en el animal para saber por qué está en peligro.",
          de: "Klicke auf das Tier, um zu erfahren, warum es bedroht ist.",
          fi: "Klikkaa eläintä oppiaksesi miksi se on uhanalainen.",
          fr: "Cliquez sur l'animal pour savoir pourquoi il est en danger.",
          ar: "انقر على الحيوان لمعرفة سبب تعرضه للخطر.",
          it: "Clicca sull'animale per capire perché è in pericolo.",
        },
        panda: {
          en: "Giant Panda",
          zh: "大熊貓",
          ja: "ジャイアントパンダ",
          ko: "자이언트 판다",
        },
        polarbear: {
          en: "Polar Bear",
          zh: "北極熊",
          ja: "ホッキョクグマ",
          ko: "북극곰",
        },
        rhino: {
          en: "Black Rhino",
          zh: "黑犀牛",
          ja: "クロサイ",
          ko: "검은 코뿔소",
        },
        tiger: { en: "Tiger", zh: "老虎", ja: "トラ", ko: "호랑이" },

        reason_habitat: {
          en: "Habitat Loss (Bamboo forests)",
          zh: "棲息地喪失 (竹林)",
          ja: "生息地の喪失 (竹林)",
          ko: "서식지 손실 (대나무 숲)",
        },
        reason_climate: {
          en: "Climate Change (Melting ice)",
          zh: "氣候變化 (冰層融化)",
          ja: "気候変動 (氷の融解)",
          ko: "기후 변화 (얼음 녹음)",
        },
        reason_poach: {
          en: "Poaching (Horns/Fur)",
          zh: "非法偷獵 (角/皮毛)",
          ja: "密猟 (角/毛皮)",
          ko: "밀렵 (뿔/가죽)",
        },

        status: {
          en: "Status: Vulnerable/Endangered",
          zh: "狀態：易危/瀕危",
          ja: "ステータス：絶滅危惧",
          ko: "상태: 취약/멸종 위기",
        },
      };

      const animals = [
        {
          id: "panda",
          x: 75,
          y: 35,
          reason: "reason_habitat",
          icon: "🐼",
          bg: "bg-green-100",
        },
        {
          id: "polarbear",
          x: 50,
          y: 10,
          reason: "reason_climate",
          icon: "🐻‍❄️",
          bg: "bg-blue-100",
        },
        {
          id: "rhino",
          x: 55,
          y: 60,
          reason: "reason_poach",
          icon: "🦏",
          bg: "bg-orange-100",
        },
        {
          id: "tiger",
          x: 70,
          y: 45,
          reason: "reason_poach",
          icon: "🐅",
          bg: "bg-orange-100",
        },
        // Approximate map locations: Panda (China), Polar Bear (Arctic), Rhino (Africa), Tiger (Asia)
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [selected, setSelected] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-green-800">
              {getText("title")}
            </h1>

            <div className="w-full max-w-5xl aspect-video bg-blue-50 rounded-3xl overflow-hidden shadow-2xl relative border-4 border-blue-200">
              {/* Simplified World Map SVG Background */}
              <svg
                viewBox="0 0 100 50"
                className="absolute inset-0 w-full h-full pointer-events-none opacity-30"
              >
                <path d="M5,10 L35,10 L30,45 L15,40 Z" fill="#d1fae5" />{" "}
                {/* Americas */}
                <path d="M40,15 L65,15 L60,45 L45,40 Z" fill="#d1fae5" />{" "}
                {/* EU/Africa */}
                <path d="M70,10 L95,10 L90,45 L80,35 Z" fill="#d1fae5" />{" "}
                {/* Asia/Aus */}
              </svg>

              {animals.map((a) => (
                <button
                  key={a.id}
                  onClick={() => setSelected(a)}
                  className={`absolute w-16 h-16 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-4xl hover:scale-125 transition-transform z-10 ${
                    a.bg
                  }
                         ${
                           selected && selected.id === a.id
                             ? "scale-125 ring-4 ring-yellow-400"
                             : ""
                         }
                      `}
                  style={{ left: `${a.x}%`, top: `${a.y}%` }}
                >
                  {a.icon}
                </button>
              ))}

              {/* Info Card Overlay */}
              {selected && (
                <motion.div
                  key={selected.id}
                  initial={{ y: 50, opacity: 0 }}
                  animate={{ y: 0, opacity: 1 }}
                  className="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl flex items-center gap-6"
                >
                  <div className="text-6xl">{selected.icon}</div>
                  <div>
                    <h2 className="text-3xl font-black text-slate-800">
                      {getText(selected.id)}
                    </h2>
                    <div className="text-lg font-bold text-red-500 mb-1">
                      {getText("status")}
                    </div>
                    <p className="text-xl text-slate-600">
                      ⚠️ {getText(selected.reason)}
                    </p>
                  </div>
                  <button
                    onClick={() => setSelected(null)}
                    className="ml-auto w-10 h-10 rounded-full bg-slate-200 hover:bg-slate-300 font-bold"
                  >
                    ✕
                  </button>
                </motion.div>
              )}

              {!selected && (
                <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-white/80 px-6 py-2 rounded-full font-bold text-slate-500">
                  {getText("instruction")}
                </div>
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
