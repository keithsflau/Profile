<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Mental Health Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #f0fdfa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Mood Check-in",
          zh: "心情檢查站",
          ja: "気分チェックイン",
          ko: "기분 체크인",
          es: "Registro de estado de ánimo",
          de: "Stimmungs-Check",
          fi: "Mielialan tarkistus",
          fr: "Vérification de l'humeur",
          ar: "التحقق من المزاج",
          it: "Controllo Umore",
        },
        how_feeling: {
          en: "How are you feeling?",
          zh: "你感覺如何？",
          ja: "気分はどうですか？",
          ko: "기분이 어떠세요?",
          es: "¿Cómo te sientes?",
          de: "Wie fühlst du dich?",
          fi: "Miltä sinusta tuntuu?",
          fr: "Comment vous sentez-vous ?",
          ar: "كيف تشعر؟",
          it: "Come ti senti?",
        },

        happy: {
          en: "Happy / Excited",
          zh: "快樂 / 興奮",
          ja: "幸せ / 興奮",
          ko: "행복함 / 신남",
        },
        sad: {
          en: "Sad / Lonely",
          zh: "傷心 / 孤獨",
          ja: "悲しい / 孤独",
          ko: "슬픔 / 외로움",
        },
        angry: {
          en: "Angry / Frustrated",
          zh: "生氣 / 沮喪",
          ja: "怒り / イライラ",
          ko: "화남 / 좌절",
        },
        tired: {
          en: "Tired / Stressed",
          zh: "疲累 / 壓力",
          ja: "疲れた / ストレス",
          ko: "피곤함 / 스트레스",
        },

        tip_happy: {
          en: "Great! Share your joy with a friend!",
          zh: "太好了！與朋友分享你的快樂！",
          ja: "素晴らしい！友達と喜びを分かち合おう！",
          ko: "좋아요! 친구와 기쁨을 나누세요!",
        },
        tip_sad: {
          en: "It's okay to cry. Talk to someone you trust.",
          zh: "哭也沒關係。找信任的人傾訴。",
          ja: "泣いても大丈夫。信頼できる人に話して。",
          ko: "울어도 괜찮아요. 믿을 수 있는 사람과 이야기하세요.",
        },
        tip_angry: {
          en: "Take 5 deep breaths. Count to 10.",
          zh: "深呼吸5次。數到10。",
          ja: "深呼吸を5回して。10まで数えて。",
          ko: "심호흡을 5번 하세요. 10까지 세어보세요.",
        },
        tip_tired: {
          en: "Take a break. Listen to music or nap.",
          zh: "休息一下。聽聽音樂或小睡。",
          ja: "休憩して。音楽を聴くか、昼寝をして。",
          ko: "휴식을 취하세요. 음악을 듣거나 낮잠을 자세요.",
        },

        select: { en: "Select", zh: "選擇", ja: "選択", ko: "선택" },
      };

      const moods = [
        {
          id: "happy",
          icon: "😄",
          tip: "tip_happy",
          color: "bg-yellow-100 border-yellow-300 text-yellow-800",
        },
        {
          id: "sad",
          icon: "😢",
          tip: "tip_sad",
          color: "bg-blue-100 border-blue-300 text-blue-800",
        },
        {
          id: "angry",
          icon: "😡",
          tip: "tip_angry",
          color: "bg-red-100 border-red-300 text-red-800",
        },
        {
          id: "tired",
          icon: "🥱",
          tip: "tip_tired",
          color: "bg-purple-100 border-purple-300 text-purple-800",
        },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [selectedMood, setSelectedMood] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-12 text-teal-600">
              {getText("title")}
            </h1>

            {!selectedMood ? (
              <>
                <p className="text-2xl font-bold text-slate-500 mb-8">
                  {getText("how_feeling")}
                </p>
                <div className="grid grid-cols-2 gap-6 w-full max-w-lg">
                  {moods.map((m) => (
                    <button
                      key={m.id}
                      onClick={() => setSelectedMood(m)}
                      className="p-8 bg-white hover:bg-slate-50 rounded-3xl shadow-lg flex flex-col items-center gap-4 transition-transform hover:scale-105 active:scale-95"
                    >
                      <div className="text-6xl">{m.icon}</div>
                      <div className="font-bold text-slate-700">
                        {getText(m.id)}
                      </div>
                    </button>
                  ))}
                </div>
              </>
            ) : (
              <div className="w-full max-w-lg flex flex-col items-center animate-fadeIn">
                <div
                  className={`w-full p-12 rounded-3xl shadow-xl flex flex-col items-center text-center border-4 ${selectedMood.color}`}
                >
                  <div className="text-8xl mb-6">{selectedMood.icon}</div>
                  <h2 className="text-3xl font-black mb-4">
                    {getText(selectedMood.id)}
                  </h2>
                  <p className="text-xl font-medium">
                    {getText(selectedMood.tip)}
                  </p>
                </div>
                <button
                  onClick={() => setSelectedMood(null)}
                  className="mt-8 px-8 py-3 bg-slate-500 hover:bg-slate-600 text-white rounded-full font-bold shadow-lg"
                >
                  Back
                </button>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
