<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Space Missions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #0b0f19;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Mission Control",
          zh: "任務控制中心",
          ja: "ミッションコントロール",
          ko: "미션 컨트롤",
          es: "Control de misión",
          de: "Missionskontrolle",
          fi: "Lennonjohto",
          fr: "Contrôle de mission",
          ar: "مراقبة المهمة",
          it: "Controllo Missione",
        },
        instruction: {
          en: "Launch the historical missions!",
          zh: "發射歷史性任務！",
          ja: "歴史的なミッションを打ち上げましょう！",
          ko: "역사적인 임무를 시작하세요!",
          es: "¡Lanza las misiones históricas!",
          de: "Starte die historischen Missionen!",
          fi: "Laukaise historialliset tehtävät!",
          fr: "Lancez les missions historiques !",
          ar: "أطلق المهام التاريخية!",
          it: "Lancia le missioni storiche!",
        },
        apollo: {
          en: "Apollo 11 (Moon)",
          zh: "阿波羅11號 (月球)",
          ja: "アポロ11号 (月)",
          ko: "아폴로 11호 (달)",
        },
        iss: {
          en: "ISS (Station)",
          zh: "國際太空站",
          ja: "国際宇宙ステーション",
          ko: "국제 우주 정거장",
        },
        mars: {
          en: "Mars Rover",
          zh: "火星探測車",
          ja: "火星探査車",
          ko: "화성 탐사선",
        },

        launch: { en: "LAUNCH", zh: "發射", ja: "発射", ko: "발사" },
        back: {
          en: "Back to Base",
          zh: "返回基地",
          ja: "基地に戻る",
          ko: "기지 귀환",
        },
      };

      const missions = [
        { id: "apollo", dest: "moon", icon: "🌕", rocket: "🚀" },
        { id: "iss", dest: "orbit", icon: "🛰️", rocket: "🛸" },
        { id: "mars", dest: "mars", icon: "🪐", rocket: "🤖" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [active, setActive] = useState(null); // id
        const [launched, setLaunched] = useState(false);

        const getText = (key) => t[key][lang] || t[key]["en"];

        const launch = () => {
          setLaunched(true);
        };

        const reset = () => {
          setLaunched(false);
          setActive(null);
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-indigo-400">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-400">
              {getText("instruction")}
            </p>

            <div className="relative w-full max-w-3xl h-[500px] bg-slate-900 rounded-3xl border border-slate-700 overflow-hidden mb-8">
              {/* Background Stars */}
              <div className="absolute inset-0 opacity-50">
                {Array.from({ length: 50 }).map((_, i) => (
                  <div
                    key={i}
                    className="absolute w-1 h-1 bg-white rounded-full"
                    style={{
                      left: Math.random() * 100 + "%",
                      top: Math.random() * 100 + "%",
                    }}
                  ></div>
                ))}
              </div>
              {/* Destinations */}
              <div className="absolute top-10 right-10 text-6xl">🌕</div>{" "}
              {/* Moon */}
              <div className="absolute top-40 right-40 text-6xl">🪐</div>{" "}
              {/* Mars */}
              <div className="absolute top-10 left-40 text-6xl">🛰️</div>{" "}
              {/* ISS */}
              {/* Launch Pad */}
              <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-32 h-10 bg-gray-700 rounded-t-lg"></div>
              {/* Rocket */}
              {active && (
                <motion.div
                  className="absolute text-6xl left-1/2 -ml-8"
                  initial={{ bottom: 40 }}
                  animate={
                    launched
                      ? { bottom: 400, opacity: 0 }
                      : { bottom: 40, opacity: 1 }
                  }
                  transition={{ duration: 2 }}
                >
                  {missions.find((m) => m.id === active).rocket}
                </motion.div>
              )}
              {launched && (
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="text-4xl font-black text-green-400 animate-ping">
                    SUCCESS!
                  </div>
                </div>
              )}
            </div>

            {!launched ? (
              <div className="flex gap-4">
                {missions.map((m) => (
                  <button
                    key={m.id}
                    onClick={() => setActive(m.id)}
                    className={`p-4 rounded-xl border-2 font-bold ${
                      active === m.id
                        ? "bg-indigo-600 border-indigo-400"
                        : "bg-slate-800 border-slate-600"
                    }`}
                  >
                    {getText(m.id)}
                  </button>
                ))}
              </div>
            ) : (
              <button
                onClick={reset}
                className="px-8 py-3 bg-slate-700 rounded-xl font-bold"
              >
                {getText("back")}
              </button>
            )}

            {active && !launched && (
              <button
                onClick={launch}
                className="mt-8 px-12 py-6 bg-red-600 hover:bg-red-700 text-white font-black text-4xl rounded-full shadow-[0_0_30px_red]"
              >
                {getText("launch")} 🚀
              </button>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
