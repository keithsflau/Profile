<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Common Chemicals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fefce8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Chemical Safety",
          zh: "化學品安全",
          ja: "化学物質の安全",
          ko: "화학 안전",
          es: "Seguridad química",
          de: "Chemische Sicherheit",
          fi: "Kemikaaliturvallisuus",
          fr: "Sécurité chimique",
          ar: "السلامة الكيميائية",
          it: "Sicurezza Chimica",
        },
        instruction: {
          en: "Select the correct Warning Label.",
          zh: "選擇正確的警告標籤。",
          ja: "正しい警告ラベルを選択してください。",
          ko: "올바른 경고 라벨을 선택하세요.",
          es: "Selecciona la etiqueta de advertencia correcta.",
          de: "Wähle das richtige Warnetikett.",
          fi: "Valitse oikea varoitusmerkki.",
          fr: "Sélectionnez la bonne étiquette d'avertissement.",
          ar: "اختر ملصق التحذير الصحيح.",
          it: "Seleziona l'etichetta di avvertenza corretta.",
        },
        bleach: { en: "Bleach", zh: "漂白水", ja: "漂白剤", ko: "표백제" },
        acid: {
          en: "Toilet Cleaner (Acid)",
          zh: "潔廁劑 (酸性)",
          ja: "トイレ用洗剤 (酸)",
          ko: "화장실 세제 (산성)",
        },
        thinner: {
          en: "Paint Thinner",
          zh: "天拿水 (稀釋劑)",
          ja: "シンナー",
          ko: "페인트 시너",
        },
        pesticide: {
          en: "Pesticide",
          zh: "殺蟲劑",
          ja: "殺虫剤",
          ko: "살충제",
        },

        corrosive: {
          en: "Corrosive",
          zh: "腐蝕性",
          ja: "腐食性",
          ko: "부식성",
        },
        flammable: { en: "Flammable", zh: "易燃", ja: "引火性", ko: "인화성" },
        toxic: { en: "Toxic / Poison", zh: "有毒", ja: "有毒", ko: "독성" },
        irritant: { en: "Irritant", zh: "刺激性", ja: "刺激性", ko: "자극성" },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
        wrong: {
          en: "Incorrect Symbol.",
          zh: "符號錯誤。",
          ja: "間違った記号。",
          ko: "잘못된 기호입니다.",
        },
      };

      const problems = [
        { id: "bleach", type: "irritant", icon: "🧴" }, // Often Irritant or Corrosive depending on conc.
        { id: "acid", type: "corrosive", icon: "🚽" },
        { id: "thinner", type: "flammable", icon: "🎨" },
        { id: "pesticide", type: "toxic", icon: "🦗" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [index, setIndex] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = problems[index];
        const types = ["corrosive", "flammable", "toxic", "irritant"];

        const handleAnswer = (type) => {
          if (feedback) return;
          if (type === current.type) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIndex((index + 1) % problems.length);
            }, 1000);
          } else {
            setFeedback("wrong");
            setTimeout(() => setFeedback(null), 500);
          }
        };

        const getSymbolVisual = (type) => {
          switch (type) {
            case "flammable":
              return "🔥";
            case "toxic":
              return "☠️";
            case "corrosive":
              return "🧪"; // Hand drip icon usually
            case "irritant":
              return "❌"; // St. Andrew's cross or Exclamation
            default:
              return "?";
          }
        };

        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-yellow-600">
              {getText("title")}
            </h1>

            <div className="w-full max-w-lg bg-white p-8 rounded-3xl shadow-xl border-4 border-yellow-300 flex flex-col items-center">
              <p className="mb-6 font-bold text-slate-400">
                {getText("instruction")}
              </p>

              <div className="w-full h-48 bg-slate-100 rounded-xl mb-8 flex flex-col items-center justify-center border-2 border-slate-200">
                <div className="text-6xl mb-4">{current.icon}</div>
                <div className="text-2xl font-black text-slate-800">
                  {getText(current.id)}
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4 w-full">
                {types.map((type) => (
                  <button
                    key={type}
                    onClick={() => handleAnswer(type)}
                    className="p-4 bg-orange-50 hover:bg-orange-100 border-2 border-orange-200 rounded-xl flex flex-col items-center gap-1 transition-transform active:scale-95"
                  >
                    <div
                      className={`w-12 h-12 flex items-center justify-center text-3xl
                            ${
                              type === "corrosive"
                                ? "text-black"
                                : type === "flammable"
                                ? "text-red-500"
                                : type === "toxic"
                                ? "text-black"
                                : "text-black"
                            }
                         `}
                    >
                      {/* Standardized GHS diamond background usually white with red border. Simplified here. */}
                      <div className="w-12 h-12 border-4 border-red-600 rotate-45 flex items-center justify-center bg-white">
                        <div className="-rotate-45">
                          {getSymbolVisual(type)}
                        </div>
                      </div>
                    </div>
                    <div className="font-bold text-xs mt-2">
                      {getText(type)}
                    </div>
                  </button>
                ))}
              </div>

              {feedback && (
                <div
                  className={`mt-8 text-3xl font-black ${
                    feedback === "correct" ? "text-green-600" : "text-red-500"
                  } animate-bounce`}
                >
                  {getText(feedback)}
                </div>
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
