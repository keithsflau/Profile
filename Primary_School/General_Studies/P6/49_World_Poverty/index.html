<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - World Poverty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fafaf9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Budgeting for Needs",
          zh: "為需求做預算",
          ja: "ニーズのための予算",
          ko: "필요에 대한 예산",
          es: "Presupuesto para necesidades",
          de: "Budgetierung für Bedürfnisse",
          fi: "Budjetointi tarpeisiin",
          fr: "Budgétisation des besoins",
          ar: "الميزانية للاحتياجات",
          it: "Budget per i Bisogni",
        },
        instruction: {
          en: "Buy only the essentials with limited money ($10).",
          zh: "用有限的金錢 ($10) 只買必需品。",
          ja: "限られたお金（$10）で必需品だけを買ってください。",
          ko: "제한된 돈($10)으로 필수품만 구입하세요.",
          es: "Compra solo lo esencial con dinero limitado ($10).",
          de: "Kaufe nur das Nötigste mit begrenztem Geld ($10).",
          fi: "Osta vain välttämättömyystarvikkeet rajoitetulla rahalla (10 $).",
          fr: "Achetez uniquement l'essentiel avec un budget limité (10 $).",
          ar: "اشترِ الضروريات فقط بأموال محدودة (10 دولارات).",
          it: "Acquista solo l'essenziale con soldi limitati ($10).",
        },
        water: {
          en: "Clean Water ($3)",
          zh: "乾淨水 ($3)",
          ja: "きれいな水 ($3)",
          ko: "깨끗한 물 ($3)",
        },
        food: {
          en: "Food ($4)",
          zh: "食物 ($4)",
          ja: "食べ物 ($4)",
          ko: "음식 ($4)",
        },
        toy: {
          en: "Toy ($5)",
          zh: "玩具 ($5)",
          ja: "おもちゃ ($5)",
          ko: "장난감 ($5)",
        },
        medicine: {
          en: "Medicine ($3)",
          zh: "藥物 ($3)",
          ja: "薬 ($3)",
          ko: "약 ($3)",
        },
        candy: {
          en: "Candy ($2)",
          zh: "糖果 ($2)",
          ja: "キャンディー ($2)",
          ko: "사탕 ($2)",
        },

        balance: {
          en: "Balance: $",
          zh: "餘額：$",
          ja: "残高: $",
          ko: "잔액: $",
        },
        result_ok: {
          en: "Good! You have the essentials.",
          zh: "很好！你有了必需品。",
          ja: "良い！必需品が揃いました。",
          ko: "좋아요! 필수품이 있습니다.",
        },
        result_fail: {
          en: "Missing essentials!",
          zh: "缺少必需品！",
          ja: "必需品が足りません！",
          ko: "필수품이 누락되었습니다!",
        },
      };

      const items = [
        { id: "water", cost: 3, essential: true, icon: "💧" },
        { id: "food", cost: 4, essential: true, icon: "🍚" },
        { id: "medicine", cost: 3, essential: true, icon: "💊" },
        { id: "toy", cost: 5, essential: false, icon: "🧸" },
        { id: "candy", cost: 2, essential: false, icon: "🍬" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [balance, setBalance] = useState(10);
        const [cart, setCart] = useState([]);

        const getText = (key) => t[key][lang] || t[key]["en"];

        const toggle = (item) => {
          if (cart.includes(item.id)) {
            setCart(cart.filter((c) => c !== item.id));
            setBalance(balance + item.cost);
          } else {
            if (balance >= item.cost) {
              setCart([...cart, item.id]);
              setBalance(balance - item.cost);
            }
          }
        };

        const hasEssentials = items
          .filter((i) => i.essential)
          .every((i) => cart.includes(i.id));

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-stone-700">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <div className="text-3xl font-bold mb-8 p-4 bg-yellow-100 rounded-xl border border-yellow-300 w-full max-w-md text-center">
              {getText("balance")}
              {balance}
            </div>

            <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-3xl mb-8">
              {items.map((item) => (
                <button
                  key={item.id}
                  onClick={() => toggle(item)}
                  className={`p-4 rounded-xl border-2 flex flex-col items-center gap-2 shadow-sm transition-all ${
                    cart.includes(item.id)
                      ? "bg-green-100 border-green-500"
                      : "bg-white border-slate-200"
                  }`}
                  disabled={!cart.includes(item.id) && balance < item.cost}
                >
                  <div className="text-4xl">{item.icon}</div>
                  <div className="font-bold">{getText(item.id)}</div>
                </button>
              ))}
            </div>

            {balance === 0 && (
              <div
                className={`text-2xl font-black p-4 rounded-xl animate-bounce ${
                  hasEssentials
                    ? "bg-green-100 text-green-700"
                    : "bg-red-100 text-red-700"
                }`}
              >
                {getText(hasEssentials ? "result_ok" : "result_fail")}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
