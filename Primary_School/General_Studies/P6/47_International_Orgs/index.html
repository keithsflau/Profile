<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - International Organizations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #f0f9ff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Global Organizations",
          zh: "國際組織",
          ja: "国際機関",
          ko: "국제 기구",
          es: "Organizaciones globales",
          de: "Globale Organisationen",
          fi: "Kansainväliset järjestöt",
          fr: "Organisations mondiales",
          ar: "المنظمات العالمية",
          it: "Organizzazioni Globali",
        },
        instruction: {
          en: "What does this organization do?",
          zh: "這個組織做什麼？",
          ja: "この組織は何をしていますか？",
          ko: "이 조직은 무엇을 합니까?",
          es: "¿Qué hace esta organización?",
          de: "Was macht diese Organisation?",
          fi: "Mitä tämä järjestö tekee?",
          fr: "Que fait cette organisation ?",
          ar: "ماذا تفعل هذه المنظمة؟",
          it: "Cosa fa questa organizzazione?",
        },
        un: {
          en: "United Nations (UN)",
          zh: "聯合國 (UN)",
          ja: "国連 (UN)",
          ko: "유엔 (UN)",
        },
        who: {
          en: "World Health Org (WHO)",
          zh: "世衛 (WHO)",
          ja: "世界保健機関 (WHO)",
          ko: "세계보건기구 (WHO)",
        },
        wto: {
          en: "World Trade Org (WTO)",
          zh: "世貿 (WTO)",
          ja: "世界貿易機関 (WTO)",
          ko: "세계무역기구 (WTO)",
        },
        ioc: {
          en: "Olympics (IOC)",
          zh: "奧委會 (IOC)",
          ja: "オリンピック (IOC)",
          ko: "올림픽 (IOC)",
        },

        peace: {
          en: "Peace & Security",
          zh: "和平與安全",
          ja: "平和と安全",
          ko: "평화와 안보",
        },
        health: {
          en: "Public Health",
          zh: "公共衛生",
          ja: "公衆衛生",
          ko: "공중 보건",
        },
        trade: {
          en: "Global Trade",
          zh: "全球貿易",
          ja: "世界貿易",
          ko: "세계 무역",
        },
        sports: {
          en: "Sports Events",
          zh: "體育賽事",
          ja: "スポーツイベント",
          ko: "스포츠 행사",
        },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
      };

      const orgs = [
        { id: "un", mission: "peace", icon: "🇺🇳", bg: "bg-blue-100" },
        { id: "who", mission: "health", icon: "⚕️", bg: "bg-blue-50" },
        { id: "wto", mission: "trade", icon: "⚖️", bg: "bg-slate-100" }, // Icon approx
        { id: "ioc", mission: "sports", icon: "🏅", bg: "bg-white" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [idx, setIdx] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = orgs[idx];

        const check = (m) => {
          if (feedback) return;
          if (m === current.mission) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIdx((idx + 1) % orgs.length);
            }, 1000);
          }
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-sky-800">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <motion.div
              key={current.id}
              initial={{ rotateY: 90 }}
              animate={{ rotateY: 0 }}
              className={`w-64 h-64 ${current.bg} rounded-full shadow-xl flex flex-col items-center justify-center border-4 border-slate-200 mb-8`}
            >
              <div className="text-8xl mb-2">{current.icon}</div>
              <div className="font-bold text-xl text-center">
                {getText(current.id)}
              </div>
            </motion.div>

            <div className="grid grid-cols-2 gap-4 w-full max-w-lg">
              {["peace", "health", "trade", "sports"].map((m) => (
                <button
                  key={m}
                  onClick={() => check(m)}
                  className="p-4 bg-white border border-slate-200 hover:bg-sky-50 rounded-xl font-bold shadow-sm"
                >
                  {getText(m)}
                </button>
              ))}
            </div>

            {feedback && (
              <div className="mt-8 text-3xl font-black text-green-600 animate-bounce">
                {getText("correct")}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
