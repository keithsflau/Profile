<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Global Landmarks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fffbeb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Landmark Explorer",
          zh: "地標探索者",
          ja: "ランドマーク探検家",
          ko: "랜드마크 탐험가",
          es: "Explorador de puntos de referencia",
          de: "Wahrzeichen-Entdecker",
          fi: "Maamerkkimatkailija",
          fr: "Explorateur de monuments",
          ar: "مستكشف المعالم",
          it: "Esploratore di Monumenti",
        },
        instruction: {
          en: "Where is this landmark?",
          zh: "這個地標在哪裡？",
          ja: "このランドマークはどこにありますか？",
          ko: "이 랜드마크는 어디에 있나요?",
          es: "¿Dónde está este punto de referencia?",
          de: "Wo ist dieses Wahrzeichen?",
          fi: "Missä tämä maamerkki on?",
          fr: "Où est ce monument ?",
          ar: "أين يقع هذا المعلم؟",
          it: "Dov'è questo monumento?",
        },
        eiffel: {
          en: "Eiffel Tower",
          zh: "艾菲爾鐵塔",
          ja: "エッフェル塔",
          ko: "에펠탑",
        },
        wall: {
          en: "Great Wall",
          zh: "萬里長城",
          ja: "万里の長城",
          ko: "만리장성",
        },
        liberty: {
          en: "Statue of Liberty",
          zh: "自由女神像",
          ja: "自由の女神",
          ko: "자유의 여신상",
        },
        pyramid: {
          en: "Pyramids",
          zh: "金字塔",
          ja: "ピラミッド",
          ko: "피라미드",
        },

        france: { en: "France", zh: "法國", ja: "フランス", ko: "프랑스" },
        china: { en: "China", zh: "中國", ja: "中国", ko: "중국" },
        usa: { en: "USA", zh: "美國", ja: "アメリカ", ko: "미국" },
        egypt: { en: "Egypt", zh: "埃及", ja: "エジプト", ko: "이집트" },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
        wrong: {
          en: "Try Again",
          zh: "再試一次",
          ja: "もう一度",
          ko: "다시 시도",
        },
      };

      const items = [
        { id: "eiffel", country: "france", icon: "🗼" },
        { id: "wall", country: "china", icon: "🧱" },
        { id: "liberty", country: "usa", icon: "🗽" },
        { id: "pyramid", country: "egypt", icon: "🔺" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [idx, setIdx] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = items[idx];

        const check = (country) => {
          if (feedback) return;
          if (country === current.country) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIdx((idx + 1) % items.length);
            }, 1000);
          } else {
            setFeedback("wrong");
            setTimeout(() => setFeedback(null), 500);
          }
        };

        const options = items
          .map((i) => i.country)
          .sort(() => Math.random() - 0.5);

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-amber-800">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <motion.div
              key={current.id}
              initial={{ scale: 0.5, opacity: 0 }}
              animate={{ scale: 1, opacity: 1 }}
              className="w-64 h-64 bg-white rounded-3xl shadow-xl border-4 border-amber-200 flex flex-col items-center justify-center mb-8"
            >
              <div className="text-9xl mb-4">{current.icon}</div>
              <div className="text-xl font-bold text-amber-900">
                {getText(current.id)}
              </div>
            </motion.div>

            <div className="grid grid-cols-2 gap-4 w-full max-w-md">
              {items.map((item) => (
                <button
                  key={item.country}
                  onClick={() => check(item.country)}
                  className="p-4 bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-xl font-bold text-lg shadow-sm"
                >
                  {getText(item.country)}
                </button>
              ))}
            </div>

            {feedback && (
              <div
                className={`mt-8 text-3xl font-black ${
                  feedback === "correct" ? "text-green-600" : "text-red-500"
                } animate-bounce`}
              >
                {getText(feedback)}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
