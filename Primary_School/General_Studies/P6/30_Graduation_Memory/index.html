<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Graduation Memory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fffbef;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Graduation Wall",
          zh: "畢業留言板",
          ja: "卒業の壁",
          ko: "졸업 벽",
          es: "Muro de graduación",
          de: "Abschluss-Wand",
          fi: "Valmistujaisseinä",
          fr: "Mur de graduation",
          ar: "جدار التخرج",
          it: "Muro della Laurea",
        },
        instruction: {
          en: "Decorate your memory for Primary School!",
          zh: "裝飾你的小學回憶！",
          ja: "小学校の思い出を飾りましょう！",
          ko: "초등학교의 추억을 장식하세요!",
          es: "¡Decora tu recuerdo de la escuela primaria!",
          de: "Dekoriere deine Erinnerung an die Grundschule!",
          fi: "Koristele muistosi alakoulusta!",
          fr: "Décorez votre souvenir de l'école primaire !",
          ar: "تزيين الذاكرة الخاصة بك للمدرسة الابتدائية!",
          it: "Decora il tuo ricordo della scuola elementare!",
        },
        add_sticker: {
          en: "Add Sticker",
          zh: "添加貼紙",
          ja: "ステッカーを追加",
          ko: "스티커 추가",
          es: "Añadir pegatina",
          de: "Aufkleber hinzufügen",
          fi: "Lisää tarra",
          fr: "Ajouter un autocollant",
          ar: "إضافة ملصق",
          it: "Aggiungi adesivo",
        },
        clear: {
          en: "Clear All",
          zh: "清除所有",
          ja: "すべてクリア",
          ko: "모두 지우기",
          es: "Borrar todo",
          de: "Alles löschen",
          fi: "Tyhjennä kaikki",
          fr: "Tout effacer",
          ar: "مسح الكل",
          it: "Cancella tutto",
        },
        message: {
          en: "See you in Secondary School!",
          zh: "中學見！",
          ja: "中学校で会いましょう！",
          ko: "중학교에서 만나요!",
          es: "¡Nos vemos en la escuela secundaria!",
          de: "Wir sehen uns in der Sekundarschule!",
          fi: "Nähdään yläkoulussa!",
          fr: "On se voit au collège !",
          ar: "أراك في المدرسة الثانوية!",
          it: "Ci vediamo alla scuola secondaria!",
        },
      };

      const stickers = [
        "🎓",
        "🏫",
        "📚",
        "🚌",
        "🖍️",
        "⭐",
        "🏆",
        "🥪",
        "⚽",
        "🎵",
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [placedStickers, setPlacedStickers] = useState([]);

        const getText = (key) => t[key][lang] || t[key]["en"];

        const addSticker = (icon) => {
          setPlacedStickers([
            ...placedStickers,
            {
              id: Date.now(),
              icon,
              x: Math.random() * 80 + 10,
              y: Math.random() * 70 + 10,
              rot: Math.random() * 40 - 20,
            },
          ]);
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-4 text-orange-500">
              {getText("title")}
            </h1>
            <p className="mb-4 text-slate-400 font-bold">
              {getText("instruction")}
            </p>

            {/* Canvas Area */}
            <div className="relative w-full max-w-3xl aspect-[4/3] bg-white rounded-xl shadow-2xl border-8 border-orange-200 overflow-hidden mb-8">
              {/* Background Pattern */}
              <div
                className="absolute inset-0 opacity-10"
                style={{
                  backgroundImage:
                    "radial-gradient(#f97316 2px, transparent 2px)",
                  backgroundSize: "30px 30px",
                }}
              ></div>

              {/* Central Message */}
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                <h2 className="text-5xl font-handwriting text-slate-800 opacity-20 transform -rotate-12 font-bold text-center px-8">
                  {getText("message")}
                </h2>
              </div>

              {/* Placed Stickers */}
              {placedStickers.map((s) => (
                <motion.div
                  key={s.id}
                  initial={{ scale: 0 }}
                  animate={{ scale: 1 }}
                  className="absolute text-6xl cursor-move"
                  style={{
                    left: `${s.x}%`,
                    top: `${s.y}%`,
                    rotate: s.rot,
                  }}
                  drag
                  dragMomentum={false}
                >
                  {s.icon}
                </motion.div>
              ))}
            </div>

            {/* Controls */}
            <div className="flex flex-wrap justify-center gap-4 max-w-2xl mb-8">
              {stickers.map((s) => (
                <button
                  key={s}
                  onClick={() => addSticker(s)}
                  className="text-4xl hover:scale-125 transition-transform p-2 bg-white rounded-xl shadow-sm border"
                >
                  {s}
                </button>
              ))}
            </div>

            <button
              onClick={() => setPlacedStickers([])}
              className="px-6 py-2 bg-slate-400 hover:bg-slate-500 text-white font-bold rounded-lg"
            >
              {getText("clear")}
            </button>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
