<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Adolescence Emotions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fff1f2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Emotional Intelligence",
          zh: "情緒智商",
          ja: "心の知能指数",
          ko: "감성 지능",
          es: "Inteligencia emocional",
          de: "Emotionale Intelligenz",
          fi: "Tunneäly",
          fr: "Intelligence émotionnelle",
          ar: "الذكاء العاطفي",
          it: "Intelligenza Emotiva",
        },
        instruction: {
          en: "Identify the emotion.",
          zh: "辨識情緒。",
          ja: "感情を特定してください。",
          ko: "감정을 식별하세요.",
          es: "Identifica la emoción.",
          de: "Identifiziere die Emotion.",
          fi: "Tunnista tunne.",
          fr: "Identifiez l'émotion.",
          ar: "حدد العاطفة.",
          it: "Identifica l'emozione.",
        },
        happy: { en: "Happy", zh: "快樂", ja: "幸せ", ko: "행복" },
        sad: { en: "Sad", zh: "悲傷", ja: "悲しい", ko: "슬픔" },
        angry: { en: "Angry", zh: "憤怒", ja: "怒り", ko: "화남" },
        anxious: { en: "Anxious", zh: "焦慮", ja: "不安", ko: "불안" },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
        wrong: {
          en: "Try Again",
          zh: "再試一次",
          ja: "もう一度",
          ko: "다시 시도",
        },
      };

      const emotions = [
        { id: "happy", icon: "😊", color: "text-yellow-500" },
        { id: "sad", icon: "😢", color: "text-blue-500" },
        { id: "angry", icon: "😡", color: "text-red-500" },
        { id: "anxious", icon: "😰", color: "text-purple-500" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [idx, setIdx] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = emotions[idx];

        const check = (id) => {
          if (feedback) return;
          if (id === current.id) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIdx((idx + 1) % emotions.length);
            }, 1000);
          } else {
            setFeedback("wrong");
            setTimeout(() => setFeedback(null), 500);
          }
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-rose-800">
              {getText("title")}
            </h1>
            <p className="mb-8 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <motion.div
              key={current.id}
              initial={{ scale: 0.5, opacity: 0 }}
              animate={{ scale: 1, opacity: 1 }}
              className={`w-64 h-64 bg-white rounded-full shadow-xl flex items-center justify-center text-9xl mb-8 border-4 border-rose-100 ${current.color}`}
            >
              {current.icon}
            </motion.div>

            <div className="grid grid-cols-2 gap-4 w-full max-w-sm">
              {emotions.map((e) => (
                <button
                  key={e.id}
                  onClick={() => check(e.id)}
                  className="p-4 bg-white hover:bg-rose-50 border border-rose-200 rounded-xl font-bold text-lg shadow-sm text-slate-700"
                >
                  {getText(e.id)}
                </button>
              ))}
            </div>

            {feedback && (
              <div
                className={`mt-8 text-3xl font-black ${
                  feedback === "correct" ? "text-green-500" : "text-red-500"
                } animate-bounce`}
              >
                {getText(feedback)}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
