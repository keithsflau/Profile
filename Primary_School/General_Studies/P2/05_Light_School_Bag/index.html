    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Fredoka", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion, AnimatePresence } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Light School Bag",

        },
        instruction: {

          zh: "只收拾明天需要的課本！",
          ja: "明日の授業に必要なものだけを入れましょう！",
          ko: "내일 필요한 물건만 챙기세요!",
          es: "¡Empaca solo lo que necesitas para mañana!",
          de: "Packe nur ein, was du für morgen brauchst!",
          fi: "Pakkaa vain mitä tarvitset huomiseksi!",
          fr: "Ne prenez que ce dont vous avez besoin pour demain !",
          ar: "احزم فقط ما تحتاجه للغد!",
          it: "Porta solo ciò che ti serve per domani!",
        },
        timetable: {

          ko: "내일 시간표",
          es: "Horario de Mañana",
          de: "Stundenplan für Morgen",
          fi: "Huomisen lukujärjestys",
          fr: "Emploi du temps de demain",
          ar: "جدول الغد",
          it: "Orario di Domani",
        },
        bag: {
          en: "My Bag",
          zh: "我的書包",
          ja: "私のカバン",
          ko: "내 가방",
          es: "Mi Mochila",
          de: "Meine Tasche",
          fi: "Laukkuni",
          fr: "Mon Sac",
          ar: "حقيبتي",
          it: "Il Mio Zaino",
        },
        weight: {
          en: "Weight",
          zh: "重量",
          ja: "重さ",
          ko: "무게",
          es: "Peso",
          de: "Gewicht",
          fi: "Paino",
          fr: "Poids",
          ar: "وزن",
          it: "Peso",
        },
        check: {
          en: "Check",
          zh: "檢查",
          ja: "確認",
          ko: "확인",
          es: "Comprobar",
          de: "Prüfen",
          fi: "Tarkista",
          fr: "Vérifier",

          it: "Controlla",
        },
        reset: {
          en: "Repack",
          zh: "重新收拾",
          ja: "詰め直す",
          ko: "다시 싸기",
          es: "Reempacar",
          de: "Neu packen",
          fi: "Pakkaa uudelleen",
          fr: "Refaire son sac",
          ar: "إعادة التعبئة",
          it: "Rifare lo zaino",
        },

        correct: {
          en: "Perfect! Lightweight!",
          zh: "完美！書包很輕！",
          ja: "完璧！軽いです！",
          ko: "완벽해요! 가볍네요!",
          es: "¡Perfecto! ¡Ligero!",
          de: "Perfekt! Leicht!",
          fi: "Täydellistä! Kevyt!",
          fr: "Parfait ! Léger !",
          ar: "مثالي! خفيف الوزن!",
          it: "Perfetto! Leggero!",
        },
        heavy: {
          en: "Too Heavy! Unnecessary items.",
          zh: "太重了！帶了多餘的東西。",
          ja: "重すぎます！不要なものが入っています。",
          ko: "너무 무거워요! 불필요한 물건이 있습니다.",
          es: "¡Demasiado pesado! Artículos innecesarios.",
          de: "Zu schwer! Unnötige Gegenstände.",
          fi: "Liian painava! Tarpeettomia tavaroita.",
          fr: "Trop lourd ! Objets inutiles.",
          ar: "ثقيلة جدا! عناصر غير ضرورية.",
          it: "Troppo Pesante! Oggetti non necessari.",
        },
        missing: {
          en: "Missing items!",
          zh: "帶漏了課本！",
          ja: "忘れ物があります！",
          ko: "빠진 물건이 있어요!",
          es: "¡Faltan artículos!",
          de: "Fehlende Gegenstände!",
          fi: "Puuttuvia tavaroita!",
          fr: "Objets manquants !",
          ar: "عناصر مفقودة!",
          it: "Oggetti mancanti!",
        },

        chi: {
          en: "Chinese",
          zh: "中文",
          ja: "中国語",
          ko: "중국어",
          es: "Chino",
          de: "Chinesisch",
          fi: "Kiina",
          fr: "Chinois",
          ar: "صينى",
          it: "Cinese",
        },
        eng: {
          en: "English",
          zh: "英文",
          ja: "英語",
          ko: "영어",
          es: "Inglés",
          de: "Englisch",
          fi: "Englanti",
          fr: "Anglais",
          ar: "إنجليزي",
          it: "Inglese",
        },
        math: {
          en: "Math",
          zh: "數學",
          ja: "数学",
          ko: "수학",
          es: "Matemáticas",
          de: "Mathe",
          fi: "Matematiikka",
          fr: "Maths",
          ar: "رياضيات",
          it: "Matematica",
        },
        gs: {
          en: "GS",
          zh: "常識",
          ja: "生活科",
          ko: "일반 연구",
          es: "C. Medio",
          de: "Sachk.",
          fi: "Ymp.oppi",
          fr: "Découverte",
          ar: "دراسات",
          it: "Studi",
        },
        music: {
          en: "Music",
          zh: "音樂",
          ja: "音楽",
          ko: "음악",
          es: "Música",
          de: "Musik",
          fi: "Musiikki",
          fr: "Musique",
          ar: "موسيقى",
          it: "Musica",
        },
        pe: {
          en: "PE Uniform",
          zh: "體育服",
          ja: "体操着",
          ko: "체육복",
          es: "Uniforme EF",
          de: "Sportzeug",
          fi: "Liikuntavaatteet",
          fr: "Tenue de sport",
          ar: "زي رياضي",
          it: "Divisa Sportiva",
        },
        art: {
          en: "Art Tools",
          zh: "視藝工具",
          ja: "図工道具",
          ko: "미술 도구",
          es: "Útiles de Arte",
          de: "Kunstwerkzeug",
          fi: "Kuvataidetarvikkeet",
          fr: "Outils d'art",
          ar: "أدوات فنية",
          it: "Strumenti Artistici",
        },
        toy: {
          en: "Toy",
          zh: "玩具",
          ja: "おもちゃ",
          ko: "장난감",
          es: "Juguete",
          de: "Spielzeug",
          fi: "Lelu",
          fr: "Jouet",
          ar: "لعبة",
          it: "Giocattolo",
        },
        snack: {
          en: "Snack",
          zh: "零食",
          ja: "おやつ",
          ko: "간식",
          es: "Merienda",
          de: "Snack",
          fi: "Eväs",
          fr: "Goûter",
          ar: "وجبة خفيفة",
          it: "Snack",
        },
      };

      // Randomly generate a 4-period timetable
      const subjects = ["chi", "eng", "math", "gs", "music", "art"];
      const allItems = [
        ...subjects.map((s) => ({ id: s, weight: 2 })),
        { id: "pe", weight: 1 },
        { id: "toy", weight: 3 }, // Heavy unnecessary item
        { id: "snack", weight: 1 },
      ];

      const itemConfig = {
        chi: { color: "bg-red-200", icon: "📕" },
        eng: { color: "bg-blue-200", icon: "📘" },
        math: { color: "bg-green-200", icon: "📗" },
        gs: { color: "bg-purple-200", icon: "📙" },
        music: { color: "bg-pink-200", icon: "🎵" },
        art: { color: "bg-yellow-200", icon: "🎨" },
        pe: { color: "bg-orange-200", icon: "👕" },
        toy: { color: "bg-indigo-300", icon: "🤖" },
        snack: { color: "bg-amber-200", icon: "🍪" },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [schedule, setSchedule] = useState([]);
        const [packed, setPacked] = useState([]);
        const [status, setStatus] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];

        useEffect(() => {
          initGame();
        }, []);

        const initGame = () => {
          // Pick 4 subjects
          const s = [...subjects].sort(() => Math.random() - 0.5).slice(0, 4);
          setSchedule(s);
          setPacked([]);
          setStatus(null);
        };

        const togglePack = (itemId) => {
          if (packed.includes(itemId)) {
            setPacked((prev) => prev.filter((i) => i !== itemId));
          } else {
            setPacked((prev) => [...prev, itemId]);
          }
          setStatus(null);
        };

        const calculateWeight = () => {
          return packed.reduce((acc, curr) => {
            const item = allItems.find((i) => i.id === curr);
            return acc + (item ? item.weight : 0);
          }, 0);
        };

        const check = () => {
          // Rules:
          // 1. Must have all subjects in schedule
          // 2. Must NOT have items NOT in schedule (except maybe essentials? Lets simplify: only schedule items allowed)
          // 3. Toys/Snacks are strictly unnecessary for this game logic usually

          // Check missing
          const missing = schedule.filter((s) => !packed.includes(s));
          if (missing.length > 0) {
            setStatus("missing");
            return;
          }

          // Check extra
          const extra = packed.filter((p) => !schedule.includes(p));
          if (extra.length > 0) {
            setStatus("heavy");
            return;
          }

          setStatus("correct");
        };

        const weight = calculateWeight();
        const maxWeight = 15; // Just visual scale

        return (
          <div className="min-h-screen p-4 flex flex-col items-center">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl md:text-5xl font-black text-teal-800 mb-4 mt-8 drop-shadow-sm bg-white/50 px-6 py-2 rounded-full">
              🎒 {getText("title")}
            </h1>

            <div className="flex flex-col lg:flex-row gap-8 w-full max-w-5xl items-start">
              {/* Left: Timetable */}
              <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-teal-200">
                <h2 className="text-xl font-black text-teal-700 mb-4 text-center border-b-2 border-teal-100 pb-2">
                  {getText("timetable")}
                </h2>
                <div className="grid gap-3">
                  {schedule.map((sub, i) => (
                    <div
                      key={i}
                      className={`p-4 rounded-xl flex items-center gap-4 font-bold text-slate-700 ${itemConfig[sub].color}`}
                    >
                      <span className="text-2xl">{itemConfig[sub].icon}</span>
                      <span>{getText(sub)}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Center: Bag Visual + Meters */}
              <div className="flex-1 flex flex-col items-center">
                <p className="font-bold text-teal-900 mb-4 bg-teal-100 px-4 py-1 rounded">
                  {getText("instruction")}
                </p>

                <div className="relative w-64 h-80 bg-teal-600 rounded-[3rem] border-8 border-teal-800 shadow-2xl flex flex-col items-center justify-end p-4 overflow-hidden mask-bag">
                  <div className="absolute top-0 w-full h-24 bg-teal-700 rounded-b-[3rem] z-10"></div>{" "}
                  {/* Flap */}
                  <div className="absolute top-2 w-16 h-4 bg-orange-400 rounded-full z-20"></div>{" "}
                  {/* Handle */}
                  {/* Packed Items Visualization */}
                  <div className="w-full flex flex-wrap-reverse gap-2 justify-center content-start h-56 z-0 pb-4">
                    <AnimatePresence>
                      {packed.map((p, i) => (
                        <motion.div
                          key={p}
                          initial={{ scale: 0, y: -100 }}
                          animate={{ scale: 1, y: 0 }}
                          exit={{ scale: 0, opacity: 0 }}
                          className="text-4xl filter drop-shadow-lg"
                          style={{ zIndex: i }}
                        >
                          {itemConfig[p].icon}
                        </motion.div>
                      ))}
                    </AnimatePresence>
                  </div>
                </div>

                {/* Weight Meter */}
                <div className="w-64 mt-6 bg-slate-200 h-6 rounded-full overflow-hidden border-2 border-slate-300 relative">
                  <motion.div
                    className={`h-full ${
                      weight > 10
                        ? "bg-red-500"
                        : weight > 8
                        ? "bg-yellow-400"
                        : "bg-green-500"
                    }`}
                    animate={{
                      width: `${Math.min(100, (weight / maxWeight) * 100)}%`,
                    }}
                  />
                  <div className="absolute inset-0 flex items-center justify-center text-xs font-black text-slate-600">
                    {getText("weight")}
                  </div>
                </div>

                {status && (
                  <div
                    className={`mt-6 p-4 rounded-2xl font-black text-center text-xl shadow ${
                      status === "correct"
                        ? "bg-green-100 text-green-700"
                        : "bg-red-100 text-red-600"
                    }`}
                  >
                    {getText(status)}
                  </div>
                )}

                <div className="mt-6 flex gap-4">
                  <button
                    onClick={check}
                    className="bg-teal-500 text-white px-8 py-3 rounded-full font-black text-xl hover:bg-teal-600 shadow-xl"
                  >
                    {getText("check")}
                  </button>
                  {status === "correct" && (
                    <button
                      onClick={initGame}
                      className="bg-yellow-500 text-white px-8 py-3 rounded-full font-black text-xl hover:bg-yellow-600 shadow-xl"
                    >
                      Next Day ➡️
                    </button>
                  )}
                </div>
              </div>

              {/* Right: Items to pack */}
              <div className="w-full lg:w-1/3 bg-white/60 p-6 rounded-3xl backdrop-blur grid grid-cols-2 gap-3">
                {allItems.map((item) => {
                  const isPacked = packed.includes(item.id);
                  return (
                    <button
                      key={item.id}
                      onClick={() => togglePack(item.id)}
                      className={`p-3 rounded-xl flex flex-col items-center justify-center transition-all border-b-4 ${
                        isPacked
                          ? "bg-slate-200 border-slate-300 opacity-50 scale-95"
                          : "bg-white border-slate-200 hover:scale-105 shadow-sm"
                      }`}
                    >
                      <span className="text-3xl mb-1">
                        {itemConfig[item.id].icon}
                      </span>
                      <span className="text-xs font-bold text-slate-600">
                        {getText(item.id)}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
