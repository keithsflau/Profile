<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Climate Change</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #ecfeff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Save the Ice!",
          zh: "拯救冰川！",
          ja: "氷を救え！",
          ko: "얼음을 구하세요!",
          es: "¡Salva el hielo!",
          de: "Rettet das Eis!",
          fi: "Pelasta jää!",
          fr: "Sauvez la glace !",
          ar: "أنقذ الجليد!",
          it: "Salva il ghiaccio!",
        },
        instruction: {
          en: "Lower CO2 to stop the ice from melting.",
          zh: "降低二氧化碳以阻止冰川融化。",
          ja: "CO2を減らして氷が溶けるのを防ごう。",
          ko: "이산화탄소를 줄여 얼음이 녹는 것을 막으세요.",
          es: "Reduce el CO2 para evitar que el hielo se derrita.",
          de: "Senke CO2, damit das Eis nicht schmilzt.",
          fi: "Vähennä hiilidioksidia estääksesi jään sulamisen.",
          fr: "Réduisez le CO2 pour empêcher la glace de fondre.",
          ar: "قلل ثاني أكسيد الكربون لمنع ذوبان الجليد.",
          it: "Riduci la CO2 per fermare lo scioglimento dei ghiacci.",
        },
        co2: {
          en: "CO2 Level",
          zh: "二氧化碳水平",
          ja: "CO2レベル",
          ko: "CO2 수준",
        },
        plant: {
          en: "Plant Tree",
          zh: "植樹",
          ja: "木を植える",
          ko: "나무 심기",
        },
        recycle: { en: "Recycle", zh: "回收", ja: "リサイクル", ko: "재활용" },

        safe: {
          en: "Safe! The bear is happy.",
          zh: "安全！北極熊很開心。",
          ja: "安全！クマは幸せです。",
          ko: "안전해요! 곰이 행복해합니다.",
        },
        danger: {
          en: "Danger! Ice melting!",
          zh: "危險！冰正在融化！",
          ja: "危険！氷が溶けています！",
          ko: "위험! 얼음이 녹고 있어요!",
        },
      };

      function App() {
        const [lang, setLang] = useState("zh");
        const [co2, setCo2] = useState(80); // 0 to 100

        const getText = (key) => t[key][lang] || t[key]["en"];

        // Auto rise
        useEffect(() => {
          const timer = setInterval(() => {
            setCo2((c) => Math.min(100, c + 1));
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        const reduce = (amt) => {
          setCo2((c) => Math.max(0, c - amt));
        };

        const iceSize = 100 - co2; // Ice shrinks as CO2 rises

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-cyan-700">
              {getText("title")}
            </h1>
            <p className="mb-4 font-bold text-slate-500">
              {getText("instruction")}
            </p>

            <div className="relative w-full max-w-3xl h-[400px] bg-sky-300 rounded-3xl overflow-hidden shadow-2xl border-4 border-white mb-8">
              {/* Water */}
              <div className="absolute inset-x-0 bottom-0 h-1/2 bg-blue-500 opacity-80 wave-anim"></div>

              {/* Sun (Heat) */}
              <div
                className="absolute top-4 right-4 bg-yellow-400 rounded-full shadow-[0_0_40px_rgba(255,200,0,0.8)]"
                style={{
                  width: co2 * 1.5 + 50,
                  height: co2 * 1.5 + 50,
                  opacity: 0.5 + co2 / 200,
                }}
              ></div>

              {/* Ice Floe */}
              <motion.div
                className="absolute bottom-1/4 left-1/2 bg-white rounded-full shadow-lg flex items-center justify-center -translate-x-1/2"
                animate={{
                  width: iceSize * 3 + 50,
                  height: (iceSize * 3 + 50) / 3,
                }}
              >
                <div className="text-6xl -translate-y-8">🐻‍❄️</div>
              </motion.div>

              {/* Status */}
              <div
                className={`absolute top-4 left-4 px-4 py-2 rounded-xl font-bold text-white shadow ${
                  co2 > 50 ? "bg-red-500" : "bg-green-500"
                }`}
              >
                {getText("co2")}: {co2}%
              </div>
            </div>

            <div className="flex gap-4">
              <button
                onClick={() => reduce(10)}
                className="px-8 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95 text-xl"
              >
                🌳 {getText("plant")}
              </button>
              <button
                onClick={() => reduce(5)}
                className="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95 text-xl"
              >
                ♻️ {getText("recycle")}
              </button>
            </div>

            {co2 > 80 && (
              <div className="mt-4 text-red-600 font-black animate-pulse text-2xl">
                {getText("danger")}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
