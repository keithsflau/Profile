<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Studies - Puberty Changes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="../../common/i18n.js"></script>
    <style>
      body {
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: #fdf2f8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;
      const { motion } = window.Motion;
      const { LanguageSelector, get } = window.MathI18n;

      const t = {
        title: {
          en: "Changes in Puberty",
          zh: "青春期的轉變",
          ja: "思春期の変化",
          ko: "사춘기의 변화",
          es: "Cambios en la pubertad",
          de: "Veränderungen in der Pubertät",
          fi: "Murrosiän muutokset",
          fr: "Changements à la puberté",
          ar: "التغيرات في سن البلوغ",
          it: "Cambiamenti nella Pubertà",
        },
        instruction: {
          en: "Sort the changes: Boys, Girls, or Both?",
          zh: "分類轉變：男生、女生或兩者？",
          ja: "変化を分類：男の子、女の子、それとも両方？",
          ko: "변화를 분류하세요: 남자, 여자, 또는 둘 다?",
          es: "Clasifica los cambios: ¿Niños, Niñas o Ambos?",
          de: "Sortiere die Veränderungen: Jungen, Mädchen oder Beide?",
          fi: "Lajittele muutokset: Pojat, tytöt vai molemmat?",
          fr: "Triez les changements : Garçons, Filles ou les deux ?",
          ar: "فرز التغييرات: أولاد، بنات، أو كلاهما؟",
          it: "Ordina i cambiamenti: Ragazzi, Ragazze o Entrambi?",
        },
        boys: { en: "Boys", zh: "男生", ja: "男の子", ko: "남자" },
        girls: { en: "Girls", zh: "女生", ja: "女の子", ko: "여자" },
        both: { en: "Both", zh: "兩者", ja: "両方", ko: "둘 다" },

        voice: {
          en: "Voice gets deeper",
          zh: "聲音變低沉",
          ja: "声が低くなる",
          ko: "목소리가 굵어짐",
        },
        tall: {
          en: "Grow taller fast",
          zh: "快速長高",
          ja: "急に背が伸びる",
          ko: "키가 빨리 자람",
        },
        hair: {
          en: "Body hair grows",
          zh: "長出身體毛髮",
          ja: "体毛が生える",
          ko: "체모가 자람",
        },
        acne: {
          en: "Pimples / Acne",
          zh: "暗瘡 / 青春痘",
          ja: "ニキビ",
          ko: "여드름",
        },
        breast: {
          en: "Breasts develop",
          zh: "乳房發育",
          ja: "胸が発達する",
          ko: "가슴 발달",
        },
        mens: { en: "Menstruation", zh: "月經來潮", ja: "月経", ko: "월경" },
        beard: {
          en: "Facial hair grows",
          zh: "長出鬍鬚",
          ja: "ヒゲが生える",
          ko: "수염이 자람",
        },
        hips: {
          en: "Hips get wider",
          zh: "臀部變寬",
          ja: "お尻が広くなる",
          ko: "엉덩이가 넓어짐",
        },

        correct: { en: "Correct!", zh: "正確！", ja: "正解！", ko: "정답!" },
      };

      const changes = [
        { id: "voice", type: "boys" }, // Though girls change too, typically assoc with boys deepening significantly
        { id: "tall", type: "both" },
        { id: "hair", type: "both" },
        { id: "acne", type: "both" },
        { id: "breast", type: "girls" },
        { id: "mens", type: "girls" },
        { id: "beard", type: "boys" },
        { id: "hips", type: "girls" },
      ];

      function App() {
        const [lang, setLang] = useState("zh");
        const [index, setIndex] = useState(0);
        const [feedback, setFeedback] = useState(null);

        const getText = (key) => t[key][lang] || t[key]["en"];
        const current = changes[index];

        const handleSort = (type) => {
          if (feedback) return;

          // Simplified logic: accept broad answers or strict? Let's go strict based on primary school syllabus
          // Voice -> Boys (Deepening)
          // Hips -> Girls
          if (
            type === current.type ||
            (current.type === "both" && type === "both")
          ) {
            setFeedback("correct");
            setTimeout(() => {
              setFeedback(null);
              setIndex((index + 1) % changes.length);
            }, 1000);
          } else {
            // Shake or error
            setFeedback("wrong");
            setTimeout(() => setFeedback(null), 500);
          }
        };

        return (
          <div className="min-h-screen flex flex-col items-center p-4">
            <LanguageSelector lang={lang} setLang={setLang} />
            <h1 className="text-4xl font-bold mb-8 text-pink-600">
              {getText("title")}
            </h1>

            <div className="w-full max-w-2xl text-center">
              <p className="mb-8 font-bold text-slate-500">
                {getText("instruction")}
              </p>

              {/* Card */}
              <div className="bg-white p-12 rounded-3xl shadow-xl mb-12 border-4 border-pink-100 min-h-[200px] flex items-center justify-center relative overflow-hidden">
                <motion.div
                  key={current.id}
                  initial={{ scale: 0.5, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  className="text-3xl font-black text-slate-800"
                >
                  {getText(current.id)}
                </motion.div>

                {feedback === "correct" && (
                  <div className="absolute inset-0 bg-green-500/90 flex items-center justify-center text-white font-bold text-4xl">
                    ✅
                  </div>
                )}
                {feedback === "wrong" && (
                  <div className="absolute inset-0 bg-red-500/90 flex items-center justify-center text-white font-bold text-4xl">
                    ❌
                  </div>
                )}
              </div>

              {/* Buckets */}
              <div className="grid grid-cols-3 gap-4">
                <button
                  onClick={() => handleSort("boys")}
                  className="p-6 bg-blue-100 hover:bg-blue-200 rounded-2xl border-b-8 border-blue-300 transition-transform active:scale-95"
                >
                  <div className="text-4xl mb-2">👦</div>
                  <div className="font-bold text-blue-800">
                    {getText("boys")}
                  </div>
                </button>
                <button
                  onClick={() => handleSort("both")}
                  className="p-6 bg-purple-100 hover:bg-purple-200 rounded-2xl border-b-8 border-purple-300 transition-transform active:scale-95"
                >
                  <div className="text-4xl mb-2">👫</div>
                  <div className="font-bold text-purple-800">
                    {getText("both")}
                  </div>
                </button>
                <button
                  onClick={() => handleSort("girls")}
                  className="p-6 bg-pink-100 hover:bg-pink-200 rounded-2xl border-b-8 border-pink-300 transition-transform active:scale-95"
                >
                  <div className="text-4xl mb-2">👧</div>
                  <div className="font-bold text-pink-800">
                    {getText("girls")}
                  </div>
                </button>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  
      
      <!-- Footer -->
      <footer class="text-center py-4 text-slate-500 text-sm">
        <p class="italic mb-1">
          But God made the earth by his power; he founded the world by his wisdom and stretched out the heavens by his
          understanding. Jeremiah 10:12
        </p>
        <p class="text-xs mb-1 mt-2">
          「耶和華用能力創造大地，用智慧建立世界，用聰明鋪張穹蒼。」 耶利米書 10:12
        </p>
        <p class="text-xs mt-2 pt-2 border-t border-slate-300">
          @ 2025 Education Engineering Portfolio | Generated by Gemini Pro 3.0 | Prepared by SF Lau
        </p>
      </footer>
</body>
</html>
